openapi: '3.1.0'
info:
  title: Amplitude
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://amplitude.com/api/2
paths:
  /events/segmentation:
    get:
      operationId: getEvents
      summary: Get event segmentation data
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: amp0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Basic auth using API Key and Secret Key. Format: Basic {base64(api_key:secret_key)}'
        - name: e
          in: query
          required: true
          schema:
            type: string
          description: Event to segment on, as a JSON-encoded string.
        - name: start
          in: query
          required: true
          schema:
            type: string
          description: 'Start date in YYYYMMDD format.'
        - name: end
          in: query
          required: true
          schema:
            type: string
          description: 'End date in YYYYMMDD format.'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      series:
                        type: array
                        items:
                          type: array
                          items:
                            type: number
                      xValues:
                        type: array
                        items:
                          type: string
  /useractivity:
    get:
      operationId: getUserActivity
      summary: Get events for a specific user
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: amp0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Basic auth using API Key and Secret Key. Format: Basic {base64(api_key:secret_key)}'
        - name: user
          in: query
          required: true
          schema:
            type: string
          description: User ID to get activity for.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        event_type:
                          type: string
                        event_time:
                          type: string
                        event_properties:
                          type: object
                  userData:
                    type: object
                    properties:
                      user_id:
                        type: string
                      num_events:
                        type: integer
