openapi: '3.1.0'
info:
  title: Azure Portal API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://management.azure.com
    x-openweb:
      transport: node
      auth:
        type: sessionStorage_msal
        key_pattern: accesstoken
        scope_filter: management.core.windows.net
        token_field: secret
        inject:
          header: Authorization
          prefix: 'Bearer '
paths:
  /subscriptions:
    get:
      operationId: listSubscriptions
      summary: List Azure subscriptions
      x-openweb:
        permission: read
        build:
          stable_id: az000001
          tool_version: 1
          verified: false
      parameters:
        - name: api-version
          in: query
          required: true
          schema:
            type: string
            default: '2022-12-01'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
