openapi: '3.1.0'
info:
  title: ClickUp
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.clickup.com/api/v2
paths:
  /list/{list_id}/task:
    get:
      operationId: getTasks
      summary: List tasks in a list
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cu0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: ClickUp API token (no Bearer prefix).
        - name: list_id
          in: path
          required: true
          schema:
            type: string
          description: List ID.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number (zero-indexed).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [tasks]
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                      required: [id, name, status]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        status:
                          type: object
                          properties:
                            status:
                              type: string
                            color:
                              type: string
                        url:
                          type: string
  /task/{task_id}:
    get:
      operationId: getTask
      summary: Get a single task by ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cu0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: ClickUp API token (no Bearer prefix).
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: Task ID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, name, status]
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  status:
                    type: object
                    properties:
                      status:
                        type: string
                      color:
                        type: string
                  description:
                    type: string
                  url:
                    type: string
