openapi: '3.1.0'
info:
  title: Cloudflare
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.cloudflare.com/client/v4
paths:
  /zones:
    get:
      operationId: listZones
      summary: List zones associated with the account
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cf0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Zone name to filter by.
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of zones per page.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: array
                    items:
                      type: object
                      required: [id, name, status]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        status:
                          type: string
                        name_servers:
                          type: array
                          items:
                            type: string
  /zones/{zone_id}:
    get:
      operationId: getZone
      summary: Get details for a specific zone
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cf0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
        - name: zone_id
          in: path
          required: true
          schema:
            type: string
          description: Zone identifier.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
                    required: [id, name, status]
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      status:
                        type: string
                      name_servers:
                        type: array
                        items:
                          type: string
