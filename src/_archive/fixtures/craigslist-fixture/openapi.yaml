openapi: '3.1.0'
info:
  title: Craigslist API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://wapi.craigslist.org/web/v8
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /postings:
    get:
      operationId: getPostings
      summary: "Get user's postings"
      x-openweb:
        permission: read
        build:
          stable_id: cl0001a1
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
