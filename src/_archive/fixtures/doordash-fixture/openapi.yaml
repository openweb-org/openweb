openapi: '3.1.0'
info:
  title: DoorDash API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.doordash.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /graphql/GetConsumerInfo:
    post:
      operationId: getConsumer
      summary: Get authenticated consumer info
      x-openweb:
        permission: read
        build:
          stable_id: dd0a1b2c
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
