openapi: '3.1.0'
info:
  title: Excel Online API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://graph.microsoft.com/v1.0
    x-openweb:
      transport: node
      auth:
        type: sessionStorage_msal
        key_pattern: accesstoken
        scope_filter: graph.microsoft.com
        token_field: secret
        inject:
          header: Authorization
          prefix: 'Bearer '
paths:
  /me:
    get:
      operationId: getProfile
      summary: Get authenticated user's Microsoft Graph profile
      x-openweb:
        permission: read
        build:
          stable_id: eo0001a1
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
