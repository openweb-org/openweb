openapi: '3.1.0'
info:
  title: Fidelity API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://digital.fidelity.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /ftgw/digital/portfolio/api/graphql:
    post:
      operationId: getPortfolio
      summary: Get portfolio data via GraphQL
      x-openweb:
        permission: read
        build:
          stable_id: fi000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
