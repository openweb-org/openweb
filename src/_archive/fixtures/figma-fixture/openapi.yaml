openapi: '3.1.0'
info:
  title: Figma
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.figma.com/v1
paths:
  /files/{file_key}:
    get:
      operationId: getFile
      summary: Get a Figma file by key
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: fg0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: X-Figma-Token
          in: header
          required: true
          schema:
            type: string
          description: Figma personal access token.
        - name: file_key
          in: path
          required: true
          schema:
            type: string
          description: File key from the Figma URL.
        - name: depth
          in: query
          required: false
          schema:
            type: integer
          description: Depth of the node tree to return.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [name, document, schemaVersion]
                properties:
                  name:
                    type: string
                  lastModified:
                    type: string
                  schemaVersion:
                    type: integer
                  document:
                    type: object
                  thumbnailUrl:
                    type: string
  /teams/{team_id}/projects:
    get:
      operationId: getTeamProjects
      summary: List projects for a team
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: fg0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: X-Figma-Token
          in: header
          required: true
          schema:
            type: string
          description: Figma personal access token.
        - name: team_id
          in: path
          required: true
          schema:
            type: string
          description: Team ID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      type: object
                      required: [id, name]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
