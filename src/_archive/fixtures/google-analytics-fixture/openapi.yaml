openapi: '3.1.0'
info:
  title: Google Analytics API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://analyticsdata.googleapis.com/v1beta
    x-openweb:
      transport: page
      auth:
        type: page_global
        expression: gapi.auth.getToken().access_token
        inject:
          header: Authorization
          prefix: 'Bearer '
paths:
  /properties:
    get:
      operationId: getProperties
      summary: List GA4 properties
      x-openweb:
        permission: read
        build:
          stable_id: ga0001a1
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
