openapi: '3.1.0'
info:
  title: Google Cloud API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://cloudresourcemanager.googleapis.com/v1
    x-openweb:
      transport: page
      auth:
        type: page_global
        expression: 'gapi.auth.getToken().access_token'
        inject:
          header: Authorization
          prefix: 'Bearer '
paths:
  /projects:
    get:
      operationId: listProjects
      summary: List GCP projects
      x-openweb:
        permission: read
        build:
          stable_id: gcp00001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
