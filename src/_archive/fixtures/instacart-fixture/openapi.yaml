openapi: '3.1.0'
info:
  title: Instacart API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.instacart.com
    x-openweb:
      transport: page
      auth:
        type: cookie_session
paths:
  /graphql:
    get:
      operationId: getCurrentUser
      summary: Get current authenticated user
      x-openweb:
        permission: read
        build:
          stable_id: ic0a1b2c
          tool_version: 1
          verified: false
      parameters:
        - name: operationName
          in: query
          required: true
          schema:
            type: string
            default: CurrentUser
          description: GraphQL operation name.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
