openapi: '3.1.0'
info:
  title: LinkedIn API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.linkedin.com/voyager/api
    x-openweb:
      transport: node
      auth:
        type: cookie_session
      csrf:
        type: cookie_to_header
        cookie: JSESSIONID
        header: csrf-token
paths:
  /me:
    get:
      operationId: getProfile
      summary: Get authenticated user's profile
      x-openweb:
        permission: read
        build:
          stable_id: li000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  miniProfile:
                    type: object
