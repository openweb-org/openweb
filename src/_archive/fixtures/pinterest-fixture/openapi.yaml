openapi: '3.1.0'
info:
  title: Pinterest API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.pinterest.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
      csrf:
        type: cookie_to_header
        cookie: csrftoken
        header: X-CSRFToken
paths:
  /resource/BoardsResource/get/:
    get:
      operationId: getBoards
      summary: Get user's boards
      x-openweb:
        permission: read
        build:
          stable_id: pi000001
          tool_version: 1
          verified: false
      parameters:
        - name: source_url
          in: query
          required: false
          schema:
            type: string
          description: Source URL context for the request.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
