openapi: '3.1.0'
info:
  title: PostHog
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://app.posthog.com/api
paths:
  /projects:
    get:
      operationId: listProjects
      summary: List all projects the caller has access to
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ph0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {personal_api_key}'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        organization:
                          type: string
                        created_at:
                          type: string
  /projects/{project_id}/events:
    get:
      operationId: listEvents
      summary: List events for a project
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ph0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: Project identifier.
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {personal_api_key}'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of events to return.
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination; return events after this timestamp.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        event:
                          type: string
                        timestamp:
                          type: string
                        properties:
                          type: object
                  next:
                    type:
                      - string
                      - 'null'
