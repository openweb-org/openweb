openapi: '3.1.0'
info:
  title: Shortcut
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.app.shortcut.com/api/v3
paths:
  /projects:
    get:
      operationId: listProjects
      summary: List all projects
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: sc0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Shortcut-Token
          in: header
          required: true
          schema:
            type: string
          description: API token for Shortcut authentication.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    description:
                      type: string
                    abbreviation:
                      type: string
                    created_at:
                      type: string
                    updated_at:
                      type: string
  /stories/{story-public-id}:
    get:
      operationId: getStory
      summary: Get a story by its public ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: sc0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: story-public-id
          in: path
          required: true
          schema:
            type: integer
          description: The public ID of the story.
        - name: Shortcut-Token
          in: header
          required: true
          schema:
            type: string
          description: API token for Shortcut authentication.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  story_type:
                    type: string
                  workflow_state_id:
                    type: integer
                  description:
                    type: string
                  project_id:
                    type:
                      - integer
                      - 'null'
                  created_at:
                    type: string
                  updated_at:
                    type: string
