openapi: '3.1.0'
info:
  title: Stripe
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.stripe.com/v1
paths:
  /charges:
    get:
      operationId: listCharges
      summary: List charges (most recent first)
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: st0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {secret_key}'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of charges to return (1-100).
        - name: starting_after
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination; charge ID to start after.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  has_more:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, amount, currency, status]
                      properties:
                        id:
                          type: string
                        amount:
                          type: integer
                        currency:
                          type: string
                        status:
                          type: string
                        description:
                          type:
                            - string
                            - 'null'
  /customers:
    get:
      operationId: listCustomers
      summary: List customers (most recent first)
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: st0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {secret_key}'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of customers to return (1-100).
        - name: email
          in: query
          required: false
          schema:
            type: string
          description: Filter by customer email.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  has_more:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, email, name]
                      properties:
                        id:
                          type: string
                        email:
                          type:
                            - string
                            - 'null'
                        name:
                          type:
                            - string
                            - 'null'
                        created:
                          type: integer
