openapi: '3.1.0'
info:
  title: Target API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://redsky.target.com
    x-openweb:
      transport: page
      auth:
        type: page_global
        expression: '__CONFIG__.defaultServicesApiKey'
        inject:
          query: key
paths:
  /redsky_aggregations/v1/web/plp_search_v2:
    get:
      operationId: searchProducts
      summary: Search products
      x-openweb:
        permission: read
        build:
          stable_id: tg0001a1
          tool_version: 1
          verified: false
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
          description: Search keyword.
        - name: count
          in: query
          required: false
          schema:
            type: integer
          description: Number of results.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
          description: Result offset for pagination.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
