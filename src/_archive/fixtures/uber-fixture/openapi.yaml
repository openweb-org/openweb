openapi: '3.1.0'
info:
  title: Uber API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.uber.com/api
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /trips:
    post:
      operationId: getTrips
      summary: Get recent trips
      x-openweb:
        permission: read
        build:
          stable_id: ub000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
