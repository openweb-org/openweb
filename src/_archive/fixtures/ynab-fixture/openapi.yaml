openapi: '3.1.0'
info:
  title: YNAB
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.ynab.com/v1
paths:
  /budgets:
    get:
      operationId: listBudgets
      summary: List all budgets for the authenticated user
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: yn0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Access token in the format "Bearer {token}".
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      budgets:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            last_modified_on:
                              type: string
                            first_month:
                              type: string
                            last_month:
                              type: string
  /budgets/{budget_id}:
    get:
      operationId: getBudget
      summary: Get a single budget by ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: yn0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Access token in the format "Bearer {token}".
        - name: budget_id
          in: path
          required: true
          schema:
            type: string
          description: Budget identifier.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      budget:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          last_modified_on:
                            type: string
                          accounts:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                name:
                                  type: string
                                type:
                                  type: string
                                balance:
                                  type: integer
