openapi: '3.1.0'
info:
  title: Advice Slip
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.adviceslip.com
paths:
  /advice:
    get:
      operationId: getRandomAdvice
      summary: Get a random advice slip
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: ad0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [slip]
                properties:
                  slip:
                    type: object
                    required: [id, advice]
                    properties:
                      id:
                        type: integer
                      advice:
                        type: string
  /advice/search/{query}:
    get:
      operationId: searchAdvice
      summary: Search for advice slips by query
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: ad0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: query
          in: path
          required: true
          schema:
            type: string
          description: Search term (e.g. "love").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [total_results, slips]
                properties:
                  total_results:
                    type: string
                  query:
                    type: string
                  slips:
                    type: array
                    items:
                      type: object
                      required: [id, advice]
                      properties:
                        id:
                          type: integer
                        advice:
                          type: string
