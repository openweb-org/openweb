openapi: '3.1.0'
info:
  title: Affirmations
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://www.affirmations.dev
paths:
  /:
    get:
      operationId: getAffirmation
      summary: Get a random affirmation
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: af0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [affirmation]
                properties:
                  affirmation:
                    type: string
