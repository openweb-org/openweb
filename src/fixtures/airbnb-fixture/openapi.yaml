openapi: '3.1.0'
info:
  title: Airbnb API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.airbnb.com/api/v3
    x-openweb:
      transport: node
      auth:
        type: cookie_session
components:
  parameters:
    X-Airbnb-API-Key:
      name: X-Airbnb-API-Key
      in: header
      required: true
      schema:
        type: string
        default: d306zoyjsyarp7ifhu67rjxn52tv0t20
      description: Airbnb client API key (constant).
    X-Airbnb-GraphQL-Platform:
      name: X-Airbnb-GraphQL-Platform
      in: header
      required: true
      schema:
        type: string
        default: web
      description: GraphQL platform identifier.
    X-CSRF-Without-Token:
      name: X-CSRF-Without-Token
      in: header
      required: true
      schema:
        type: string
        default: '1'
      description: CSRF bypass header.
paths:
  /{operationName}/{hash}:
    get:
      operationId: graphqlQuery
      summary: Execute a persisted GraphQL query
      x-openweb:
        permission: read
        build:
          stable_id: ab0001a1
          tool_version: 1
          verified: false
      parameters:
        - $ref: '#/components/parameters/X-Airbnb-API-Key'
        - $ref: '#/components/parameters/X-Airbnb-GraphQL-Platform'
        - $ref: '#/components/parameters/X-CSRF-Without-Token'
        - name: operationName
          in: path
          required: true
          schema:
            type: string
          description: GraphQL operation name.
        - name: hash
          in: path
          required: true
          schema:
            type: string
          description: Persisted query sha256 hash.
        - name: variables
          in: query
          required: false
          schema:
            type: string
          description: JSON-encoded variables.
        - name: extensions
          in: query
          required: false
          schema:
            type: string
          description: JSON-encoded extensions with persistedQuery hash.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
