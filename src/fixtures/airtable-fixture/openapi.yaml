openapi: '3.1.0'
info:
  title: Airtable
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.airtable.com/v0
paths:
  /{baseId}/{tableIdOrName}:
    get:
      operationId: listRecords
      summary: List records in a table
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: at0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token for Airtable API.
        - name: baseId
          in: path
          required: true
          schema:
            type: string
          description: Airtable base ID.
        - name: tableIdOrName
          in: path
          required: true
          schema:
            type: string
          description: Table ID or name.
        - name: maxRecords
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of records to return.
        - name: view
          in: query
          required: false
          schema:
            type: string
          description: Name or ID of a view to filter records.
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Number of records per page.
        - name: offset
          in: query
          required: false
          schema:
            type: string
          description: Pagination offset from a previous response.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [records]
                properties:
                  records:
                    type: array
                    items:
                      type: object
                      required: [id, fields, createdTime]
                      properties:
                        id:
                          type: string
                        fields:
                          type: object
                        createdTime:
                          type: string
                  offset:
                    type: string
  /{baseId}/{tableIdOrName}/{recordId}:
    get:
      operationId: getRecord
      summary: Get a single record by ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: at0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token for Airtable API.
        - name: baseId
          in: path
          required: true
          schema:
            type: string
          description: Airtable base ID.
        - name: tableIdOrName
          in: path
          required: true
          schema:
            type: string
          description: Table ID or name.
        - name: recordId
          in: path
          required: true
          schema:
            type: string
          description: Record ID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, fields, createdTime]
                properties:
                  id:
                    type: string
                  fields:
                    type: object
                  createdTime:
                    type: string
