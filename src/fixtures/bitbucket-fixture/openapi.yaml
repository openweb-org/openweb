openapi: '3.1.0'
info:
  title: Bitbucket
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.bitbucket.org/2.0
paths:
  /repositories/{workspace}:
    get:
      operationId: listRepos
      summary: List repositories in a workspace
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: bb0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Basic auth header. Format: Basic {base64(username:app_password)}'
        - name: workspace
          in: path
          required: true
          schema:
            type: string
          description: Workspace slug or UUID.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Query string to filter repositories.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number.
        - name: pagelen
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of results per page.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  size:
                    type: integer
                  page:
                    type: integer
                  values:
                    type: array
                    items:
                      type: object
                      required: [uuid, slug, full_name]
                      properties:
                        uuid:
                          type: string
                        slug:
                          type: string
                        full_name:
                          type: string
                        is_private:
                          type: boolean
                        scm:
                          type: string
  /repositories/{workspace}/{repo_slug}:
    get:
      operationId: getRepo
      summary: Get a specific repository
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: bb0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Basic auth header. Format: Basic {base64(username:app_password)}'
        - name: workspace
          in: path
          required: true
          schema:
            type: string
          description: Workspace slug or UUID.
        - name: repo_slug
          in: path
          required: true
          schema:
            type: string
          description: Repository slug.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [uuid, slug, full_name]
                properties:
                  uuid:
                    type: string
                  slug:
                    type: string
                  full_name:
                    type: string
                  is_private:
                    type: boolean
                  scm:
                    type: string
                  description:
                    type: string
                  created_on:
                    type: string
