openapi: '3.1.0'
info:
  title: Booking.com
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    compiled_at: '2026-03-24T00:00:00Z'
    requires_auth: false
servers:
  - url: https://www.booking.com
    x-openweb:
      transport: page
paths:
  /searchresults.html:
    get:
      operationId: searchProperties
      summary: Search hotels/properties in a destination — names, prices, ratings, distances
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0001
          signature_id: bk0001s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: searchProperties
      parameters:
        - name: ss
          in: query
          required: true
          schema:
            type: string
          description: Destination search query (e.g. "New York", "Paris", "Tokyo").
        - name: checkin
          in: query
          required: false
          schema:
            type: string
          description: Check-in date in YYYY-MM-DD format.
        - name: checkout
          in: query
          required: false
          schema:
            type: string
          description: Check-out date in YYYY-MM-DD format.
        - name: group_adults
          in: query
          required: false
          schema:
            type: integer
            default: 2
          description: Number of adult guests.
        - name: no_rooms
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Number of rooms.
      responses:
        '200':
          description: List of properties matching the search.
          content:
            application/json:
              schema:
                type: object
                required: [count, properties]
                properties:
                  count:
                    type: integer
                  properties:
                    type: array
                    items:
                      type: object
                      required: [name, url]
                      properties:
                        name:
                          type: string
                        url:
                          type: string
                        price:
                          type: [string, 'null']
                          description: Price per night (e.g. "$305").
                        rating:
                          type: [string, 'null']
                          description: Review score out of 10 (e.g. "8.9").
                        ratingText:
                          type: [string, 'null']
                          description: Rating label (e.g. "Excellent", "Very Good").
                        reviewCount:
                          type: [string, 'null']
                        distance:
                          type: [string, 'null']
                          description: Distance from downtown.

  /hotel/{country}/{slug}.html:
    get:
      operationId: getPropertyDetail
      summary: Get property details — name, rating, description, address, image from LD+JSON Hotel schema
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0002
          signature_id: bk0002s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyDetail
      parameters:
        - name: country
          in: path
          required: true
          schema:
            type: string
          description: Country code (e.g. "us", "gb", "fr").
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Property URL slug (e.g. "the-chemists-club-hotel-new-york").
      responses:
        '200':
          description: Property detail from LD+JSON Hotel schema.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: [string, 'null']
                  description:
                    type: [string, 'null']
                  rating:
                    type: [number, 'null']
                    description: Aggregate rating out of 10.
                  reviewCount:
                    type: [integer, 'null']
                  priceRange:
                    type: [string, 'null']
                  address:
                    type: [object, 'null']
                    properties:
                      street:
                        type: [string, 'null']
                      city:
                        type: [string, 'null']
                      region:
                        type: [string, 'null']
                      postalCode:
                        type: [string, 'null']
                      country:
                        type: [string, 'null']
                  image:
                    type: [string, 'null']
                    description: Main property image URL.
                  url:
                    type: [string, 'null']

  /internal/getPropertyReviews:
    get:
      operationId: getPropertyReviews
      summary: Get property review summary — overall score, 7 category subscores, featured review quotes
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0003
          signature_id: bk0003s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyReviews
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          description: Property URL slug — page must be on this property's page.
      responses:
        '200':
          description: Review summary extracted from the property page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  score:
                    type: [string, 'null']
                    description: Overall score out of 10 (e.g. "8.9").
                  reviewCount:
                    type: [string, 'null']
                  subscores:
                    type: [object, 'null']
                    description: Category scores — staff, facilities, cleanliness, comfort, value_for_money, location, free_wifi.
                  featured:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: [string, 'null']
                        author:
                          type: [string, 'null']
                        country:
                          type: [string, 'null']

  /internal/getPropertyRooms:
    get:
      operationId: getPropertyRooms
      summary: Get available room types — names, beds, sizes, facilities, prices
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0004
          signature_id: bk0004s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyRooms
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          description: Property URL slug — page must be on this property's page.
      responses:
        '200':
          description: Room types and pricing from the availability table.
          content:
            application/json:
              schema:
                type: object
                required: [count, rooms]
                properties:
                  count:
                    type: integer
                  rooms:
                    type: array
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                        bed:
                          type: [string, 'null']
                        size:
                          type: [string, 'null']
                        facilities:
                          type: array
                          items:
                            type: string
                        price:
                          type: [string, 'null']
                          description: Total price for the stay.
                        perNight:
                          type: [string, 'null']
                          description: Price per night.

  /internal/getPropertyFacilities:
    get:
      operationId: getPropertyFacilities
      summary: Get property amenities and facilities list
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0005
          signature_id: bk0005s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyFacilities
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          description: Property URL slug — page must be on this property's page.
      responses:
        '200':
          description: Property amenities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  popular:
                    type: array
                    items:
                      type: string
                    description: Most popular amenities (e.g. Free Wifi, Restaurant, Bar).
                  all:
                    type: [array, 'null']
                    items:
                      type: string
                    description: Full facilities list.
                  totalCount:
                    type: [integer, 'null']

  /internal/getPropertyLocation:
    get:
      operationId: getPropertyLocation
      summary: Get property location — nearby POIs with distances, location score, coordinates
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0006
          signature_id: bk0006s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyLocation
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          description: Property URL slug — page must be on this property's page.
      responses:
        '200':
          description: Location information.
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: [string, 'null']
                  locationScore:
                    type: [string, 'null']
                    description: Location rating text (e.g. "they rated it 9.7 for a two-person trip").
                  coordinates:
                    type: [object, 'null']
                    properties:
                      latitude:
                        type: string
                      longitude:
                        type: string
                  pois:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        distance:
                          type: [string, 'null']

  /internal/getPropertyPhotos:
    get:
      operationId: getPropertyPhotos
      summary: Get property photo gallery — image URLs from bstatic.com CDN
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0007
          signature_id: bk0007s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyPhotos
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          description: Property URL slug — page must be on this property's page.
      responses:
        '200':
          description: Property photo URLs.
          content:
            application/json:
              schema:
                type: object
                required: [count, photos]
                properties:
                  count:
                    type: integer
                  photos:
                    type: array
                    items:
                      type: string
                      description: Image URL on cf.bstatic.com.

  /internal/getPropertyHouseRules:
    get:
      operationId: getPropertyHouseRules
      summary: Get property house rules — check-in/out times, cancellation policies
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0008
          signature_id: bk0008s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyHouseRules
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          description: Property URL slug — page must be on this property's page.
      responses:
        '200':
          description: House rules.
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkIn:
                    type: [string, 'null']
                    description: Check-in time (e.g. "3:00 PM").
                  checkOut:
                    type: [string, 'null']
                    description: Check-out time (e.g. "11:00 AM").
                  cancellation:
                    type: [string, 'null']
                  fullText:
                    type: [string, 'null']

  /internal/getPropertyFAQ:
    get:
      operationId: getPropertyFAQ
      summary: Get property FAQ — common questions about the property
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0009
          signature_id: bk0009s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: getPropertyFAQ
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          description: Property URL slug — page must be on this property's page.
      responses:
        '200':
          description: FAQ questions.
          content:
            application/json:
              schema:
                type: object
                required: [count, questions]
                properties:
                  count:
                    type: integer
                  questions:
                    type: array
                    items:
                      type: string

  /searchresults.html?search_type=any:
    get:
      operationId: searchAll
      summary: Search Booking.com across all categories — hotels, flights, car rentals
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: bk0010
          signature_id: bk0010s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: booking-web
          operation: searchAll
      parameters:
        - name: ss
          in: query
          required: true
          schema:
            type: string
          description: Search query (e.g. "Paris", "London hotels").
      responses:
        '200':
          description: Search results across categories.
          content:
            application/json:
              schema:
                type: object
                required: [count, results]
                properties:
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      required: [name, url, type]
                      properties:
                        name:
                          type: string
                        url:
                          type: string
                        type:
                          type: string
                          description: Result type — "hotel", "flight", "car_rental", or "other".
