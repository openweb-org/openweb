openapi: '3.1.0'
info:
  title: Calendly
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.calendly.com
paths:
  /scheduled_events:
    get:
      operationId: listEvents
      summary: List scheduled events for a user
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ca0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token for Calendly API.
        - name: user
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Calendly user URI.
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of events to return.
        - name: page_token
          in: query
          required: false
          schema:
            type: string
          description: Token for the next page of results.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [collection, pagination]
                properties:
                  collection:
                    type: array
                    items:
                      type: object
                      required: [uri, name, status, start_time, end_time]
                      properties:
                        uri:
                          type: string
                        name:
                          type: string
                        status:
                          type: string
                        start_time:
                          type: string
                        end_time:
                          type: string
                  pagination:
                    type: object
                    properties:
                      count:
                        type: integer
                      next_page_token:
                        type:
                          - string
                          - 'null'
  /scheduled_events/{uuid}:
    get:
      operationId: getEvent
      summary: Get a single scheduled event by UUID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ca0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token for Calendly API.
        - name: uuid
          in: path
          required: true
          schema:
            type: string
          description: Scheduled event UUID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [resource]
                properties:
                  resource:
                    type: object
                    required: [uri, name, status, start_time, end_time]
                    properties:
                      uri:
                        type: string
                      name:
                        type: string
                      status:
                        type: string
                      start_time:
                        type: string
                      end_time:
                        type: string
