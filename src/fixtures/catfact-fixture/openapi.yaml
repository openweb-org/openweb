openapi: '3.1.0'
info:
  title: Cat Fact
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://catfact.ninja
paths:
  /fact:
    get:
      operationId: getFact
      summary: Get a random cat fact
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cf0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [fact, length]
                properties:
                  fact:
                    type: string
                  length:
                    type: integer
  /facts:
    get:
      operationId: listFacts
      summary: List cat facts with pagination
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cf0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of facts per page.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [fact, length]
                      properties:
                        fact:
                          type: string
                        length:
                          type: integer
                  current_page:
                    type: integer
                  last_page:
                    type: integer
                  total:
                    type: integer
