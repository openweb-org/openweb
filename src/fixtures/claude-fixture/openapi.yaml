openapi: '3.1.0'
info:
  title: Claude API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://claude.ai/api
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /organizations/{org_id}/chat_conversations:
    get:
      operationId: listConversations
      summary: List conversations
      x-openweb:
        permission: read
        build:
          stable_id: cl0a1b2c
          tool_version: 1
          verified: false
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
          description: Organization ID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
