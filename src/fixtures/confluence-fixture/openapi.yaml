openapi: '3.1.0'
info:
  title: Confluence
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://example.atlassian.net/api/v2
paths:
  /pages:
    get:
      operationId: getPages
      summary: List pages in a space
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cf0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Basic auth header — Base64-encoded "email:api-token".
        - name: space-id
          in: query
          required: false
          schema:
            type: string
          description: Filter pages by space ID.
        - name: title
          in: query
          required: false
          schema:
            type: string
          description: Filter pages by title.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
          description: Maximum number of results.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor from a previous response.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [id, title, status]
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        status:
                          type: string
                        spaceId:
                          type: string
                  _links:
                    type: object
                    properties:
                      next:
                        type: string
  /pages/{id}:
    get:
      operationId: getPage
      summary: Get a single page by ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: cf0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Basic auth header — Base64-encoded "email:api-token".
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Page ID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, title, status]
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  status:
                    type: string
                  spaceId:
                    type: string
                  body:
                    type: object
