openapi: '3.1.0'
info:
  title: Costco API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.costco.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /api/product/v1/products/graphql:
    post:
      operationId: searchProducts
      summary: Search products via GraphQL
      x-openweb:
        permission: read
        build:
          stable_id: co0001a1
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
