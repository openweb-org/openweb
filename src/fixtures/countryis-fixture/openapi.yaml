openapi: '3.1.0'
info:
  title: Country.is
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.country.is
paths:
  /{ip}:
    get:
      operationId: getCountry
      summary: Get country for an IP address
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: ci0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: ip
          in: path
          required: true
          schema:
            type: string
          description: IP address to look up (e.g. "8.8.8.8").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [ip, country]
                properties:
                  ip:
                    type: string
                  country:
                    type: string
