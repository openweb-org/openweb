openapi: '3.1.0'
info:
  title: Discord API
  version: '9'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://discord.com/api/v9
    x-openweb:
      transport: page
      auth:
        type: webpack_module_walk
        chunk_global: webpackChunkdiscord_app
        module_test: getToken
        call: getToken
        inject:
          header: Authorization
paths:
  /users/@me:
    get:
      operationId: getMe
      summary: Get the current user
      x-openweb:
        risk_tier: safe
        stable_id: discord0001
        tool_version: 1
        verified: true
        signals:
          - status-match
      responses:
        '200':
          description: Current user object
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  discriminator:
                    type: string
                  avatar:
                    type:
                      - string
                      - 'null'
                  email:
                    type: string
                required:
                  - id
                  - username
  /users/@me/guilds:
    get:
      operationId: getGuilds
      summary: List guilds the user belongs to
      x-openweb:
        risk_tier: safe
        stable_id: discord0002
        tool_version: 1
        verified: true
        signals:
          - status-match
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
          description: Max number of guilds to return (1-200)
      responses:
        '200':
          description: Array of guild objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    icon:
                      type: string
                    owner:
                      type: boolean
                  required:
                    - id
                    - name
  /channels/{channel_id}/messages:
    get:
      operationId: getChannelMessages
      summary: Get messages from a channel
      x-openweb:
        risk_tier: safe
        stable_id: discord0003
        tool_version: 1
        verified: true
        signals:
          - status-match
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
          description: The channel ID to fetch messages from
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Max number of messages to return (1-100)
      responses:
        '200':
          description: Array of message objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    content:
                      type: string
                    author:
                      type: object
                    timestamp:
                      type: string
                  required:
                    - id
                    - content
                    - author
                    - timestamp
