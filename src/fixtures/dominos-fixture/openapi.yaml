openapi: '3.1.0'
info:
  title: "Domino's API"
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.dominos.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /api/web-bff/graphql:
    post:
      operationId: graphqlQuery
      summary: "Execute a GraphQL query against Domino's API"
      x-openweb:
        permission: read
        build:
          stable_id: dm0a1b2c
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
