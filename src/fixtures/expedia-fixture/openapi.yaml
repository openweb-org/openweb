openapi: '3.1.0'
info:
  title: Expedia API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.expedia.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /graphql:
    post:
      operationId: graphqlQuery
      summary: Execute a GraphQL query
      x-openweb:
        permission: read
        build:
          stable_id: ex0001a1
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
