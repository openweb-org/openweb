openapi: '3.1.0'
info:
  title: RandomFox
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://randomfox.ca
paths:
  /floof/:
    get:
      operationId: getRandomFox
      summary: Get a random fox image URL
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: fx0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [image, link]
                properties:
                  image:
                    type: string
                  link:
                    type: string
