openapi: '3.1.0'
info:
  title: GitHub (Public)
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.github.com
paths:
  /repositories:
    get:
      operationId: listPublicRepos
      summary: List all public repositories in the order they were created
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: ghp0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: integer
          description: Repository ID to start listing from.
        - name: User-Agent
          in: header
          required: true
          schema:
            type: string
            default: openweb/1.0
          description: GitHub API requires a User-Agent header.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, node_id, name, full_name, private, owner, html_url]
                  properties:
                    id:
                      type: integer
                    node_id:
                      type: string
                    name:
                      type: string
                    full_name:
                      type: string
                    private:
                      type: boolean
                    owner:
                      type: object
                      properties:
                        login:
                          type: string
                        id:
                          type: integer
                        avatar_url:
                          type: string
                        html_url:
                          type: string
                        type:
                          type: string
                    html_url:
                      type: string
                    description:
                      type:
                        - string
                        - 'null'
  /repos/{owner}/{repo}/stargazers:
    get:
      operationId: listRepoStargazers
      summary: List users who have starred a repository
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: ghp0002
          tool_version: 1
          verified: true
          signals:
            - status-match
        pagination:
          type: link_header
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          description: Repository owner (user or organization).
        - name: repo
          in: path
          required: true
          schema:
            type: string
          description: Repository name.
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 30
          description: Results per page.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number.
        - name: User-Agent
          in: header
          required: true
          schema:
            type: string
            default: openweb/1.0
          description: GitHub API requires a User-Agent header.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [login, id, avatar_url, html_url, type]
                  properties:
                    login:
                      type: string
                    id:
                      type: integer
                    avatar_url:
                      type: string
                    html_url:
                      type: string
                    type:
                      type: string
