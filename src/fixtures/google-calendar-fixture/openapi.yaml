openapi: '3.1.0'
info:
  title: Google Calendar API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.googleapis.com/calendar/v3
    x-openweb:
      transport: page
      auth:
        type: cookie_session
paths:
  /users/me/calendarList:
    get:
      operationId: listCalendars
      summary: List user's calendars via gapi.client
      x-openweb:
        permission: read
        build:
          stable_id: gc0001a1
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
