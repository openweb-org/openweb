openapi: '3.1.0'
info:
  title: Google Drive API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.googleapis.com/drive/v3
    x-openweb:
      transport: page
      auth:
        type: page_global
        expression: 'gapi.auth.getToken().access_token'
        inject:
          header: Authorization
          prefix: 'Bearer '
paths:
  /files:
    get:
      operationId: listFiles
      summary: List files in Google Drive
      x-openweb:
        permission: read
        build:
          stable_id: gd000001
          tool_version: 1
          verified: false
      parameters:
        - name: q
          in: query
          required: false
          description: Search query
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
