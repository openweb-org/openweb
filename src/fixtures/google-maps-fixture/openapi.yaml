openapi: '3.1.0'
info:
  title: Google Maps
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://maps.googleapis.com/maps/api
paths:
  /geocode/json:
    get:
      operationId: geocode
      summary: Convert an address to geographic coordinates
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: gm0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: Google Maps API key.
        - name: address
          in: query
          required: true
          schema:
            type: string
          description: Address to geocode.
        - name: language
          in: query
          required: false
          schema:
            type: string
          description: Language for results.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        formatted_address:
                          type: string
                        geometry:
                          type: object
                          properties:
                            location:
                              type: object
                              properties:
                                lat:
                                  type: number
                                lng:
                                  type: number
                        place_id:
                          type: string
  /place/textsearch/json:
    get:
      operationId: searchPlaces
      summary: Search for places by text query
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: gm0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: Google Maps API key.
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Text query to search for places.
        - name: radius
          in: query
          required: false
          schema:
            type: integer
          description: Search radius in meters.
        - name: language
          in: query
          required: false
          schema:
            type: string
          description: Language for results.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        formatted_address:
                          type: string
                        geometry:
                          type: object
                          properties:
                            location:
                              type: object
                              properties:
                                lat:
                                  type: number
                                lng:
                                  type: number
                        place_id:
                          type: string
                        rating:
                          type: number
