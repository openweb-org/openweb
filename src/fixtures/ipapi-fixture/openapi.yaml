openapi: '3.1.0'
info:
  title: IP API
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://ipapi.co
paths:
  /{ip}/json:
    get:
      operationId: lookupIp
      summary: Look up geolocation data for an IP address
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ip0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: ip
          in: path
          required: true
          schema:
            type: string
          description: IP address to look up (e.g. "8.8.8.8").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [ip, city, region, country_name, latitude, longitude, org, timezone]
                properties:
                  ip:
                    type: string
                  city:
                    type: string
                  region:
                    type: string
                  country_name:
                    type: string
                  latitude:
                    type: number
                  longitude:
                    type: number
                  org:
                    type: string
                  timezone:
                    type: string
