openapi: '3.1.0'
info:
  title: Jira
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://example.atlassian.net/rest/api/3
paths:
  /search:
    get:
      operationId: searchIssues
      summary: Search for issues using JQL
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ji0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Basic auth header — Base64-encoded "email:api-token".
        - name: jql
          in: query
          required: true
          schema:
            type: string
          description: JQL query string.
        - name: maxResults
          in: query
          required: false
          schema:
            type: integer
            default: 50
          description: Maximum number of results to return.
        - name: startAt
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Index of the first result to return.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [issues, total, maxResults, startAt]
                properties:
                  startAt:
                    type: integer
                  maxResults:
                    type: integer
                  total:
                    type: integer
                  issues:
                    type: array
                    items:
                      type: object
                      required: [id, key, self]
                      properties:
                        id:
                          type: string
                        key:
                          type: string
                        self:
                          type: string
                        fields:
                          type: object
  /issue/{issueIdOrKey}:
    get:
      operationId: getIssue
      summary: Get a single issue by ID or key
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ji0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Basic auth header — Base64-encoded "email:api-token".
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
          description: Issue ID or key (e.g. "PROJ-123").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, key, self]
                properties:
                  id:
                    type: string
                  key:
                    type: string
                  self:
                    type: string
                  fields:
                    type: object
