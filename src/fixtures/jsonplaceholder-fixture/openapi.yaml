openapi: '3.1.0'
info:
  title: JSONPlaceholder
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /posts:
    get:
      operationId: listPosts
      summary: List posts with optional limit
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: jp0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: _limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Maximum number of posts to return.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [userId, id, title, body]
                  properties:
                    userId:
                      type: integer
                    id:
                      type: integer
                    title:
                      type: string
                    body:
                      type: string
    post:
      operationId: createPost
      summary: Create a new post
      x-openweb:
        transport: node
        permission: write
        build:
          stable_id: jp0003
          tool_version: 1
          verified: true
          signals:
            - status-match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body, userId]
              properties:
                title:
                  type: string
                body:
                  type: string
                userId:
                  type: integer
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                type: object
                required: [id, title, body, userId]
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  body:
                    type: string
                  userId:
                    type: integer
  /posts/{id}:
    get:
      operationId: getPost
      summary: Get a single post by ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: jp0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Post ID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [userId, id, title, body]
                properties:
                  userId:
                    type: integer
                  id:
                    type: integer
                  title:
                    type: string
                  body:
                    type: string
