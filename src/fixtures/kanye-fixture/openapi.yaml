openapi: '3.1.0'
info:
  title: Kanye Rest
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.kanye.rest
paths:
  /:
    get:
      operationId: getQuote
      summary: Get a random Kanye West quote
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ky0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [quote]
                properties:
                  quote:
                    type: string
