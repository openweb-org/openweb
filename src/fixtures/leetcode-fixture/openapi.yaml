openapi: '3.1.0'
info:
  title: LeetCode API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://leetcode.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
      csrf:
        type: cookie_to_header
        cookie: csrftoken
        header: x-csrftoken
paths:
  /graphql:
    post:
      operationId: graphqlQuery
      summary: Execute a GraphQL query
      x-openweb:
        permission: read
        build:
          stable_id: lc0a1b2c
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
