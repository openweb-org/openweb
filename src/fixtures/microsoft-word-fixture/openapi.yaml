openapi: '3.1.0'
info:
  title: Microsoft Word Graph API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://word.cloud.microsoft
    x-openweb:
      mode: session_http
      auth:
        type: sessionStorage_msal
        key_pattern: msal.token.keys.*
        scope_filter: user.read
        token_field: secret
        inject:
          header: Authorization
          prefix: 'Bearer '
paths:
  'https://graph.microsoft.com/v1.0/me':
    get:
      operationId: getProfile
      summary: Get the signed-in Microsoft Graph profile from Word's MSAL cache
      x-openweb:
        risk_tier: safe
        stable_id: mw0001
        tool_version: 1
        verified: true
        signals:
          - msal_storage
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  displayName:
                    type: string
                  userPrincipalName:
                    type: string
                  mail:
                    type: string
