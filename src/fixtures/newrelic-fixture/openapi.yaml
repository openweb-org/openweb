openapi: '3.1.0'
info:
  title: New Relic GraphQL API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://one.newrelic.com
    x-openweb:
      mode: session_http
      auth:
        type: cookie_session
paths:
  /graphql:
    post:
      operationId: listDashboards
      summary: List dashboards via GraphQL entity search
      x-openweb:
        risk_tier: safe
        stable_id: nr0001
        tool_version: 1
        verified: true
        signals:
          - status-match
        pagination:
          type: cursor
          response_field: data.actor.entitySearch.results.nextCursor
          request_param: variables.cursor
      parameters:
        - name: newrelic-requesting-services
          in: header
          required: false
          schema:
            type: string
            default: 'platform|nr1-ui'
          description: First-party service identifier.
        - name: x-requested-with
          in: header
          required: false
          schema:
            type: string
            default: XMLHttpRequest
          description: XHR marker header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: GraphQL query string.
                  default: >-
                    query ListDashboards($cursor: String) {
                      actor {
                        entitySearch(query: "domain = 'VIZ' AND type = 'DASHBOARD'") {
                          results(cursor: $cursor) {
                            entities {
                              guid
                              name
                              accountId
                              type
                              domain
                              ... on DashboardEntityOutline {
                                owner { email userId }
                                permissions
                                dashboardParentGuid
                              }
                            }
                            nextCursor
                          }
                          count
                        }
                      }
                    }
                variables:
                  type: object
                  description: GraphQL variables (cursor injected by pagination).
                  default: {}
                  properties:
                    cursor:
                      type: string
                      description: Pagination cursor for the next page.
      responses:
        '200':
          description: GraphQL response with dashboard entities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      actor:
                        type: object
                        properties:
                          entitySearch:
                            type: object
                            properties:
                              count:
                                type: integer
                              results:
                                type: object
                                properties:
                                  entities:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        guid:
                                          type: string
                                        name:
                                          type: string
                                        accountId:
                                          type: integer
                                        type:
                                          type: string
                                        domain:
                                          type: string
                                        owner:
                                          type: object
                                          properties:
                                            email:
                                              type: string
                                            userId:
                                              type: integer
                                        permissions:
                                          type: string
                                        dashboardParentGuid:
                                          type:
                                            - string
                                            - 'null'
                                  nextCursor:
                                    type:
                                      - string
                                      - 'null'
