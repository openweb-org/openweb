openapi: '3.1.0'
info:
  title: Notion
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.notion.com/v1
paths:
  /search:
    post:
      operationId: searchPages
      summary: Search pages and databases by title
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: nt0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token for Notion integration.
        - name: Notion-Version
          in: header
          required: true
          schema:
            type: string
            default: '2022-06-28'
          description: Notion API version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Search query string.
                page_size:
                  type: integer
                  description: Maximum number of results.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [results, has_more]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [id, object]
                      properties:
                        id:
                          type: string
                        object:
                          type: string
                        url:
                          type: string
                  has_more:
                    type: boolean
                  next_cursor:
                    type:
                      - string
                      - 'null'
  /pages/{page_id}:
    get:
      operationId: getPage
      summary: Retrieve a page by ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: nt0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token for Notion integration.
        - name: Notion-Version
          in: header
          required: true
          schema:
            type: string
            default: '2022-06-28'
          description: Notion API version.
        - name: page_id
          in: path
          required: true
          schema:
            type: string
          description: Page ID (UUID).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, object]
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  url:
                    type: string
                  properties:
                    type: object
