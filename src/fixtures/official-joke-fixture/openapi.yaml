openapi: '3.1.0'
info:
  title: Official Joke API
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://official-joke-api.appspot.com
paths:
  /random_joke:
    get:
      operationId: getRandomJoke
      summary: Get a random joke
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: oj0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [type, setup, punchline, id]
                properties:
                  type:
                    type: string
                  setup:
                    type: string
                  punchline:
                    type: string
                  id:
                    type: integer
