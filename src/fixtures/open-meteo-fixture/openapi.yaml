openapi: '3.1.0'
info:
  title: Open-Meteo
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    compiled_at: '2026-03-04T00:00:00Z'
    requires_auth: false
servers:
  - url: https://api.open-meteo.com
paths:
  /v1/search:
    get:
      operationId: search_location
      summary: Search for a location by name (geocoding)
      servers:
        - url: https://geocoding-api.open-meteo.com
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          verified: true
          stable_id: 0e18811a69644d95
          signature_id: d1542cc530f44161
          tool_version: 1
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Location name.
        - name: count
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of matches.
        - name: language
          in: query
          required: false
          schema:
            type: string
          description: Response language code.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [name, latitude, longitude]
                      properties:
                        name:
                          type: string
                        latitude:
                          type: number
                        longitude:
                          type: number
                  generationtime_ms:
                    type: number
  /v1/forecast:
    get:
      operationId: get_forecast
      summary: Get hourly and daily weather forecast for a location
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          verified: true
          stable_id: ad259e4f9ecf4367
          signature_id: ef25de6136074dd0
          tool_version: 1
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
          description: Latitude in decimal degrees.
        - name: longitude
          in: query
          required: true
          schema:
            type: number
          description: Longitude in decimal degrees.
        - name: hourly
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Hourly weather variables.
        - name: daily
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Daily weather variables.
        - name: timezone
          in: query
          required: false
          schema:
            type: string
          description: Timezone identifier.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [latitude, longitude]
                properties:
                  latitude:
                    type: number
                  longitude:
                    type: number
                  hourly:
                    type: object
                  daily:
                    type: object
  /v1/archive:
    get:
      operationId: get_historical
      summary: Get historical weather data for a location
      servers:
        - url: https://archive-api.open-meteo.com
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          verified: true
          stable_id: 0c7ac34bc5df4f8d
          signature_id: 804682fffc434888
          tool_version: 1
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
          description: Latitude in decimal degrees.
        - name: longitude
          in: query
          required: true
          schema:
            type: number
          description: Longitude in decimal degrees.
        - name: start_date
          in: query
          required: true
          schema:
            type: string
          description: Start date YYYY-MM-DD.
        - name: end_date
          in: query
          required: true
          schema:
            type: string
          description: End date YYYY-MM-DD.
        - name: daily
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Daily weather variables.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [latitude, longitude]
                properties:
                  latitude:
                    type: number
                  longitude:
                    type: number
                  daily:
                    type: object
  /v1/air-quality:
    get:
      operationId: get_air_quality
      summary: Get air quality data for a location
      servers:
        - url: https://air-quality-api.open-meteo.com
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          verified: true
          stable_id: d45f1604dd2f4265
          signature_id: d76954444f8746e5
          tool_version: 1
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
          description: Latitude in decimal degrees.
        - name: longitude
          in: query
          required: true
          schema:
            type: number
          description: Longitude in decimal degrees.
        - name: hourly
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Air-quality hourly variables.
        - name: timezone
          in: query
          required: false
          schema:
            type: string
          description: Timezone identifier.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [latitude, longitude]
                properties:
                  latitude:
                    type: number
                  longitude:
                    type: number
                  hourly:
                    type: object
