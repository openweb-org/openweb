openapi: '3.1.0'
info:
  title: PokeAPI
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://pokeapi.co
paths:
  /api/v2/pokemon/{name}:
    get:
      operationId: getPokemon
      summary: Get Pokemon by name
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: pk0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Pokemon name or ID (e.g. "pikachu").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, name, height, weight, types]
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  height:
                    type: integer
                  weight:
                    type: integer
                  types:
                    type: array
                    items:
                      type: object
                      required: [type]
                      properties:
                        slot:
                          type: integer
                        type:
                          type: object
                          required: [name]
                          properties:
                            name:
                              type: string
                            url:
                              type: string
  /api/v2/pokemon:
    get:
      operationId: listPokemon
      summary: List Pokemon
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: pk0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of results to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Starting position in the result set.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [count, results]
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                  previous:
                    type: [string, 'null']
                  results:
                    type: array
                    items:
                      type: object
                      required: [name, url]
                      properties:
                        name:
                          type: string
                        url:
                          type: string
