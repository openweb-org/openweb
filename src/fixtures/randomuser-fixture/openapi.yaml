openapi: '3.1.0'
info:
  title: Random User
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://randomuser.me
paths:
  /api:
    get:
      operationId: getRandomUser
      summary: Get random user profile(s)
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: ru0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: results
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Number of user profiles to generate.
        - name: nat
          in: query
          required: false
          schema:
            type: string
          description: Nationality filter (e.g. "us", "gb", "de").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [results, info]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [name, email]
                      properties:
                        name:
                          type: object
                          required: [first, last]
                          properties:
                            title:
                              type: string
                            first:
                              type: string
                            last:
                              type: string
                        email:
                          type: string
                        phone:
                          type: string
                        nat:
                          type: string
                  info:
                    type: object
                    required: [results, page]
                    properties:
                      results:
                        type: integer
                      page:
                        type: integer
                      seed:
                        type: string
                      version:
                        type: string
