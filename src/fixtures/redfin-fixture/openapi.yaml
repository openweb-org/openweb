openapi: '3.1.0'
info:
  title: Redfin API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.redfin.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /stingray/api/gis:
    get:
      operationId: searchHomes
      summary: Search homes by map region
      x-openweb:
        permission: read
        build:
          stable_id: rf0001a1
          tool_version: 1
          verified: false
      parameters:
        - name: al
          in: query
          required: true
          schema:
            type: integer
          description: Area limit
        - name: num_homes
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
