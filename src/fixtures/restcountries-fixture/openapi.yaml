openapi: '3.1.0'
info:
  title: REST Countries
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://restcountries.com
paths:
  /v3.1/name/{name}:
    get:
      operationId: searchByName
      summary: Search countries by name
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: rc0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Country name or partial name to search for.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [name, population, region, flags]
                  properties:
                    name:
                      type: object
                      required: [common, official]
                      properties:
                        common:
                          type: string
                        official:
                          type: string
                    capital:
                      type: array
                      items:
                        type: string
                    region:
                      type: string
                    subregion:
                      type: string
                    population:
                      type: integer
                    flags:
                      type: object
                      required: [png, svg]
                      properties:
                        png:
                          type: string
                        svg:
                          type: string
  /v3.1/all:
    get:
      operationId: getAllCountries
      summary: Get all countries with optional field filtering
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: rc0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: fields
          in: query
          required: false
          schema:
            type: string
            default: 'name,capital,region,population'
          description: Comma-separated field names to include in the response.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: object
                      properties:
                        common:
                          type: string
                        official:
                          type: string
                    capital:
                      type: array
                      items:
                        type: string
                    region:
                      type: string
                    population:
                      type: integer
