openapi: '3.1.0'
info:
  title: Retool API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://retool.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
      csrf:
        type: cookie_to_header
        cookie: xsrfToken
        header: X-Xsrf-Token
paths:
  /api/apps:
    get:
      operationId: listApps
      summary: List Retool apps
      x-openweb:
        permission: read
        build:
          stable_id: rt0001a1
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
