openapi: '3.1.0'
info:
  title: Reuters
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    compiled_at: '2026-03-24T00:00:00Z'
    requires_auth: false
servers:
  - url: https://www.reuters.com
    x-openweb:
      transport: page
paths:
  /:
    get:
      operationId: getTopNews
      summary: Get top news headlines from Reuters homepage
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: rt0001
          signature_id: rt0001s
          tool_version: 1
          signals:
            - fusion_content_cache
        extraction:
          type: page_global_data
          expression: |
            (() => {
              const gc = window.Fusion?.globalContent;
              if (!gc?.result?.articles) return { items: [] };
              const articles = gc.result.articles;
              return {
                count: articles.length,
                items: articles.slice(0, 30).map(a => ({
                  id: a.id,
                  title: a.title || a.headlines?.basic,
                  description: a.description?.basic || null,
                  url: a.canonical_url || null,
                  publishedAt: a.display_date || a.published_time || null,
                  updatedAt: a.last_updated_date || null,
                  kicker: a.kicker?.name || null,
                  authors: a.authors?.map(au => au.name) || [],
                  thumbnail: a.thumbnail?.renditions?.original?.url || null,
                })),
              };
            })()
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [count, items]
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, title]
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        description:
                          type: [string, 'null']
                        url:
                          type: [string, 'null']
                        publishedAt:
                          type: [string, 'null']
                        updatedAt:
                          type: [string, 'null']
                        kicker:
                          type: [string, 'null']
                        authors:
                          type: array
                          items:
                            type: string
                        thumbnail:
                          type: [string, 'null']
  /site-search/:
    get:
      operationId: searchArticles
      summary: Search Reuters articles by keyword
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: rt0002
          signature_id: rt0002s
          tool_version: 1
          signals:
            - pf_api
        extraction:
          type: page_global_data
          expression: |
            (() => {
              const cc = window.Fusion?.contentCache;
              if (!cc) return { items: [] };
              const searchCache = cc['articles-by-search-v2'];
              if (!searchCache) return { items: [] };
              const entries = Object.values(searchCache);
              for (const entry of entries) {
                const result = entry?.data?.result;
                if (result?.articles) {
                  return {
                    count: result.pagination?.total_size || result.articles.length,
                    offset: result.pagination?.offset || 0,
                    items: result.articles.map(a => ({
                      id: a.id,
                      title: a.title || a.headlines?.basic,
                      description: a.description?.basic || null,
                      url: a.canonical_url || null,
                      publishedAt: a.display_date || a.published_time || null,
                      kicker: a.kicker?.name || null,
                      authors: a.authors?.map(au => au.name) || [],
                      thumbnail: a.thumbnail?.renditions?.original?.url || null,
                    })),
                  };
                }
              }
              return { items: [] };
            })()
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search query (e.g. "tesla", "climate change", "fed interest rates").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  count:
                    type: integer
                  offset:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, title]
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        description:
                          type: [string, 'null']
                        url:
                          type: [string, 'null']
                        publishedAt:
                          type: [string, 'null']
                        kicker:
                          type: [string, 'null']
                        authors:
                          type: array
                          items:
                            type: string
                        thumbnail:
                          type: [string, 'null']
  /{section}/{subsection}/{slug}:
    get:
      operationId: getArticle
      summary: Get full article — title, body paragraphs, authors, date
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: rt0003
          signature_id: rt0003s
          tool_version: 1
          signals:
            - fusion_global_content
        extraction:
          type: page_global_data
          adapter: ./adapters/reuters.ts
          method: extractArticle
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Top-level section (world, business, technology, legal, sustainability).
        - name: subsection
          in: path
          required: true
          schema:
            type: string
          description: Subsection within the section (e.g. "europe", "us", "asia-pacific").
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Article slug (e.g. "denmarks-left-wing-bloc-leads-election-2026-03-24").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, title]
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  description:
                    type: [string, 'null']
                  publishedAt:
                    type: [string, 'null']
                  updatedAt:
                    type: [string, 'null']
                  authors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  kicker:
                    type: [string, 'null']
                  wordCount:
                    type: [integer, 'null']
                  readMinutes:
                    type: [integer, 'null']
                  body:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        content:
                          type: [string, 'null']
                  thumbnail:
                    type: [string, 'null']
                  canonicalUrl:
                    type: [string, 'null']
  /world/:
