components:
  schemas:
    ArticleList:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [id, title]
            properties:
              id:
                type: string
              title:
                type: string
              description:
                type: [string, 'null']
              url:
                type: [string, 'null']
              publishedAt:
                type: [string, 'null']
              kicker:
                type: [string, 'null']
              authors:
                type: array
                items:
                  type: string
              thumbnail:
                type: [string, 'null']
    Quote:
      type: object
      required: [ric, name]
      properties:
        ric:
          type: string
          description: Reuters Instrument Code.
        name:
          type: string
        type:
          type: [string, 'null']
          description: Security type (Index, Equity, Commodity Future, Currency, Bond).
        last:
          type: [number, 'null']
          description: Last traded price.
        percentChange:
          type: [number, 'null']
          description: Percent change from previous close.
        currency:
          type: [string, 'null']
