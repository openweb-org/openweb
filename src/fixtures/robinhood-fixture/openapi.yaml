openapi: '3.1.0'
info:
  title: Robinhood API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://api.robinhood.com
    x-openweb:
      transport: node
      auth:
        type: localStorage_jwt
        key: 'web:auth_state'
        path: access_token
        inject:
          header: Authorization
          prefix: 'Bearer '
paths:
  /accounts/:
    get:
      operationId: getAccounts
      summary: Get user accounts
      x-openweb:
        permission: read
        build:
          stable_id: rh000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
