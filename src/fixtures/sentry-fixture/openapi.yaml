openapi: '3.1.0'
info:
  title: Sentry
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://sentry.io/api/0
paths:
  /projects/:
    get:
      operationId: listProjects
      summary: List projects available to the authenticated user
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: sn0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, slug, name]
                  properties:
                    id:
                      type: string
                    slug:
                      type: string
                    name:
                      type: string
                    platform:
                      type: string
  /projects/{organization_slug}/{project_slug}/issues/:
    get:
      operationId: listIssues
      summary: List issues for a project
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: sn0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
        - name: organization_slug
          in: path
          required: true
          schema:
            type: string
          description: Organization slug.
        - name: project_slug
          in: path
          required: true
          schema:
            type: string
          description: Project slug.
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Search query string.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, title, status]
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    status:
                      type: string
                    level:
                      type: string
                    count:
                      type: string
