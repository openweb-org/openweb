openapi: '3.1.0'
info:
  title: Starbucks API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.starbucks.com/apiproxy/v1
    x-openweb:
      transport: page
      auth:
        type: cookie_session
paths:
  /rewards:
    get:
      operationId: getRewards
      summary: Get rewards balance
      x-openweb:
        permission: read
        build:
          stable_id: sb000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
