openapi: '3.1.0'
info:
  title: Steam API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://store.steampowered.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /account:
    get:
      operationId: getAccountDetails
      summary: Get account details page data
      x-openweb:
        permission: read
        build:
          stable_id: st0a1b2c
          tool_version: 1
          verified: false
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
