openapi: '3.1.0'
info:
  title: Supabase
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.supabase.com/v1
paths:
  /projects:
    get:
      operationId: listProjects
      summary: List all projects for the authenticated user
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: sb0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, name, region, status]
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    region:
                      type: string
                    status:
                      type: string
                    created_at:
                      type: string
  /projects/{ref}:
    get:
      operationId: getProject
      summary: Get a specific project by reference ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: sb0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
        - name: ref
          in: path
          required: true
          schema:
            type: string
          description: Project reference ID.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, name, region, status]
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  region:
                    type: string
                  status:
                    type: string
                  created_at:
                    type: string
                  database:
                    type: object
                    properties:
                      host:
                        type: string
                      version:
                        type: string
