openapi: '3.1.0'
info:
  title: Microsoft Teams API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://teams.live.com/api/chatsvc/consumer
    x-openweb:
      transport: node
      auth:
        type: sessionStorage_msal
        key_pattern: accesstoken
        scope_filter: api.spaces.skype.com
        token_field: secret
        inject:
          header: Authentication
          prefix: 'skypetoken='
paths:
  /threads:
    get:
      operationId: getChats
      summary: Get chat threads
      x-openweb:
        permission: read
        build:
          stable_id: ms000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
