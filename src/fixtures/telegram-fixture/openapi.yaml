openapi: '3.1.0'
info:
  title: Telegram Web A
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://web.telegram.org
    x-openweb:
      transport: page
paths:
  /internal/dialogs:
    get:
      operationId: getDialogs
      summary: Get dialog/chat list from Telegram global state
      x-openweb:
        risk_tier: safe
        build:
          stable_id: tg0001
          tool_version: 1
          verified: true
          signals:
            - adapter-verified
        adapter:
          name: telegram-protocol
          operation: getDialogs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Max number of dialogs to return
      responses:
        '200':
          description: Array of dialog objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    type:
                      type: string
                  required:
                    - id
                    - title
  /internal/me:
    get:
      operationId: getMe
      summary: Get current user info
      x-openweb:
        risk_tier: safe
        build:
          stable_id: tg0002
          tool_version: 1
          verified: true
          signals:
            - adapter-verified
        adapter:
          name: telegram-protocol
          operation: getMe
      responses:
        '200':
          description: Current user object
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  firstName:
                    type: string
                  lastName:
                    type: string
                  username:
                    type: string
                required:
                  - id
  /internal/messages:
    get:
      operationId: getMessages
      summary: Get messages from a specific chat
      x-openweb:
        risk_tier: low
        build:
          stable_id: tg0003
          tool_version: 1
          verified: true
          signals:
            - adapter-verified
        adapter:
          name: telegram-protocol
          operation: getMessages
      parameters:
        - name: chatId
          in: query
          required: true
          schema:
            type: string
          description: Chat ID (e.g. -1001625429257)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Max messages to return
      responses:
        '200':
          description: Array of message objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    chatId:
                      type: string
                    date:
                      type: integer
                    text:
                      type: string
                  required:
                    - id
                    - chatId
