openapi: '3.1.0'
info:
  title: TripAdvisor
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    compiled_at: '2026-03-24T00:00:00Z'
    requires_auth: false
servers:
  - url: https://www.tripadvisor.com
    x-openweb:
      transport: page
paths:
  /Hotels-g{geoId}-{slug}-Hotels.html:
    get:
      operationId: searchHotels
      summary: Search hotels in a destination by geo ID — names, ratings, review counts
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0001
          signature_id: ta0001s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: tripadvisor-web
          operation: searchHotels
      parameters:
        - name: geoId
          in: path
          required: true
          schema:
            type: string
          description: TripAdvisor geo ID (e.g. "60763" for New York City, "187147" for Paris).
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: URL slug for the destination (e.g. "New_York_City_New_York").
      responses:
        '200':
          description: List of hotels in the destination.
          content:
            application/json:
              schema:
                type: object
                required: [count, hotels]
                properties:
                  count:
                    type: integer
                  hotels:
                    type: array
                    items:
                      type: object
                      required: [name, url]
                      properties:
                        name:
                          type: string
                        url:
                          type: string
                        locationId:
                          type: [string, 'null']
                        rating:
                          type: [string, 'null']
                        reviewCount:
                          type: [string, 'null']

  /Hotel_Review-g{geoId}-d{locationId}-Reviews-{slug}.html:
    get:
      operationId: getHotelDetail
      summary: Get hotel details — name, rating, review count, price range, address, amenities
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0002
          signature_id: ta0002s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: tripadvisor-web
          operation: getHotelDetail
      parameters:
        - name: geoId
          in: path
          required: true
          schema:
            type: string
          description: TripAdvisor geo ID.
        - name: locationId
          in: path
          required: true
          schema:
            type: string
          description: Hotel location ID (e.g. "93437" for The Plaza).
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Hotel URL slug (e.g. "The_Plaza-New_York_City_New_York").
      responses:
        '200':
          description: Hotel detail from LD+JSON structured data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: [string, 'null']
                  rating:
                    type: [string, 'null']
                    description: Aggregate rating (e.g. "4.5").
                  reviewCount:
                    type: [integer, 'null']
                  priceRange:
                    type: [string, 'null']
                  starRating:
                    type: [string, 'null']
                  address:
                    type: [object, 'null']
                    properties:
                      street:
                        type: [string, 'null']
                      city:
                        type: [string, 'null']
                      region:
                        type: [string, 'null']
                      postalCode:
                        type: [string, 'null']
                      country:
                        type: [string, 'null']
                  telephone:
                    type: [string, 'null']
                  url:
                    type: [string, 'null']
                  images:
                    type: array
                    items:
                      type: string
                  amenities:
                    type: array
                    items:
                      type: string

  /internal/getHotelReviews:
    get:
      operationId: getHotelReviews
      summary: Get hotel review summary — rating breakdown, sub-ratings, AI summary
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0003
          signature_id: ta0003s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: tripadvisor-web
          operation: getHotelReviews
      parameters:
        - name: geoId
          in: query
          required: true
          schema:
            type: string
          description: TripAdvisor geo ID.
        - name: locationId
          in: query
          required: true
          schema:
            type: string
          description: Hotel location ID — page must be on this hotel's review page.
      responses:
        '200':
          description: Review summary extracted from the hotel page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  breakdown:
                    type: [object, 'null']
                    properties:
                      excellent:
                        type: integer
                      good:
                        type: integer
                      average:
                        type: integer
                      poor:
                        type: integer
                      terrible:
                        type: integer
                  subRatings:
                    type: [object, 'null']
                    description: Sub-ratings like rooms, service, value, cleanliness, location.
                  aiSummary:
                    type: [string, 'null']
                    description: AI-generated review summary.

  /internal/getHotelPrices:
    get:
      operationId: getHotelPrices
      summary: Get hotel pricing — current price and deal count from booking partners
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0004
          signature_id: ta0004s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: tripadvisor-web
          operation: getHotelPrices
      parameters:
        - name: geoId
          in: query
          required: true
          schema:
            type: string
          description: TripAdvisor geo ID.
        - name: locationId
          in: query
          required: true
          schema:
            type: string
          description: Hotel location ID — page must be on this hotel's page.
      responses:
        '200':
          description: Hotel pricing information.
          content:
            application/json:
              schema:
                type: object
                properties:
                  price:
                    type: [string, 'null']
                    description: Current displayed price (e.g. "$189").
                  dealCount:
                    type: [integer, 'null']
                    description: Number of available deals.
                  lowestDealPrice:
                    type: [string, 'null']
                    description: Lowest deal price (e.g. "$151").
                  dealsDescription:
                    type: [string, 'null']

  /Restaurants-g{geoId}-{slug}.html:
    get:
      operationId: searchRestaurants
