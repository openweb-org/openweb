openapi: '3.1.0'
info:
  title: TripAdvisor API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.tripadvisor.com
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /data/graphql/ids:
    post:
      operationId: graphqlQuery
      summary: Execute a GraphQL query
      x-openweb:
        permission: read
        build:
          stable_id: ta000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
