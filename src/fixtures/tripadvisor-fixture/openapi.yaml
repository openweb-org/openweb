          schema:
            type: string
          description: Attraction location ID.
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Attraction URL slug.
      responses:
        '200':
          description: Attraction detail from LD+JSON.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: [string, 'null']
                  rating:
                    type: [string, 'null']
                  reviewCount:
                    type: [integer, 'null']
                  address:
                    type: [object, 'null']
                    properties:
                      street:
                        type: [string, 'null']
                      city:
                        type: [string, 'null']
                      region:
                        type: [string, 'null']
                      country:
                        type: [string, 'null']
                  telephone:
                    type: [string, 'null']
                  openingHours:
                    type: [string, array, 'null']
                  url:
                    type: [string, 'null']
                  geo:
                    type: [object, 'null']
                    properties:
                      latitude:
                        type: [number, string]
                      longitude:
                        type: [number, string]
                  images:
                    type: array
                    items:
                      type: string

  /Search:
    get:
      operationId: searchAll
      summary: Search TripAdvisor across all categories — hotels, restaurants, attractions
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0010
          signature_id: ta0010s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: tripadvisor-web
          operation: searchAll
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (e.g. "paris hotels", "tokyo restaurants").
      responses:
        '200':
          description: Search results across categories.
          content:
            application/json:
              schema:
                type: object
                required: [count, results]
                properties:
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      required: [name, url, type]
                      properties:
                        name:
                          type: string
                        url:
                          type: string
                        type:
                          type: string
                          description: Result type — "hotel", "restaurant", "attraction", or "destination".
