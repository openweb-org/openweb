                properties:
                  count:
                    type: integer
                  restaurants:
                    type: array
                    items:
                      type: object
                      required: [name, url]
                      properties:
                        name:
                          type: string
                        url:
                          type: string
                        locationId:
                          type: [string, 'null']
                        rating:
                          type: [string, 'null']
                        reviewCount:
                          type: [string, 'null']

  /Restaurant_Review-g{geoId}-d{locationId}-Reviews-{slug}.html:
    get:
      operationId: getRestaurantDetail
      summary: Get restaurant details — name, rating, cuisine, price range, address
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0006
          signature_id: ta0006s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: tripadvisor-web
          operation: getRestaurantDetail
      parameters:
        - name: geoId
          in: path
