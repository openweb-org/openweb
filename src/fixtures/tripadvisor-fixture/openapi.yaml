          schema:
            type: string
          description: Restaurant URL slug.
      responses:
        '200':
          description: Restaurant detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: [string, 'null']
                  rating:
                    type: [string, 'null']
                  reviewCount:
                    type: [string, 'null']
                  cuisine:
                    type: [string, 'null']
                  priceRange:
                    type: [string, 'null']
                  address:
                    type: [object, 'null']
                    properties:
                      street:
                        type: [string, 'null']
                      city:
                        type: [string, 'null']
                      region:
                        type: [string, 'null']
                      country:
                        type: [string, 'null']
                  telephone:
                    type: [string, 'null']
                  url:
                    type: [string, 'null']

  /internal/getRestaurantReviews:
    get:
      operationId: getRestaurantReviews
      summary: Get restaurant review summary — rating breakdown, sub-ratings, AI summary
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0007
          signature_id: ta0007s
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: tripadvisor-web
          operation: getRestaurantReviews
      parameters:
        - name: geoId
          in: query
