                  subRatings:
                    type: [object, 'null']
                    description: Sub-ratings like food, service, value, atmosphere.
                  aiSummary:
                    type: [string, 'null']

  /Attractions-g{geoId}-Activities-{slug}.html:
    get:
      operationId: searchAttractions
      summary: Search attractions/things to do in a destination
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0008
