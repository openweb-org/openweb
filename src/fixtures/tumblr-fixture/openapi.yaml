openapi: '3.1.0'
info:
  title: Tumblr API
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
servers:
  - url: https://www.tumblr.com/api/v2
    x-openweb:
      transport: node
      auth:
        type: cookie_session
paths:
  /user/dashboard:
    get:
      operationId: getDashboard
      summary: Get user's dashboard posts
      x-openweb:
        permission: read
        build:
          stable_id: tm000001
          tool_version: 1
          verified: false
      parameters: []
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
