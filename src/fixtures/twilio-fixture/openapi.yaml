openapi: '3.1.0'
info:
  title: Twilio
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.twilio.com/2010-04-01
paths:
  /Accounts/{AccountSid}/Messages.json:
    get:
      operationId: listMessages
      summary: List messages for an account
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: twl0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: AccountSid
          in: path
          required: true
          schema:
            type: string
          description: The unique Account SID.
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Basic auth using Account SID and Auth Token. Format: Basic {base64(account_sid:auth_token)}'
        - name: PageSize
          in: query
          required: false
          schema:
            type: integer
          description: Number of records to return per page.
        - name: Page
          in: query
          required: false
          schema:
            type: integer
          description: Page number to retrieve.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        sid:
                          type: string
                        from:
                          type: string
                        to:
                          type: string
                        body:
                          type: string
                        status:
                          type: string
                        date_sent:
                          type: string
                  page:
                    type: integer
                  page_size:
                    type: integer
  /Accounts/{AccountSid}/Calls.json:
    get:
      operationId: listCalls
      summary: List calls for an account
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: twl0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: AccountSid
          in: path
          required: true
          schema:
            type: string
          description: The unique Account SID.
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Basic auth using Account SID and Auth Token. Format: Basic {base64(account_sid:auth_token)}'
        - name: PageSize
          in: query
          required: false
          schema:
            type: integer
          description: Number of records to return per page.
        - name: Page
          in: query
          required: false
          schema:
            type: integer
          description: Page number to retrieve.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls:
                    type: array
                    items:
                      type: object
                      properties:
                        sid:
                          type: string
                        from:
                          type: string
                        to:
                          type: string
                        status:
                          type: string
                        duration:
                          type: string
                        start_time:
                          type: string
                  page:
                    type: integer
                  page_size:
                    type: integer
