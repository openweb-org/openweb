openapi: '3.1.0'
info:
  title: Universities
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: http://universities.hipolabs.com
paths:
  /search:
    get:
      operationId: searchUniversities
      summary: Search universities by name and country
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: un0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: University name to search for.
        - name: country
          in: query
          required: false
          schema:
            type: string
          description: Country filter (e.g. "United States").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    country:
                      type: string
                    alpha_two_code:
                      type: string
                    domains:
                      type: array
                      items:
                        type: string
                    web_pages:
                      type: array
                      items:
                        type: string
                    state-province:
                      type:
                        - string
                        - 'null'
