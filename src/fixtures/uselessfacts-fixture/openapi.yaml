openapi: '3.1.0'
info:
  title: Useless Facts
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://uselessfacts.jsph.pl
paths:
  /api/v2/facts/random:
    get:
      operationId: getRandomFact
      summary: Get a random useless fact
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: uf0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: en
          description: Language code (e.g. "en", "de").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [id, text, source, source_url, language, permalink]
                properties:
                  id:
                    type: string
                  text:
                    type: string
                  source:
                    type: string
                  source_url:
                    type: string
                  language:
                    type: string
                  permalink:
                    type: string
