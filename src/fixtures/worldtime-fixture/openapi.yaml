openapi: '3.1.0'
info:
  title: World Time
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: http://worldtimeapi.org
paths:
  /api/timezone/{area}/{location}:
    get:
      operationId: getTimezone
      summary: Get current time for a timezone
      x-openweb:
        transport: node
        risk_tier: safe
        build:
          stable_id: wt0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: area
          in: path
          required: true
          schema:
            type: string
          description: Timezone area (e.g. "America", "Europe").
        - name: location
          in: path
          required: true
          schema:
            type: string
          description: Timezone location (e.g. "New_York", "London").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [abbreviation, datetime, timezone, utc_offset]
                properties:
                  abbreviation:
                    type: string
                  client_ip:
                    type: string
                  datetime:
                    type: string
                  day_of_week:
                    type: integer
                  day_of_year:
                    type: integer
                  dst:
                    type: boolean
                  dst_offset:
                    type: integer
                  timezone:
                    type: string
                  unixtime:
                    type: integer
                  utc_datetime:
                    type: string
                  utc_offset:
                    type: string
                  week_number:
                    type: integer
