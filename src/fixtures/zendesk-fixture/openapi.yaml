openapi: '3.1.0'
info:
  title: Zendesk
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://example.zendesk.com/api/v2
paths:
  /tickets:
    get:
      operationId: listTickets
      summary: List tickets in the account
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: zd0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
        - name: page[size]
          in: query
          required: false
          schema:
            type: integer
          description: Number of results per page.
        - name: page[after]
          in: query
          required: false
          schema:
            type: string
          description: Cursor for the next page of results.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        subject:
                          type: string
                        status:
                          type: string
                        priority:
                          type:
                            - string
                            - 'null'
                        created_at:
                          type: string
                        updated_at:
                          type: string
                  meta:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                      after_cursor:
                        type: string
  /tickets/{ticket_id}:
    get:
      operationId: getTicket
      summary: Get a ticket by its ID
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: zd0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: ticket_id
          in: path
          required: true
          schema:
            type: integer
          description: The ticket ID.
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer token for authentication. Format: Bearer {token}'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    type: object
                    properties:
                      id:
                        type: integer
                      subject:
                        type: string
                      description:
                        type: string
                      status:
                        type: string
                      priority:
                        type:
                          - string
                          - 'null'
                      requester_id:
                        type: integer
                      assignee_id:
                        type:
                          - integer
                          - 'null'
