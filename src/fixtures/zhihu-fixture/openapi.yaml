          operation: searchContent
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search keyword.
        - name: t
          in: query
          required: false
          schema:
            type: string
            default: general
          description: "Search type: general, topic, people, zvideo."
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Pagination offset.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Results per page.
        - name: correction
