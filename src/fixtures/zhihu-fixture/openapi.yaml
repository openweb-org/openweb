  /api/v3/topics/{topic_id}/children:
    get:
      operationId: getTopicChildren
      summary: Get sub-topics — child topic IDs, names, and descriptions under a parent topic
      x-openweb:
        permission: read
        build:
          stable_id: zhihu0010
          tool_version: 1
          verified: true
          signals:
            - status-match
        adapter:
          name: zhihu-web
          operation: getTopicChildren
      parameters:
        - name: topic_id
          in: path
          required: true
          schema:
            type: integer
          description: Parent topic ID.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  paging:
                    type: object
                    properties:
                      is_end:
                        type: boolean
                      totals:
                        type: integer
                      previous:
                        type: string
                      is_start:
                        type: boolean
                      next:
                        type: string
                    required:
                      - is_end
                      - totals
                      - previous
                      - is_start
                      - next
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        category:
                          type: string
                        is_super_topic_vote:
                          type: boolean
                        name:
                          type: string
                        url:
                          type: string
                        excerpt:
                          type: string
                        is_vote:
                          type: boolean
                        introduction:
                          type: string
                        avatar_url:
                          type: string
                        topic_id:
                          type: integer
                        is_black:
                          type: boolean
                        type:
                          type: string
                        id:
                          type: string
                      required:
                        - category
                        - is_super_topic_vote
                        - name
                        - url
                        - excerpt
                        - is_vote
                        - introduction
                        - avatar_url
                        - topic_id
                        - is_black
                        - type
                        - id
                required:
                  - paging
                  - data
