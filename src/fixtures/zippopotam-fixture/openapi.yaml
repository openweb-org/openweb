openapi: '3.1.0'
info:
  title: Zippopotam
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://api.zippopotam.us
paths:
  /us/{zipcode}:
    get:
      operationId: getZipInfo
      summary: Get location info for a US ZIP code
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: zp0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: zipcode
          in: path
          required: true
          schema:
            type: string
          description: US ZIP code (e.g. "90210").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [post code, country, places]
                properties:
                  post code:
                    type: string
                  country:
                    type: string
                  country abbreviation:
                    type: string
                  places:
                    type: array
                    items:
                      type: object
                      required: [place name, state, latitude, longitude]
                      properties:
                        place name:
                          type: string
                        longitude:
                          type: string
                        state:
                          type: string
                        state abbreviation:
                          type: string
                        latitude:
                          type: string
