    get:
      operationId: getVideoOnlineCount
      summary: Get online viewer count for a video
      x-openweb:
        permission: read
        build:
          stable_id: 0b273b448a0dfeff
          tool_version: 2
      parameters:
        - name: aid
          in: query
          required: true
          schema:
            type: integer
          example: 1
        - name: bvid
          in: query
          required: true
          schema:
            type: string
          example: BV1bscPz1EQW
        - name: cid
          in: query
          required: true
          schema:
            type: integer
          example: 1
        - name: ts
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Success.
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                    enum:
                      - OK
                  ttl:
                    type: integer
                  data:
                    type: object
                    properties:
                      total:
                        type: string
                        enum:
                          - "6"
                      count:
                        type: string
                        enum:
                          - "5"
                      show_switch:
                        type: object
                        properties:
                          total:
                            type: boolean
                          count:
                            type: boolean
                        required:
                          - total
                          - count
                      abtest:
                        type: object
                        properties:
                          group:
                            type: string
                            enum:
                              - b
                        required:
                          - group
                    required:
                      - total
                      - count
                      - show_switch
                      - abtest
                required:
                  - code
                  - message
                  - ttl
                  - data
