  /x/web-interface/search/all/v2:
    get:
      operationId: searchVideos
      summary: Search videos and content by keyword — returns titles, authors, play counts, thumbnails
      x-openweb:
        permission: read
        build:
          stable_id: bili0001
          tool_version: 1
          verified: true
          signals:
            - status-match
        adapter:
          name: bilibili-web
          operation: searchVideos
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
          description: Search keyword (e.g. "编程", "美食", "vlog").
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number (starts from 1).
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 42
          description: Results per page.
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      numResults:
                        type: integer
                        description: Total result count.
                      page:
                        type: integer
                      pagesize:
                        type: integer
                      result:
                        type: array
                        items:
                          type: object
                          properties:
                            result_type:
                              type: string
                            data:
                              type: array
                              items:
                                type: object
                                properties:
                                  bvid:
                                    type: string
                                    description: Video BV ID.
                                  title:
                                    type: string
                                    description: Video title (may contain <em> highlight tags).
                                  author:
                                    type: string
                                  mid:
                                    type: integer
                                    description: Uploader user ID.
                                  pic:
                                    type: string
                                    description: Thumbnail URL.
                                  play:
                                    type:
                                      - integer
                                      - string
                                      - "null"
                                    description: Play count (integer, "--" when hidden, or null).
                                  danmaku:
                                    type: integer
                                    description: Danmaku (bullet comment) count.
                                  like:
                                    type: integer
                                  favorites:
                                    type: integer
                                  duration:
                                    type: string
                                    description: Duration string (e.g. "10:30").
                                  pubdate:
                                    type: integer
                                    description: Publish timestamp (Unix seconds).
                                  description:
                                    type: string
  /x/web-interface/archive/like:
    post:
      operationId: likeVideo
      summary: Like or unlike a video — reversible, requires auth
      x-openweb:
        permission: write
        safety: safe
        requires_auth: true
        build:
          stable_id: bili0011
          tool_version: 1
          verified: false
          signals:
            - adapter-verified
        adapter:
          name: bilibili-web
          operation: likeVideo
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - aid
              properties:
                aid:
                  type: integer
                  description: Video aid (from getVideoDetail).
                like:
                  type: integer
                  default: 1
                  description: 1 = like, 2 = unlike.
      responses:
        "200":
          description: Like result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 0 = success, 65006 = already liked/unliked.
                  message:
                    type: string
  /x/v3/fav/resource/deal:
    post:
      operationId: addToFavorites
      summary: Add or remove a video from favorites folder — reversible, requires auth
      x-openweb:
        permission: write
        safety: safe
        requires_auth: true
        build:
          stable_id: bili0012
          tool_version: 1
          verified: false
          signals:
            - adapter-verified
        adapter:
          name: bilibili-web
          operation: addToFavorites
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - rid
                - add_media_ids
              properties:
                rid:
                  type: integer
                  description: Video aid (from getVideoDetail).
                add_media_ids:
                  type: string
                  description: Comma-separated favorite folder IDs to add to.
                del_media_ids:
                  type: string
                  description: Comma-separated favorite folder IDs to remove from.
      responses:
        "200":
          description: Favorites result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 0 = success.
                  message:
                    type: string
  /x/relation/modify:
    post:
      operationId: followUploader
      summary: Follow or unfollow a user — reversible, requires auth
      x-openweb:
        permission: write
        safety: safe
        requires_auth: true
        build:
          stable_id: bili0013
          tool_version: 1
          verified: false
          signals:
            - adapter-verified
        adapter:
          name: bilibili-web
          operation: followUploader
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - fid
              properties:
                fid:
                  type: integer
                  description: Target user ID (mid).
                act:
                  type: integer
                  default: 1
                  description: 1 = follow, 2 = unfollow.
      responses:
        "200":
          description: Follow result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 0 = success.
                  message:
                    type: string
