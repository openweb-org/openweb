                                type: string
                                enum:
                                  - CAESEDE4MTczNjA2MjY0OTY0NTQiAggB
                                  - CAESEDE4MTczNjA2NDQzOTAyOTciAggB
                                  - CAESEDE4MTczNjA2NjE1OTk4NDgiAggB
                            required:
                              - next_offset
                          session_id:
                            type: string
                            enum:
                              - "1817360626496454"
                              - "1817360644390297"
                              - "1817360661599848"
                          mode:
                            type: integer
                          mode_text:
                            type: string
                            enum:
                              - ""
                          all_count:
                            type: integer
                          support_mode:
                            type: array
                            items:
                              type: integer
                          name:
                            type: string
                            enum:
                              - 热门评论
                        required:
                          - is_begin
                          - prev
                          - next
                          - is_end
                          - pagination_reply
                          - session_id
                          - mode
                          - mode_text
                          - all_count
                          - support_mode
                          - name
                      replies:
                        type: array
                        items:
                          type: object
                          properties:
                            rpid:
                              type: integer
                            oid:
                              type: integer
                            type:
