  /x/v2/reply/wbi/main:
    get:
      operationId: getVideoComments
      summary: Get video comments with replies — comment text, author, like count, reply count, publish time, nested replies
      x-openweb:
        permission: read
        build:
          stable_id: dafe03a6c263f556
          tool_version: 2
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: oid
          in: query
          required: true
          schema:
            type: integer
          example: 1
        - name: pagination_str
          in: query
          required: false
          schema:
            type: string
            default: '{"offset":""}'
          example: '{"offset":""}'
        - name: plat
          in: query
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: seek_rpid
          in: query
          required: false
          schema:
            type: string
          example: ""
        - name: type
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Success.
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                    enum:
                      - OK
                  ttl:
                    type: integer
                  data:
                    type: object
                    properties:
                      cursor:
                        type: object
