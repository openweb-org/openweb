          stable_id: 26060cd98cecd9d3
          tool_version: 2
      parameters:
        - name: index
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: mid
          in: query
          required: true
          schema:
            type: integer
          example: 1
        - name: order
          in: query
          required: false
          schema:
            type: string
          example: pubdate
        - name: order_avoided
          in: query
          required: false
          schema:
            type: string
          example: "true"
        - name: platform
          in: query
          required: false
          schema:
            type: string
          example: web
        - name: pn
          in: query
          required: false
