asyncapi: 3.0.0
info:
  title: coinbase WebSocket API
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-03-25T12:00:00.000Z
servers:
  ws_feed_exchange_coinbase_com:
    host: ws-feed.exchange.coinbase.com
    pathname: /
    protocol: wss
    x-openweb:
      transport: node
      discriminator:
        sent:
          field: type
        received:
          field: type
          sub_field: product_id
          sub_field_on: ticker
channels:
  ws_feed_exchange_coinbase_com:
    address: /
    servers:
      - $ref: "#/servers/ws_feed_exchange_coinbase_com"
    messages:
      ws_send_subscribe:
        $ref: "#/components/messages/WsSendSubscribe"
      ws_send_unsubscribe:
        $ref: "#/components/messages/WsSendUnsubscribe"
      ws_recv_ticker_BTC_USD:
        $ref: "#/components/messages/WsRecvTickerBTCUSD"
      ws_recv_ticker_ETH_USD:
        $ref: "#/components/messages/WsRecvTickerETHUSD"
operations:
  ws_send_subscribe:
    action: send
    channel:
      $ref: "#/channels/ws_feed_exchange_coinbase_com"
    x-openweb:
      permission: write
      pattern: subscribe
      build:
        verified: false
        stable_id: a132eccedc9794bc
      subscribe_message:
        constants:
          type: subscribe
        bindings:
          - path: channels
            source: param
            key: channels
    messages:
      - $ref: "#/channels/ws_feed_exchange_coinbase_com/messages/ws_send_subscribe"
  ws_send_unsubscribe:
    action: send
    channel:
      $ref: "#/channels/ws_feed_exchange_coinbase_com"
    x-openweb:
      permission: write
      pattern: subscribe
      build:
        verified: false
        stable_id: 3a50ff10f613555a
    messages:
      - $ref: "#/channels/ws_feed_exchange_coinbase_com/messages/ws_send_unsubscribe"
  ws_recv_ticker_BTC_USD:
    action: receive
    channel:
      $ref: "#/channels/ws_feed_exchange_coinbase_com"
    x-openweb:
      permission: read
      pattern: stream
      build:
        verified: false
        stable_id: f6afc4881c9d4819
    messages:
      - $ref: "#/channels/ws_feed_exchange_coinbase_com/messages/ws_recv_ticker_BTC_USD"
  ws_recv_ticker_ETH_USD:
    action: receive
    channel:
      $ref: "#/channels/ws_feed_exchange_coinbase_com"
    x-openweb:
      permission: read
      pattern: stream
      build:
        verified: false
        stable_id: 427f1bf81e0b309d
    messages:
      - $ref: "#/channels/ws_feed_exchange_coinbase_com/messages/ws_recv_ticker_ETH_USD"
components:
  messages:
    WsSendSubscribe:
      payload:
        $ref: "#/components/schemas/WsSendSubscribePayload"
    WsSendUnsubscribe:
      payload:
        $ref: "#/components/schemas/WsSendUnsubscribePayload"
    WsRecvTickerBTCUSD:
      payload:
        $ref: "#/components/schemas/WsRecvTickerBTCUSDPayload"
    WsRecvTickerETHUSD:
      payload:
        $ref: "#/components/schemas/WsRecvTickerETHUSDPayload"
  schemas:
    WsSendSubscribePayload:
      type: object
      properties:
        type:
          type: string
        channels:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              product_ids:
                type: array
                items:
                  type: string
            required:
              - name
              - product_ids
      required:
        - type
        - channels
    WsSendUnsubscribePayload:
      type: object
      properties:
        type:
          type: string
        channels:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              product_ids:
                type: array
                items:
                  type: string
            required:
              - name
              - product_ids
      required:
        - type
        - channels
    WsRecvTickerBTCUSDPayload:
      type: object
      properties:
        type:
          type: string
        sequence:
          type: integer
        product_id:
          type: string
        price:
          type: string
        open_24h:
          type: string
        volume_24h:
          type: string
        low_24h:
          type: string
        high_24h:
          type: string
        volume_30d:
          type: string
        best_bid:
          type: string
        best_ask:
          type: string
        side:
          type: string
        time:
          type: string
        trade_id:
          type: integer
        last_size:
          type: string
      required:
        - type
        - sequence
        - product_id
        - price
        - open_24h
        - volume_24h
        - low_24h
        - high_24h
        - volume_30d
        - best_bid
        - best_ask
        - side
        - time
        - trade_id
        - last_size
    WsRecvTickerETHUSDPayload:
      type: object
      properties:
        type:
          type: string
        sequence:
          type: integer
        product_id:
          type: string
        price:
          type: string
        open_24h:
          type: string
        volume_24h:
          type: string
        low_24h:
          type: string
        high_24h:
          type: string
        volume_30d:
          type: string
        best_bid:
          type: string
        best_ask:
          type: string
        side:
          type: string
        time:
          type: string
        trade_id:
          type: integer
        last_size:
          type: string
      required:
        - type
        - sequence
        - product_id
        - price
        - open_24h
        - volume_24h
        - low_24h
        - high_24h
        - volume_30d
        - best_bid
        - best_ask
        - side
        - time
        - trade_id
        - last_size
