          type: string
        description: "Discord guild (server) snowflake ID"
        example: "1280234300012494859"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - name
                  - permissions
                  - position
                  - color
                  - hoist
                  - managed
                  - mentionable
                  - flags
                  properties:
                    id:
                      type: string
                      description: "Role snowflake ID."
                    name:
                      type: string
                      description: "Role name."
                    description:
                      type:
                      - string
                      - "null"
                      description: "Role description."
                    permissions:
                      type: string
                      description: "Permissions bitfield."
                    position:
                      type: integer
                      description: "Role sort position."
                    color:
                      type: integer
                      description: "Role color as integer (0 = no color)."
                    hoist:
                      type: boolean
                      description: "Whether the role is displayed separately in the sidebar."
                    managed:
                      type: boolean
                      description: "Whether the role is managed by an integration."
                    mentionable:
                      type: boolean
                      description: "Whether the role can be mentioned by anyone."
                    flags:
                      type: integer
                      description: "Role flags bitfield."
  /api/v9/guilds/{guildId}/messages/search:
    get:
      operationId: searchMessages
      summary: "Search messages in a guild — matches with context, total results count"
      x-openweb:
        permission: read
        build:
          stable_id: a7b8c9d0e1f2a3b4
          tool_version: 2
          verified: true
          signals: [page-verified]
      parameters:
      - name: guildId
        in: path
        required: true
        schema:
          type: string
        description: "Discord guild (server) snowflake ID"
        example: "1280234300012494859"
      - name: content
        in: query
        required: true
        schema:
          type: string
        description: "Search query text"
        example: "hello"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required:
                - total_results
                - messages
                properties:
                  total_results:
                    type: integer
                    description: "Total number of matching messages."
                  messages:
                    type: array
                    items:
                      type: array
                      items:
                        type: object
                        required:
                        - id
                        - content
                        - author
                        - channel_id
                        - timestamp
                        properties:
                          id:
                            type: string
                            description: "Message snowflake ID."
                          content:
                            type: string
                            description: "Message text content."
                          author:
                            type: object
                            required:
                            - id
                            - username
                            properties:
                              id:
                                type: string
                                description: "Author user snowflake ID."
                              username:
                                type: string
                                description: "Author username."
                              global_name:
                                type:
                                - string
                                - "null"
                                description: "Author display name."
                              avatar:
                                type:
                                - string
                                - "null"
                                description: "Author avatar hash."
                            description: "Message author."
                          channel_id:
                            type: string
                            description: "Channel the message belongs to."
                          timestamp:
                            type: string
                            description: "ISO 8601 timestamp."
                          hit:
                            type: boolean
                            description: "Whether this message is the search hit (vs. context)."
                    description: "Groups of messages — each group is a hit with surrounding context."
