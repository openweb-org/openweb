                      type: string
                    description: "Role IDs mentioned in the message."
                  attachments:
                    type: array
                    items:
                      type: object
                    description: "File attachments."
                  embeds:
                    type: array
                    items:
                      type: object
                    description: "Embedded content."
                  components:
                    type: array
                    items:
                      type: object
                    description: "Message components (buttons, selects, etc.)."
