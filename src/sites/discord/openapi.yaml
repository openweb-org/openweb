  /api/v9/channels/{channelId}/messages:
    post:
      operationId: sendMessage
      summary: "Send a message to a channel — returns the created message with ID, content, author, timestamp"
      x-openweb:
        permission: write
        build:
          stable_id: e1a2b3c4d5e6f708
          tool_version: 2
          verified: true
          signals: [page-verified]
      parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
        description: "Discord channel snowflake ID"
        example: "1280234300012494862"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - content
              properties:
                content:
                  type: string
                  description: "Message content (up to 2000 characters)"
                  example: "Hello from OpenWeb!"
                tts:
                  type: boolean
                  description: "Whether this is a text-to-speech message"
                nonce:
                  type: string
                  description: "Nonce for message deduplication"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - type
                - channel_id
                - content
                - author
                - timestamp
                - flags
                - pinned
                - mention_everyone
                - tts
                properties:
                  id:
                    type: string
                    description: "Message snowflake ID."
                  type:
                    type: integer
                    description: "Message type (0=default, 19=reply, etc.)."
                  channel_id:
                    type: string
                    description: "Channel the message was sent to."
                  content:
                    type: string
                    description: "Message text content."
                  author:
                    type: object
                    required:
                    - id
                    - username
                    properties:
                      id:
                        type: string
                        description: "Author user snowflake ID."
                      username:
                        type: string
                        description: "Author username."
                      discriminator:
                        type: string
                        description: "Legacy 4-digit tag."
                      global_name:
                        type:
                        - string
                        - "null"
                        description: "Author display name."
                      avatar:
                        type:
                        - string
                        - "null"
                        description: "Author avatar hash."
                      public_flags:
                        type: integer
                        description: "Public user flags bitfield."
                    description: "Message author."
                  timestamp:
                    type: string
                    description: "ISO 8601 creation timestamp."
                  edited_timestamp:
                    type:
                    - string
                    - "null"
                    description: "ISO 8601 last-edit timestamp."
                  flags:
                    type: integer
                    description: "Message flags bitfield."
                  pinned:
                    type: boolean
                    description: "Whether the message is pinned."
                  mention_everyone:
                    type: boolean
                    description: "Whether @everyone was mentioned."
                  tts:
                    type: boolean
                    description: "Whether this is a TTS message."
                  mentions:
                    type: array
