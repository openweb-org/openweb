openapi: 3.1.0
info:
  title: discord
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-03-31T15:22:35.791000Z
    requires_auth: true
servers:
- url: https://discord.com
  x-openweb:
    transport: page
    auth:
      type: webpack_module_walk
      chunk_global: webpackChunkdiscord_app
      module_test: getToken
      call: getToken
      app_path: /channels/@me
      inject:
        header: Authorization
paths:
  /api/v9/users/@me:
    get:
      operationId: getCurrentUser
      summary: "Get current user profile — username, avatar, email, Nitro status, flags"
      x-openweb:
        permission: read
        build:
          stable_id: a1b2c3d4e5f6a7b8
          tool_version: 2
          verified: true
          signals: [page-verified]
      parameters: []
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - username
                - discriminator
                properties:
                  id:
                    type: string
                    description: "User snowflake ID."
                  username:
                    type: string
                    description: "Unique username."
                  global_name:
                    type:
                    - string
                    - "null"
                    description: "Display name (may differ from username)."
                  avatar:
                    type:
                    - string
                    - "null"
                    description: "Avatar hash."
                  discriminator:
                    type: string
                    description: "Legacy 4-digit tag (\"0\" for new username system)."
                  public_flags:
                    type: integer
                    description: "Public user flags bitfield (staff, partner, etc.)."
                  flags:
                    type: integer
                    description: "Private user flags bitfield."
                  banner:
                    type:
                    - string
                    - "null"
                    description: "Profile banner hash."
                  accent_color:
                    type:
                    - integer
                    - "null"
                    description: "Profile accent color as integer."
                  mfa_enabled:
                    type: boolean
                    description: "Whether two-factor authentication is enabled."
                  locale:
                    type: string
                    description: "User locale (e.g. \"en-US\")."
                  premium_type:
                    type: integer
                    description: "Nitro subscription type (0=none, 1=Classic, 2=Nitro, 3=Basic)."
                  email:
                    type: string
                    description: "Email address (only visible to the authenticated user)."
                  verified:
                    type: boolean
                    description: "Whether the email has been verified."
                  bio:
                    type: string
                    description: "User bio / about me text."
  /api/v9/users/@me/guilds:
    get:
      operationId: listGuilds
      summary: "List current user's guilds — name, icon, owner status, permissions, features"
      x-openweb:
        permission: read
        build:
          stable_id: b2c3d4e5f6a7b8c9
          tool_version: 2
          verified: true
          signals: [page-verified]
      parameters: []
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - name
                  - owner
                  - permissions
                  properties:
                    id:
                      type: string
                      description: "Guild snowflake ID."
                    name:
                      type: string
                      description: "Guild name."
                    icon:
                      type:
                      - string
                      - "null"
                      description: "Guild icon hash."
                    banner:
                      type:
                      - string
                      - "null"
                      description: "Guild banner hash."
                    owner:
                      type: boolean
                      description: "Whether the current user owns this guild."
                    permissions:
                      type: string
                      description: "Permissions bitfield for the current user."
                    features:
                      type: array
                      items:
                        type: string
                      description: "Enabled guild features (e.g. COMMUNITY, VERIFIED)."
  /api/v9/users/@me/channels:
    get:
      operationId: getDirectMessages
      summary: "List DM channels — recipients, last message ID, channel type, flags"
      x-openweb:
        permission: read
        build:
          stable_id: c3d4e5f6a7b8c9d0
          tool_version: 2
          verified: true
          signals: [page-verified]
      parameters: []
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - type
                  - flags
                  properties:
                    id:
                      type: string
                      description: "DM channel snowflake ID."
                    type:
                      type: integer
                      description: "Channel type (1=DM, 3=group DM)."
                    last_message_id:
                      type:
                      - string
                      - "null"
                      description: "Snowflake ID of the last message in this DM."
                    flags:
                      type: integer
                      description: "Channel flags bitfield."
                    recipients:
                      type: array
                      items:
                        type: object
                        required:
                        - id
                        - username
                        properties:
                          id:
                            type: string
                            description: "Recipient user snowflake ID."
                          username:
                            type: string
                            description: "Recipient username."
                          global_name:
                            type:
                            - string
                            - "null"
                            description: "Recipient display name."
                          avatar:
                            type:
                            - string
                            - "null"
                            description: "Recipient avatar hash."
                      description: "Users in this DM channel."
  /api/v9/guilds/{guildId}:
    get:
      operationId: getGuildInfo
      summary: "Get guild details — name, icon, description, owner, member count, roles, features, premium tier"
      x-openweb:
        permission: read
        build:
          stable_id: d4e5f6a7b8c9d0e1
          tool_version: 2
          verified: true
          signals: [page-verified]
      parameters:
      - name: guildId
        in: path
        required: true
        schema:
          type: string
        description: "Discord guild (server) snowflake ID"
        example: "1280234300012494859"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - name
                - owner_id
                - verification_level
                - premium_tier
                - nsfw_level
                properties:
                  id:
                    type: string
                    description: "Guild snowflake ID."
                  name:
                    type: string
                    description: "Guild name."
                  icon:
                    type:
                    - string
                    - "null"
                    description: "Guild icon hash."
                  description:
                    type:
                    - string
                    - "null"
                    description: "Guild description (Community servers only)."
                  owner_id:
                    type: string
                    description: "Snowflake ID of the guild owner."
                  region:
                    type: string
                    description: "Voice region (deprecated, use channel-level overrides)."
                  afk_timeout:
                    type: integer
                    description: "AFK timeout in seconds."
                  verification_level:
                    type: integer
                    description: "Verification level required (0=none … 4=very high)."
                  max_members:
                    type: integer
                    description: "Maximum member count."
                  premium_tier:
                    type: integer
                    description: "Server boost level (0-3)."
                  premium_subscription_count:
                    type: integer
                    description: "Number of active boosts."
                  preferred_locale:
                    type: string
                    description: "Preferred locale for Community servers."
                  nsfw:
                    type: boolean
                    description: "Whether the guild is marked as NSFW."
                  nsfw_level:
                    type: integer
                    description: "NSFW level (0=default, 1=explicit, 2=safe, 3=age-restricted)."
                  features:
                    type: array
                    items:
                      type: string
                    description: "Enabled guild features."
                  roles:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - name
                      - permissions
                      - position
                      properties:
                        id:
                          type: string
                          description: "Role snowflake ID."
                        name:
                          type: string
                          description: "Role name."
                        permissions:
                          type: string
                          description: "Permissions bitfield."
                        position:
                          type: integer
                          description: "Role sort position."
                        color:
                          type: integer
                          description: "Role color as integer (0 = no color)."
                        hoist:
                          type: boolean
                          description: "Whether the role is displayed separately in the sidebar."
                        mentionable:
                          type: boolean
                          description: "Whether the role can be mentioned."
                    description: "Guild roles."
                  emojis:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: "Emoji snowflake ID."
                        name:
                          type: string
                          description: "Emoji name."
                        animated:
                          type: boolean
                          description: "Whether the emoji is animated."
                        available:
                          type: boolean
                          description: "Whether the emoji is available for use."
                    description: "Custom emojis."
                  stickers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: "Sticker snowflake ID."
                        name:
                          type: string
                          description: "Sticker name."
                        type:
                          type: integer
                          description: "Sticker type (1=standard, 2=guild)."
                        format_type:
                          type: integer
                          description: "Sticker format (1=PNG, 2=APNG, 3=Lottie, 4=GIF)."
                    description: "Custom stickers."
  /api/v9/guilds/{guildId}/channels:
    get:
      operationId: listGuildChannels
      summary: "List channels in a guild — name, type, position, topic, permission overwrites"
      x-openweb:
        permission: read
        build:
          stable_id: e5f6a7b8c9d0e1f2
          tool_version: 2
          verified: true
          signals: [page-verified]
      parameters:
      - name: guildId
        in: path
        required: true
        schema:
          type: string
        description: "Discord guild (server) snowflake ID"
        example: "1280234300012494859"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - type
                  - name
                  - guild_id
                  - position
                  - flags
                  properties:
                    id:
                      type: string
                      description: "Channel snowflake ID."
                    type:
                      type: integer
                      description: "Channel type (0=text, 2=voice, 4=category, 5=announcement, 13=stage, 15=forum)."
                    name:
                      type: string
                      description: "Channel name."
                    guild_id:
                      type: string
                      description: "Parent guild snowflake ID."
                    position:
                      type: integer
                      description: "Sorting position."
                    parent_id:
                      type:
                      - string
                      - "null"
                      description: "Parent category channel ID."
                    topic:
                      type:
                      - string
                      - "null"
                      description: "Channel topic."
                    nsfw:
                      type: boolean
                      description: "Whether the channel is NSFW."
                    rate_limit_per_user:
                      type: integer
                      description: "Slowmode delay in seconds (0 = disabled)."
                    flags:
                      type: integer
                      description: "Channel flags bitfield."
                    permission_overwrites:
                      type: array
                      items:
                        type: object
                        required:
                        - id
                        - type
                        - allow
                        - deny
                        properties:
                          id:
                            type: string
                            description: "Role or user snowflake ID."
                          type:
                            type: integer
                            description: "Overwrite type (0=role, 1=member)."
                          allow:
                            type: string
                            description: "Allowed permissions bitfield."
                          deny:
                            type: string
                            description: "Denied permissions bitfield."
                      description: "Permission overwrite entries."
                    last_message_id:
                      type:
                      - string
                      - "null"
                      description: "Snowflake ID of the last message."
  /api/v9/guilds/{guildId}/roles:
    get:
      operationId: getGuildRoles
