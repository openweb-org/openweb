                  actors:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        latin_name:
                          type: string
                        character:
                          type: string
                        roles:
                          type: array
                          items:
                            type: string
                        avatar:
                          type: object
                          properties:
                            large:
                              type: string

                required:
                - actors
