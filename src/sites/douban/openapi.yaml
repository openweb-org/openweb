                        type:
                          type: string
                        uri:
                          type: string

  /rexxar/api/v2/subject_collection/movie_showing/items:
    get:
      operationId: getNowShowingMovies
      summary: "Get movies currently in theaters — title, rating, cover, release date, directors, actors"
      x-openweb:
        permission: read
        build:
          stable_id: now_showing_001
          tool_version: 2
      parameters:
        - name: count
          in: query
          required: false
          schema:
            type: integer
          description: "Number of movies to return (default 20)"
          example: 20
        - name: start
          in: query
          required: false
          schema:
            type: integer
          description: "Pagination offset"
          example: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  start:
                    type: integer
                  total:
                    type: integer
                  subject_collection:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                  subject_collection_items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        year:
                          type: string
                        rating:
                          type: object
                          nullable: true
                          properties:
                            count:
                              type: integer
                            value:
                              type: number
                        cover:
                          type: object
                          properties:
                            url:
                              type: string
                        card_subtitle:
                          type: string
                        release_date:
                          type: string
                        directors:
                          type: array
                          items:
                            type: string
                        actors:
                          type: array
                          items:
                            type: string
                        type:
                          type: string
                        uri:
                          type: string
