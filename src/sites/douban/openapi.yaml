openapi: 3.1.0
info:
  title: douban
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-04-24T22:00:00Z
    requires_auth: false
servers:
- url: https://m.douban.com
  x-openweb:
    transport: node
    auth:
      type: cookie_session
paths:
  # ── Movies ──────────────────────────────────────────────────────────

  /rexxar/api/v2/search/movie:
    get:
      operationId: searchMovies
      summary: "Search movies by keyword — returns title, rating, year, cover, genres, actors for matching films"
      x-openweb:
        permission: read
        transport: node
        adapter:
          name: douban-read
          operation: searchMovies
        build:
          stable_id: search_movie_001
          tool_version: 3
      parameters:
      - $ref: '#/components/parameters/Referer'
      - name: q
        in: query
        required: true
        schema:
          type: string
        description: "Search keyword (e.g., movie title, actor name)"
        example: "肖申克的救赎"
      - name: count
        in: query
        required: false
        schema:
          type: integer
        description: "Number of results to return (default 20, max 50)"
        example: 20
      - name: start
        in: query
        required: false
        schema:
          type: integer
        description: "Pagination offset (default 0)"
        example: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  start:
                    type: integer
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        target_id:
                          type: string
                        target:
                          type: object
                          properties:
                            id:
                              type: string
                            title:
                              type: string
                            rating:
                              type: object
                              nullable: true
                              properties:
                                count:
                                  type: integer
                                value:
                                  type: number
                            cover_url:
                              type: string
                            card_subtitle:
                              type: string
                            abstract:
                              type: string
                            null_rating_reason:
                              type: string
                        target_type:
                          type: string

                required:
                - items
  /rexxar/api/v2/movie/{id}:
    get:
      operationId: getMovie
      summary: "Get movie detail — title, rating, year, genres, directors, actors, summary, trailer, photos"
      x-openweb:
        permission: read
        transport: node
        adapter:
          name: douban-read
          operation: getMovie
        build:
          stable_id: movie_detail_001
          tool_version: 3
      parameters:
      - $ref: '#/components/parameters/Referer'
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: "Douban movie subject ID (e.g., 1292052 for Shawshank Redemption)"
        example: 1292052
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  original_title:
                    type: string
                  year:
                    type: string
                  rating:
                    type: object
                    properties:
                      count:
                        type: integer
                      max:
                        type: integer
                      value:
                        type: number
                      star_count:
                        type: number
                  genres:
                    type: array
                    items:
                      type: string
                  countries:
                    type: array
                    items:
                      type: string
                  languages:
                    type: array
                    items:
                      type: string
                  durations:
                    type: array
                    items:
                      type: string
                  pubdate:
                    type: array
                    items:
                      type: string
                  intro:
                    type: string
                  cover_url:
                    type: string
                  pic:
                    type: object
                    properties:
                      large:
                        type: string
                      normal:
                        type: string
                  directors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  actors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  aka:
                    type: array
                    items:
                      type: string
                  is_tv:
                    type: boolean
                  review_count:
                    type: integer
                  comment_count:
                    type: integer
                  trailers:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        video_url:
                          type: string
                        cover_url:
                          type: string

                required:
                - id
                - title
                - actors
  /rexxar/api/v2/movie/{id}/interests:
    get:
      operationId: getMovieReviews
      summary: "Get user reviews for a movie — reviewer name, rating, comment text, vote count, date"
      x-openweb:
        permission: read
        transport: node
        adapter:
          name: douban-read
          operation: getMovieReviews
        build:
          stable_id: movie_reviews_001
          tool_version: 3
      parameters:
      - $ref: '#/components/parameters/Referer'
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: "Douban movie subject ID"
        example: 1292052
      - name: count
        in: query
        required: false
        schema:
          type: integer
        description: "Number of reviews to return (default 10)"
        example: 10
      - name: start
        in: query
        required: false
        schema:
          type: integer
        description: "Pagination offset"
        example: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  start:
                    type: integer
                  total:
                    type: integer
                  interests:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        comment:
                          type: string
                        rating:
                          type: object
                          nullable: true
                          properties:
                            max:
                              type: integer
                            value:
                              type: number
                            star_count:
                              type: number
                        create_time:
                          type: string
                        vote_count:
                          type: integer
                        user:
                          type: object
                          properties:
                            name:
                              type: string
                            uid:
                              type: string
                            avatar:
                              type: string
                        status:
                          type: string
                        ip_location:
                          type: string

                required:
                - interests
