          example: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  start:
                    type: integer
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        target_id:
                          type: string
                        target:
                          type: object
                          properties:
                            id:
                              type: string
                            title:
                              type: string
                            abstract:
                              type: string
                            rating:
                              type: object
                              properties:
                                count:
                                  type: integer
                                value:
                                  type: number
                            cover_url:
                              type: string
                            card_subtitle:
                              type: string
                        target_type:
                          type: string

  /rexxar/api/v2/book/{id}:
    get:
      operationId: getBook
      summary: "Get book detail — title, rating, author, publisher, pages, summary, author bio"
      x-openweb:
        permission: read
        build:
          stable_id: book_detail_001
          tool_version: 2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Douban book subject ID (e.g., 2567698 for Three-Body Problem)"
          example: 2567698
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  rating:
                    type: object
                    properties:
                      count:
                        type: integer
                      max:
                        type: integer
                      value:
                        type: number
                      star_count:
                        type: number
                  subtitle:
                    type: array
                    items:
                      type: string
                  pubdate:
                    type: array
                    items:
                      type: string
                  pic:
                    type: object
                    properties:
                      large:
                        type: string
                      normal:
                        type: string
                  intro:
                    type: string
                  author_intro:
                    type: string
                  card_subtitle:
                    type: string
                  review_count:
                    type: integer
                  url:
                    type: string
                  uri:
                    type: string

  /rexxar/api/v2/book/{id}/interests:
    get:
      operationId: getBookReviews
      summary: "Get user reviews for a book — reviewer name, rating, comment text, vote count, date"
      x-openweb:
        permission: read
        build:
          stable_id: book_reviews_001
          tool_version: 2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Douban book subject ID"
          example: 2567698
        - name: count
          in: query
          required: false
          schema:
            type: integer
          description: "Number of reviews to return (default 10)"
          example: 10
        - name: start
          in: query
          required: false
          schema:
            type: integer
          description: "Pagination offset"
          example: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  start:
                    type: integer
                  total:
                    type: integer
                  interests:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        comment:
                          type: string
                        rating:
                          type: object
                          properties:
                            max:
                              type: integer
                            value:
                              type: integer
                            star_count:
                              type: integer
                        create_time:
                          type: string
                        vote_count:
                          type: integer
                        user:
                          type: object
                          properties:
                            name:
                              type: string
                            uid:
                              type: string
                            avatar:
                              type: string
                        status:
                          type: string

  # ── Music (adapter-only, desktop DOM extraction) ────────────────────

  /search/music:
    get:
      operationId: searchMusic
      summary: "Search music/albums by keyword — titles, artists, ratings, covers"
      x-openweb:
        permission: read
        build:
          stable_id: db0009
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: douban-dom
          operation: searchMusic
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: "Search keyword (e.g., \"周杰伦\", \"Beatles\")"
      responses:
        "200":
          description: Music search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        subjectId:
                          type: string
                        title:
                          type: string
                        rating:
                          type: string
                        meta:
                          type: string
                        url:
                          type: string
                        coverImage:
                          type: string
                  totalResults:
                    type: integer

  /music/{id}:
    get:
      operationId: getMusicDetail
      summary: "Get album detail — rating, artist, tracklist, genre, release date, publisher"
      x-openweb:
        permission: read
        build:
          stable_id: db0010
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: douban-dom
          operation: getMusicDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "Douban music subject ID (e.g., \"1401853\" for Jay Chou's 七里香)"
          example: "1401853"
      responses:
        "200":
          description: Full album detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjectId:
                    type: string
                  title:
                    type: string
                  rating:
                    type: string
                  ratingCount:
                    type: integer
                  poster:
                    type: string
                  artist:
                    type: string
                  genre:
                    type: string
                  albumType:
                    type: string
                  medium:
                    type: string
                  releaseDate:
                    type: string
                  publisher:
                    type: string
                  alias:
                    type: string
                  tracks:
                    type: array
                    items:
                      type: string

  # ── Trending / Discovery ────────────────────────────────────────────

  /rexxar/api/v2/subject/recent_hot/movie:
    get:
      operationId: getRecentHotMovies
      summary: "Get currently trending movies — title, rating, cover, year, genres for popular films"
      x-openweb:
        permission: read
        build:
          stable_id: recent_hot_movie_001
          tool_version: 2
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: "Number of movies to return (default 50)"
          example: 20
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  category:
                    type: string
                  total:
                    type: integer
                  type:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        rating:
                          type: object
                          properties:
                            count:
                              type: integer
                            value:
                              type: number
                            star_count:
                              type: number
                        year:
                          type: string
                        pic:
                          type: object
                          properties:
                            large:
                              type: string
                        card_subtitle:
                          type: string
                        is_new:
                          type: boolean
                        type:
                          type: string
                        uri:
                          type: string

  /rexxar/api/v2/subject/recent_hot/tv:
    get:
      operationId: getRecentHotTv
      summary: "Get currently trending TV shows — title, rating, cover, year, genres for popular series"
      x-openweb:
        permission: read
        build:
          stable_id: recent_hot_tv_001
          tool_version: 2
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: "Number of TV shows to return (default 50)"
          example: 20
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  category:
                    type: string
                  total:
                    type: integer
                  type:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        rating:
                          type: object
                          properties:
                            count:
                              type: integer
                            value:
                              type: number
                            star_count:
                              type: number
                        year:
                          type: string
                        pic:
                          type: object
                          properties:
                            large:
                              type: string
                        card_subtitle:
                          type: string
                        episodes_info:
                          type: string
                        is_new:
