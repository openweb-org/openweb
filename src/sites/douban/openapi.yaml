          type: integer
          default: 0
        description: "Pagination offset (0, 25, 50, ...). Each page returns 25 movies."
      - name: count
        in: query
        required: false
        schema:
          type: integer
          default: 25
        description: "Number of movies per page (default 25)"
      responses:
        "200":
