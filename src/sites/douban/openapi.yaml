openapi: 3.1.0
info:
  title: douban
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-03-29T12:00:00Z
    requires_auth: false
servers:
  - url: https://m.douban.com
    x-openweb:
      transport: page
      auth:
        type: cookie_session
paths:
  # ── Movies ──────────────────────────────────────────────────────────

  /rexxar/api/v2/search/movie:
    get:
      operationId: searchMovies
      summary: "Search movies by keyword — returns title, rating, year, cover, genres, actors for matching films"
      x-openweb:
        permission: read
        build:
          stable_id: search_movie_001
          tool_version: 2
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: "Search keyword (e.g., movie title, actor name)"
          example: "肖申克的救赎"
        - name: count
          in: query
          required: false
          schema:
            type: integer
          description: "Number of results to return (default 20, max 50)"
          example: 20
        - name: start
          in: query
          required: false
          schema:
            type: integer
          description: "Pagination offset (default 0)"
          example: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  start:
                    type: integer
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        target_id:
                          type: string
                        target:
                          type: object
                          properties:
                            id:
                              type: string
                            title:
                              type: string
                            rating:
                              type: object
                              properties:
                                count:
                                  type: integer
                                value:
                                  type: number
                            year:
                              type: string
                            cover_url:
                              type: string
                            card_subtitle:
                              type: string
                        target_type:
                          type: string

  /rexxar/api/v2/movie/{id}:
    get:
      operationId: getMovie
      summary: "Get movie detail — title, rating, year, genres, directors, actors, summary, trailer, photos"
      x-openweb:
        permission: read
        build:
          stable_id: movie_detail_001
          tool_version: 2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Douban movie subject ID (e.g., 1292052 for Shawshank Redemption)"
          example: 1292052
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  original_title:
                    type: string
                  year:
                    type: string
                  rating:
                    type: object
                    properties:
                      count:
                        type: integer
                      max:
                        type: integer
                      value:
                        type: number
                      star_count:
                        type: integer
                  genres:
                    type: array
                    items:
                      type: string
                  countries:
                    type: array
                    items:
                      type: string
                  languages:
                    type: array
                    items:
                      type: string
                  durations:
                    type: array
                    items:
                      type: string
                  pubdate:
                    type: array
                    items:
                      type: string
                  intro:
                    type: string
                  cover_url:
                    type: string
                  pic:
                    type: object
                    properties:
                      large:
                        type: string
                      normal:
                        type: string
                  directors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  actors:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  aka:
                    type: array
                    items:
                      type: string
                  is_tv:
                    type: boolean
                  review_count:
                    type: integer
                  comment_count:
                    type: integer
                  url:
                    type: string
                  uri:
                    type: string

  /rexxar/api/v2/movie/{id}/interests:
    get:
      operationId: getMovieReviews
      summary: "Get user reviews for a movie — reviewer name, rating, comment text, vote count, date"
      x-openweb:
        permission: read
        build:
          stable_id: movie_reviews_001
          tool_version: 2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Douban movie subject ID"
          example: 1292052
        - name: count
          in: query
          required: false
          schema:
            type: integer
          description: "Number of reviews to return (default 10)"
          example: 10
        - name: start
          in: query
          required: false
          schema:
            type: integer
          description: "Pagination offset"
          example: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  start:
                    type: integer
                  total:
                    type: integer
                  interests:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        comment:
                          type: string
                        rating:
                          type: object
                          properties:
                            max:
                              type: integer
                            value:
                              type: integer
                            star_count:
                              type: integer
                        create_time:
                          type: string
                        vote_count:
                          type: integer
                        user:
                          type: object
                          properties:
                            name:
                              type: string
                            uid:
                              type: string
                            avatar:
                              type: string
                        status:
                          type: string

  /rexxar/api/v2/movie/{id}/celebrities:
    get:
      operationId: getMovieCelebrities
      summary: "Get cast and crew for a movie — directors, actors with name, latin name, avatar, character role"
      x-openweb:
        permission: read
        build:
          stable_id: movie_celebrities_001
          tool_version: 2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Douban movie subject ID"
          example: 1292052
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  directors:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        latin_name:
                          type: string
                        character:
                          type: string
                        roles:
                          type: array
                          items:
                            type: string
                        avatar:
                          type: object
                          properties:
                            large:
                              type: string
                  actors:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        latin_name:
                          type: string
                        character:
                          type: string
                        roles:
                          type: array
                          items:
                            type: string
                        avatar:
                          type: object
                          properties:
                            large:
                              type: string

  /movie/{id}/photos:
    get:
      operationId: getMoviePhotos
      summary: "Get movie photo gallery — stills, posters, behind the scenes images"
      x-openweb:
        permission: read
        build:
          stable_id: db0004
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: douban-dom
          operation: getMoviePhotos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "Douban movie subject ID"
          example: "1292052"
        - name: type
          in: query
          required: false
          schema:
            type: string
            default: S
          description: "Photo type: S (stills), R (posters), W (wallpapers)"
      responses:
        "200":
          description: Photo gallery for the movie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjectId:
                    type: string
                  photos:
                    type: array
                    items:
                      type: object
                      properties:
                        imageUrl:
                          type: string
                        pageUrl:
                          type: string
                        info:
                          type: string
                  totalPhotos:
                    type: integer

  /top250:
    get:
      operationId: getTop250
      summary: "Get Douban Top 250 movies — rank, title, rating, quote, paginated by 25"
      x-openweb:
        permission: read
        build:
          stable_id: db0005
          tool_version: 1
          signals:
            - adapter-verified
        adapter:
          name: douban-dom
          operation: getTop250
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: "Pagination offset (0, 25, 50, ...). Each page returns 25 movies."
      responses:
        "200":
          description: Top 250 movies page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  movies:
                    type: array
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        subjectId:
                          type: string
                        title:
                          type: string
                        rating:
                          type: string
                        ratingCount:
                          type: integer
                        quote:
                          type: string
                        info:
                          type: string
                        url:
                          type: string
                  start:
                    type: integer
                  pageSize:
                    type: integer

  # ── Books ───────────────────────────────────────────────────────────

  /rexxar/api/v2/search/book:
    get:
      operationId: searchBooks
      summary: "Search books by keyword — returns title, rating, author, publisher, cover for matching books"
      x-openweb:
        permission: read
        build:
          stable_id: search_book_001
          tool_version: 2
