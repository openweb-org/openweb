                            large:
                              type: object
                              properties:
                                url:
                                  type: string
                                width:
                                  type: integer
                                height:
                                  type: integer
                            normal:
                              type: object
                              properties:
                                url:
                                  type: string
                                width:
                                  type: integer
                                height:
                                  type: integer
                        description:
                          type: string
                        create_time:
                          type: string
                        comments_count:
                          type: integer
                        likers_count:
                          type: integer

                required:
