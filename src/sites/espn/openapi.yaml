                                  type: string
                            statistics:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  keys:
                                    type: array
                                    items:
                                      type: string
                                  athletes:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        athlete:
                                          type: object
                                          properties:
                                            id:
                                              type: string
                                            displayName:
                                              type: string
                                            position:
                                              type: object
                                              properties:
                                                abbreviation:
                                                  type: string
                                        stats:
                                          type: array
                                          items:
                                            type: string
                  header:
                    type: object
                    properties:
                      id:
                        type: string
                      competitions:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            competitors:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  homeAway:
                                    type: string
                                  winner:
                                    type: boolean
                                  score:
                                    type: string
                                  team:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                                      displayName:
                                        type: string
                                      abbreviation:
                                        type: string
                                      logo:
                                        type: string
                            status:
                              type: object
                              properties:
                                type:
                                  type: object
                                  properties:
                                    name:
                                      type: string
                                    state:
                                      type: string
                                    completed:
                                      type: boolean
                  leaders:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        displayName:
                          type: string
                        leaders:
                          type: array
                          items:
                            type: object
                            properties:
                              displayValue:
                                type: string
                              athlete:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  displayName:
                                    type: string
                                  team:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                  scoringPlays:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: object
                          properties:
                            text:
                              type: string
                        text:
                          type: string
                        team:
                          type: object
                          properties:
                            id:
                              type: string
                        clock:
                          type: object
                          properties:
                            displayValue:
                              type: string
                        homeScore:
                          type: integer
                        awayScore:
                          type: integer
