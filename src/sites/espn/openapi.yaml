openapi: '3.1.0'
info:
  title: ESPN
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    compiled_at: '2026-03-24T00:00:00Z'
    requires_auth: false
servers:
  - url: https://site.api.espn.com
paths:
  /apis/site/v2/sports/{sport}/{league}/scoreboard:
    get:
      operationId: getScoreboard
      summary: Get live and recent scores for a sport/league
      x-openweb:
        transport: node
        permission: read
        build:
          verified: true
          stable_id: espn0001
          signature_id: espn0001s
          tool_version: 1
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
          description: Sport slug (e.g. "football", "basketball", "baseball", "hockey", "soccer").
        - name: league
          in: path
          required: true
          schema:
            type: string
          description: League slug (e.g. "nfl", "nba", "mlb", "nhl", "eng.1").
        - name: dates
          in: query
          required: false
          schema:
            type: string
          description: Date filter in YYYYMMDD format (e.g. "20260120"). Defaults to today.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
          description: Maximum number of events to return.
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: en
          description: Language code.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [leagues, events]
                properties:
                  leagues:
                    type: array
                    items:
                      type: object
                      required: [id, name, abbreviation]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        abbreviation:
                          type: string
                        slug:
                          type: string
                        season:
                          type: object
                          properties:
                            year:
                              type: integer
                            type:
                              type: object
                              properties:
                                id:
                                  type: string
                                type:
                                  type: integer
                                name:
                                  type: string
                                abbreviation:
                                  type: string
                            name:
                              type: string
                  season:
                    type: object
                    properties:
                      type:
                        type: object
                        properties:
                          id:
                            type: string
                          type:
                            type: integer
                          name:
                            type: string
                          abbreviation:
                            type: string
                      year:
                        type: integer
                  week:
                    type: object
                    properties:
                      number:
                        type: integer
                  events:
                    type: array
                    items:
                      type: object
                      required: [id, name, shortName, competitions]
                      properties:
                        id:
                          type: string
                        uid:
                          type: string
                        date:
                          type: string
                        name:
                          type: string
                        shortName:
                          type: string
                        status:
                          type: object
                          properties:
                            clock:
                              type: number
                            displayClock:
                              type: string
                            period:
                              type: integer
                            type:
                              type: object
                              properties:
                                id:
                                  type: string
                                name:
                                  type: string
                                state:
                                  type: string
                                completed:
                                  type: boolean
                                description:
                                  type: string
                                detail:
                                  type: string
                                shortDetail:
                                  type: string
                        competitions:
                          type: array
                          items:
                            type: object
                            required: [id, competitors]
                            properties:
                              id:
                                type: string
                              date:
                                type: string
                              competitors:
                                type: array
                                items:
                                  type: object
                                  required: [id, team, score]
                                  properties:
                                    id:
                                      type: string
                                    homeAway:
                                      type: string
                                    winner:
                                      type: boolean
                                    score:
                                      type: string
                                    team:
                                      type: object
                                      required: [id, name, abbreviation]
                                      properties:
                                        id:
                                          type: string
                                        name:
                                          type: string
                                        abbreviation:
                                          type: string
                                        displayName:
                                          type: string
                                        shortDisplayName:
                                          type: string
                                        logo:
                                          type: string
                                    records:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          name:
                                            type: string
                                          abbreviation:
                                            type: string
                                          type:
                                            type: string
                                          summary:
                                            type: string
                              venue:
                                type: object
                                properties:
                                  fullName:
                                    type: string
                                  city:
                                    type: string
                                  state:
                                    type: string
                              broadcasts:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    market:
                                      type: string
                                    names:
                                      type: array
                                      items:
                                        type: string
