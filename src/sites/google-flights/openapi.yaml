openapi: '3.1.0'
info:
  title: Google Flights
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://www.google.com
    x-openweb:
      transport: page
paths:
  /travel/flights/search:
    get:
      operationId: searchFlights
      summary: Extract flight search results from an open Google Flights search page — airline, times, duration, stops, price
      x-openweb:
        permission: read
        build:
          stable_id: gf0001
          tool_version: 1
          verified: true
          signals:
            - adapter-verified
        adapter:
          name: google-flights
          operation: searchFlights
      parameters:
        - name: tfs
          in: query
          required: true
          schema:
            type: string
          description: >-
            Encoded flight search parameters (origin, destination, dates).
            Navigate to the Google Flights search page with this parameter set.
        - name: tfu
          in: query
          required: false
          schema:
            type: string
          description: Additional flight UI parameters.
      responses:
        '200':
          description: Flight search results extracted from the page.
          content:
            application/json:
              schema:
                type: object
                required:
                  - origin
                  - destination
                  - flights
                properties:
                  origin:
                    type: string
                    description: Departure city/airport name.
                  destination:
                    type: string
                    description: Arrival city/airport name.
                  resultCount:
                    type: integer
                    description: Total number of flight results.
                  flights:
                    type: array
                    items:
                      type: object
                      properties:
                        departureTime:
                          type: string
                          description: Departure time (e.g. "5:52 PM").
                        arrivalTime:
                          type: string
                          description: Arrival time (e.g. "7:30 PM").
                        airline:
                          type: string
                          description: Airline name.
                        duration:
                          type: string
                          description: Flight duration (e.g. "1 hr 38 min").
                        origin:
                          type: string
                          description: Origin airport code (e.g. "RDU").
                        destination:
                          type: string
                          description: Destination airport code (e.g. "LGA").
                        stops:
                          type: string
                          description: Stop info ("Nonstop" or "1 stop").
                        price:
                          type: integer
                          nullable: true
                          description: Price in USD.
                        co2Kg:
                          type: integer
                          nullable: true
                          description: CO2 emissions in kg.
                        emissionsPct:
                          type: integer
                          nullable: true
                          description: Emissions percentage vs typical.
  /travel/flights:
    get:
      operationId: getFlightOverview
      summary: Extract flight overview and cheapest fares from a Google Flights route page — cheapest options, fastest flight, frequency
      x-openweb:
        permission: read
        build:
          stable_id: gf0002
          tool_version: 1
          verified: false
          signals:
            - adapter-verified
        adapter:
          name: google-flights
          operation: getFlightOverview
      parameters:
        - name: tfs
          in: query
          required: true
          schema:
            type: string
          description: Encoded flight route parameters (origin, destination).
        - name: tfu
          in: query
          required: false
          schema:
            type: string
          description: Additional flight UI parameters.
      responses:
        '200':
          description: Flight overview with cheapest options for a route.
          content:
            application/json:
              schema:
                type: object
                properties:
                  origin:
                    type: string
                  destination:
                    type: string
                  cheapestOptions:
                    type: array
                    items:
                      type: object
                      properties:
                        price:
                          type: integer
                          nullable: true
                        airline:
                          type: string
                        stops:
                          type: string
                        duration:
                          type: string
                        dates:
                          type: string
                  fastestFlight:
                    type: string
                    description: Duration of the fastest nonstop.
                  nonstopFrequency:
                    type: string
                    description: How often nonstop flights operate.
  /travel/flights/booking:
    get:
      operationId: getFlightBookingDetails
      summary: Extract flight booking/itinerary details from a Google Flights detail page — legs, baggage, booking links
      x-openweb:
        permission: read
        build:
          stable_id: gf0003
          tool_version: 1
          verified: false
          signals:
            - adapter-verified
        adapter:
          name: google-flights
          operation: getFlightBookingDetails
      parameters:
        - name: tfs
          in: query
          required: true
          schema:
            type: string
          description: Encoded itinerary parameters.
      responses:
        '200':
          description: Booking details for a specific flight itinerary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalPrice:
                    type: integer
                    nullable: true
                    description: Total round-trip price in USD.
                  legs:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        departureTime:
                          type: string
                        arrivalTime:
                          type: string
                        airline:
                          type: string
                        operatedBy:
                          type: string
                        duration:
                          type: string
                        origin:
                          type: string
                        destination:
                          type: string
                        stops:
                          type: string
                  bagPolicies:
                    type: array
                    items:
                      type: string
                    description: Baggage policy summaries.
                  bookWith:
                    type: string
                    description: Airlines to book with.
