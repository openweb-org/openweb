            type: string
          example: "3865890235180097425"
        - name: x-ig-app-id
          in: header
          required: true
          schema:
            type: string
            const: "936619743392459"
        - name: x-requested-with
          in: header
          required: true
          schema:
            type: string
            const: XMLHttpRequest
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
  /api/v1/friendships/create/{id}/:
    post:
      operationId: followUser
      summary: "Follow a user — instant for public accounts, pending for private"
      x-openweb:
        permission: write
        safety: caution
        adapter:
          name: instagram-api
          operation: followUser
      parameters:
        - name: id
          in: path
          required: true
          description: "User ID (numeric). Get from getUserProfile data.user.id"
          schema:
            type: string
          example: "25025320"
        - name: x-ig-app-id
          in: header
          required: true
          schema:
            type: string
            const: "936619743392459"
        - name: x-requested-with
          in: header
          required: true
          schema:
            type: string
            const: XMLHttpRequest
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  friendship_status:
                    type: object
                    properties:
                      following:
                        type: boolean
