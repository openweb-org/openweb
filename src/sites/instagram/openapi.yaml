                                  height:
                                    type: integer
                                  url:
                                    type: string
                          required:
                            - pk
                            - media_type
                            - taken_at
                            - expiring_at
                      user:
                        type: object
                        properties:
                          pk:
                            type: string
                          username:
                            type: string
                          full_name:
                            type: string
