      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  friendship_status:
                    type: object
                    properties:
                      following:
                        type: boolean
                  status:
                    type: string
                required:
                  - status
  /api/v1/web/save/{id}/save/:
    post:
      operationId: savePost
