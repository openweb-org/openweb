          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      full_name:
                        type: string
                    required:
                      - id
                      - username
                  num_results:
                    type: integer
                  more_available:
                    type: boolean
                  next_max_id:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        pk:
                          type: string
                        id:
                          type: string
                        code:
                          type: string
                        media_type:
                          type: integer
                        taken_at:
                          type: integer
                        caption:
                          type: object
                          properties:
                            text:
                              type: string
                        like_count:
                          type: integer
                        comment_count:
                          type: integer
                        image_versions2:
                          type: object
                          properties:
                            candidates:
                              type: array
                              items:
                                type: object
                                properties:
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                                  url:
                                    type: string
                        user:
                          type: object
                          properties:
                            pk:
                              type: string
                            username:
                              type: string
                required:
                  - num_results
                  - items
  /api/v1/media/{id}/comments/:
    get:
      operationId: getPostComments
      summary: "Get comments on a post — text, author info, like counts, threading support, pagination"
      x-openweb:
        permission: read
        adapter:
          name: instagram-api
          operation: getPostComments
      parameters:
        - name: id
          in: path
          required: true
          description: "Numeric media PK. Get from getFeed items[].pk or getUserPosts items[].pk"
          schema:
            type: string
          example: "3865890235180097425"
        - name: can_support_threading
          in: query
          required: false
          description: Enable threaded comment replies
          schema:
            type: string
            default: "true"
        - name: min_id
          in: query
          required: false
          description: Pagination cursor from previous response next_min_id
          schema:
            type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      type: object
                      properties:
                        pk:
                          type: string
                        text:
                          type: string
                        created_at:
                          type: integer
                        user:
                          type: object
                          properties:
                            pk:
                              type: string
                            username:
                              type: string
                            full_name:
                              type: string
                            is_private:
                              type: boolean
                            is_verified:
                              type: boolean
                            profile_pic_url:
                              type: string
                        comment_like_count:
                          type: integer
                        child_comment_count:
                          type: integer
                      required:
                        - pk
                        - text
                        - user
                  comment_count:
                    type: integer
                  has_more_comments:
                    type: boolean
                  next_min_id:
                    type: string
                  status:
                    type: string
                required:
                  - comments
                  - status
  /api/v1/feed/user/{id}/story/:
