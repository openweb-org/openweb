          schema:
            type: string
          example: "3865890235180097425"
        - name: x-ig-app-id
          in: header
          required: true
          schema:
            type: string
            const: "936619743392459"
        - name: x-requested-with
          in: header
          required: true
          schema:
            type: string
            const: XMLHttpRequest
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
  /api/v1/web/save/{id}/unsave/:
    post:
      operationId: unsavePost
      summary: "Remove a post from your saved collection"
      x-openweb:
        permission: write
        safety: caution
        adapter:
          name: instagram-api
          operation: unsavePost
      parameters:
        - name: id
          in: path
          required: true
          description: "Numeric media PK"
          schema:
            type: string
          example: "3865890235180097425"
        - name: x-ig-app-id
          in: header
          required: true
          schema:
            type: string
            const: "936619743392459"
        - name: x-requested-with
          in: header
          required: true
          schema:
            type: string
            const: XMLHttpRequest
      responses:
