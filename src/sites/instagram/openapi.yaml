                                                        - |-
                                                          ⚠️臥推失敗自救指南：
                                                          在槓鈴壓胸前，你必須知道的保命招式！

                                                          無論你是新手還是資深巨巨，只要在沒有補手（Spotter）的情況下臥推，這幾招你一定要學會。

                                                          💪🏻在健身房裡，臥推（Bench Press）是最容易發生意外的動作之一。當你推到最後一下，槓鈴停在半空中甚至緩緩壓向胸口，你突然發現槓鈴不動如山壓在你身上，那種感覺，慘。

                                                          🚨這篇文教你如何冷靜處理這種情況！

                                                          🥇預防勝於治療：最強的招式是「預防」。

                                                          使用護槓（Safety Bars/Pins）：如果你是在深蹲架或有安全護槓的臥推架訓練，請務必將護欄調整好再開始臥推。

                                                          有護槓的情況下，當你失敗時，只要放鬆不挺胸，身體稍微一縮，槓鈴就會落在護欄上，不會壓迫到氣管或肋骨。

                                                          此外，最好的預防方式是在挑戰重量前，禮貌地詢問有訓練經驗的健友：「不好意思，可以幫我看一下這一組嗎？」

                                                          👊🏻招式一：恥辱捲動（The Roll of Shame）
                                                          這是最常見也最實用的自救法，但看起來可能小尷尬，當你發現推不上去時，不要硬推，慢慢將槓鈴降落下胸處，然後收緊核心，利用槓鈴的圓形結構，順著你身體往腹部、大腿一路往膝蓋方向滾動，然後當槓鈴滾到大腿時，順勢坐起身，讓槓鈴落在地上或臥推椅上。

                                                          ＊注意滾動過程中核心要收緊。

                                                          🦵🏻招式二：側傾卸重（Dumping the Weights）
                                                          這招是在你沒有上扣環的情況下的保命手段，如果你有用槓片扣環，那這招無效。

                                                          若你發現槓鈴推不動，讓槓鈴壓在胸口，把槓鈴向側邊傾斜，讓那側的槓片滑落，當一側槓片滑落後，槓鈴會因為重量不平均而迅速向另一側倒，稍微控制傾斜的速度，讓另一側的槓片也滑落，最後再將沒有槓片的槓鈴推回。

                                                          但要注意，這招會有巨大的噪音且對地板、器材有損害風險，且槓片落下和彈開會有一定的衝擊，請盡量確保周遭沒有人並且不要隨意使用，這是在面臨要被槓鈴壓死時的最後手段。

                                                          🚨最後，如果你真的被壓住了且無法執行上述動作，請拋下自尊心，趕快呼叫救命，請周遭的人來幫忙！
