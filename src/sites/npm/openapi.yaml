openapi: '3.1.0'
info:
  title: npm Registry
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://registry.npmjs.org
paths:
  /{package}:
    get:
      operationId: getPackage
      summary: Get full metadata for an npm package by name
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: npm0001
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: Package name (e.g. express). For scoped packages use %40scope%2Fname.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [name, dist-tags, versions, time, maintainers]
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  dist-tags:
                    type: object
                    required: [latest]
                    properties:
                      latest:
                        type: string
                  versions:
                    type: object
                  time:
                    type: object
                  maintainers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        email:
                          type: string
                  repository:
                    type: object
                    properties:
                      type:
                        type: string
                      url:
                        type: string
                  readme:
                    type: string
                  license:
                    type: string
                  homepage:
                    type: string
  /-/v1/search:
    get:
      operationId: searchPackages
      summary: Search npm packages by text query
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: npm0002
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
          description: Search query text.
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of results to return.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [objects, total, time]
                properties:
                  objects:
                    type: array
                    items:
                      type: object
                      required: [package, score]
                      properties:
                        package:
                          type: object
                          required: [name, version]
                          properties:
                            name:
                              type: string
                            version:
                              type: string
                            description:
                              type: string
                            keywords:
                              type: array
                              items:
                                type: string
                            date:
                              type: string
                            links:
                              type: object
                            publisher:
                              type: object
                            maintainers:
                              type: array
                              items:
                                type: object
                        score:
                          type: object
                          properties:
                            final:
                              type: number
                            detail:
                              type: object
                  total:
                    type: integer
                  time:
                    type: string
  /{package}/{version}:
    get:
      operationId: getPackageVersion
      summary: Get metadata for a specific version of a package
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: npm0003
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: Package name (e.g. express).
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Semver version string (e.g. 4.21.2).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [name, version]
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  description:
                    type: string
                  main:
                    type: string
                  dependencies:
                    type: object
                  devDependencies:
                    type: object
                  dist:
                    type: object
                    properties:
                      shasum:
                        type: string
                      tarball:
                        type: string
                      integrity:
                        type: string
                  engines:
                    type: object
                  license:
                    type: string
                  repository:
                    type: object
                  scripts:
                    type: object
  /-/package/{package}/dist-tags:
    get:
      operationId: getDistTags
      summary: Get dist-tags (latest, next, etc.) for a package
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: npm0004
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: Package name (e.g. express).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  latest:
                    type: string
                  next:
                    type: string
  /downloads/point/{period}/{package}:
    get:
      operationId: getDownloadStats
      summary: Get total download count for a package over a period
      servers:
        - url: https://api.npmjs.org
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: npm0005
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: Package name (e.g. express).
        - name: period
          in: path
          required: true
          schema:
            type: string
            enum: [last-day, last-week, last-month, last-year]
          description: Time period for download counts.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [downloads, package, start, end]
                properties:
                  downloads:
                    type: integer
                  start:
                    type: string
                  end:
                    type: string
                  package:
                    type: string
  /downloads/range/{period}/{package}:
    get:
      operationId: getDownloadRange
      summary: Get daily download counts for a package over a date range
      servers:
        - url: https://api.npmjs.org
      x-openweb:
        transport: node
        permission: read
        build:
          stable_id: npm0006
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: Package name (e.g. express).
        - name: period
          in: path
          required: true
          schema:
            type: string
          description: Date range as last-week, last-month, or YYYY-MM-DD:YYYY-MM-DD.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [downloads, package, start, end]
                properties:
                  downloads:
                    type: array
                    items:
                      type: object
                      required: [downloads, day]
                      properties:
                        downloads:
                          type: integer
                        day:
                          type: string
                  start:
                    type: string
                  end:
                    type: string
                  package:
                    type: string
