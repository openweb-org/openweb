        required: true
        schema:
          type: string
        description: "Source URL path, e.g. /pin/12345/"
        example: /pin/12345/
      - name: data
        in: query
        required: true
        schema:
          type: string
        description: 'JSON string with pin options. Example: {"options":{"id":"12345","field_set_key":"detailed"},"context":{}}'
        example: '{"options":{"id":"12345","field_set_key":"detailed"},"context":{}}'
      - name: x-requested-with
        in: header
        required: true
        schema:
          type: string
          const: XMLHttpRequest
      - name: x-pinterest-appstate
        in: header
        required: true
        schema:
          type: string
          const: active
      - name: x-pinterest-pws-handler
        in: header
        required: true
        schema:
          type: string
          default: "www/[...path].js"
        description: "Pinterest PWS handler path"
      - name: x-pinterest-source-url
        in: header
        required: true
        schema:
          type: string
          default: /pin/12345/
        description: "Source URL for Pinterest tracking"
      - name: accept
