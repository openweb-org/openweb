openapi: 3.1.0
info:
  title: pinterest
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-04-01T23:48:05.685Z
    requires_auth: true
servers:
  - url: https://www.pinterest.com
    x-openweb:
      transport: page
      auth:
        type: cookie_session
      csrf:
        type: cookie_to_header
        cookie: csrftoken
        header: x-csrftoken
        scope: [POST, PUT, DELETE]
paths:
  /resource/BaseSearchResource/get/:
    get:
      operationId: searchPins
      summary: "Search pins by keyword — returns pin images, titles, links, board info, pinner info"
      x-openweb:
        permission: read
        build:
          stable_id: pinterest_searchPins_v1
          tool_version: 2
      parameters:
        - name: source_url
          in: query
          required: true
          schema:
            type: string
            default: /search/pins/?q=cats
          description: "Source URL path for the request context"
        - name: data
          in: query
          required: true
          schema:
            type: string
          description: 'JSON string with search options. Example: {"options":{"query":"cats","scope":"pins","page_size":25},"context":{}}'
          example: '{"options":{"query":"cats","scope":"pins","page_size":25},"context":{}}'
        - name: x-requested-with
          in: header
          required: true
          schema:
            type: string
            const: XMLHttpRequest
        - name: x-pinterest-appstate
          in: header
          required: true
          schema:
            type: string
            const: active
        - name: x-pinterest-pws-handler
          in: header
          required: true
          schema:
            type: string
            default: "www/search/[scope].js"
          description: "Pinterest PWS handler path"
        - name: x-pinterest-source-url
          in: header
          required: true
          schema:
            type: string
            default: /search/pins/?q=cats
          description: "Source URL for Pinterest tracking"
        - name: accept
          in: header
          required: true
          schema:
            type: string
            const: "application/json, text/javascript, */*, q=0.01"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource_response:
                    type: object
                    properties:
                      status:
                        type: string
                      data:
                        type: object
                        properties:
                          results:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                type:
                                  type: string
                                images:
                                  type: object
                                grid_title:
                                  type: string
                                description:
                                  type: string
                                link:
                                  type: string
                                  nullable: true
                                dominant_color:
                                  type: string
                                domain:
                                  type: string
                                pinner:
                                  type: object
                                board:
                                  type: object
                                created_at:
                                  type: string
                          bookmark:
                            type: string
                            nullable: true

  /resource/PinResource/get/:
    get:
      operationId: getPin
      summary: "Get pin details — image, title, description, link, board, pinner, comments, related pins"
      x-openweb:
        permission: read
        build:
          stable_id: pinterest_getPin_v1
          tool_version: 2
      parameters:
        - name: source_url
          in: query
          required: true
          schema:
            type: string
          description: "Source URL path, e.g. /pin/12345/"
          example: /pin/12345/
        - name: data
          in: query
          required: true
          schema:
            type: string
          description: 'JSON string with pin options. Example: {"options":{"id":"12345","field_set_key":"detailed"},"context":{}}'
          example: '{"options":{"id":"12345","field_set_key":"detailed"},"context":{}}'
        - name: x-requested-with
          in: header
          required: true
          schema:
            type: string
            const: XMLHttpRequest
        - name: x-pinterest-appstate
          in: header
          required: true
          schema:
            type: string
            const: active
        - name: x-pinterest-pws-handler
          in: header
          required: true
          schema:
            type: string
            default: "www/[...path].js"
          description: "Pinterest PWS handler path"
        - name: x-pinterest-source-url
          in: header
          required: true
          schema:
            type: string
            default: /pin/12345/
          description: "Source URL for Pinterest tracking"
        - name: accept
          in: header
          required: true
          schema:
            type: string
            const: "application/json, text/javascript, */*, q=0.01"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource_response:
                    type: object
                    properties:
                      status:
                        type: string
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          type:
                            type: string
                          title:
                            type: string
                          description:
                            type: string
                          link:
                            type: string
                            nullable: true
                          images:
                            type: object
                          dominant_color:
                            type: string
                          pinner:
                            type: object
                          board:
                            type: object
                          comment_count:
                            type: integer
                          repin_count:
                            type: integer
                          reaction_counts:
                            type: object

