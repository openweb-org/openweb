            schema:
              type: object
              required:
                - pin_id
                - board_id
              properties:
                pin_id:
                  type: string
                  description: "ID of the pin to save. Get from searchPins or getPin"
                board_id:
                  type: string
                  description: "ID of the board to save the pin to. Get from getBoard"
                section_id:
                  type: string
                  description: "Optional board section ID to save the pin into"
      responses:
