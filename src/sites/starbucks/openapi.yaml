openapi: '3.1.0'
info:
  title: Starbucks
  version: '1.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
  - url: https://www.starbucks.com
    x-openweb:
      transport: page
paths:
  /apiproxy/v1/locations:
    get:
      operationId: searchStores
      summary: Find nearby Starbucks stores by coordinates — raw BFF locations response with store details, address, hours, amenities, distance, mobile ordering status
      x-openweb:
        permission: read
        adapter: false
        build:
          stable_id: sbux0001
          tool_version: 3
          verified: true
          signals:
            - adapter-verified
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude of search center.
          example: 37.7749
        - name: lng
          in: query
          required: true
          schema:
            type: number
          description: Longitude of search center.
          example: -122.4194
        - name: X-Requested-With
          in: header
          required: false
          schema:
            type: string
            default: XMLHttpRequest
          description: Required by the Starbucks BFF to treat the request as XHR.
      responses:
        '200':
          description: Nearby Starbucks stores sorted by distance (raw BFF response).
          content:
            application/json:
              schema:
                type: array
                description: Array of store entries sorted by distance from search center.
                items:
                  type: object
                  additionalProperties: true
                  properties:
                    distance:
                      type: number
                      description: Distance in miles from search center.
                    store:
                      type: object
                      additionalProperties: true
                      description: Store details.
                      properties:
                        storeNumber:
                          type: string
                          description: Unique store number.
                        name:
                          type: string
                          description: Store display name.
                        phoneNumber:
                          type:
                            - string
                            - 'null'
                          description: Store phone number.
                        open:
                          type: boolean
                          description: Whether the store is currently open.
                        openStatusFormatted:
                          type: string
                          description: Human-readable open status.
                        hoursStatusFormatted:
                          type: string
                          description: Today's hours.
                        address:
                          type: object
                          additionalProperties: true
                          description: Store address block.
                        coordinates:
                          type: object
                          additionalProperties: true
                          description: Store geographic coordinates.
                        amenities:
                          type: array
                          items:
                            type: object
                            additionalProperties: true
                        mobileOrdering:
                          type: object
                          additionalProperties: true

  /stores/detail:
    get:
      operationId: getStoreDetail
      summary: Get full store details — address, weekly schedule, amenities, mobile ordering, coordinates
      x-openweb:
        permission: read
        build:
          stable_id: sbux0002
          tool_version: 2
          verified: true
          signals:
            - adapter-verified
        adapter:
          name: starbucks
          operation: getStoreDetail
      parameters:
        - name: storeNumber
          in: query
          required: true
          schema:
            type: string
          description: Store number from searchStores.
          example: '53646-283069'
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Approximate latitude of the store (from searchStores).
          example: 37.7772
        - name: lng
          in: query
          required: true
          schema:
            type: number
          description: Approximate longitude of the store (from searchStores).
          example: -122.4193
      responses:
        '200':
          description: Full store details.
          content:
            application/json:
              schema:
                type: object
                required:
                  - storeNumber
                  - name
                properties:
                  storeNumber:
                    type: string
                    description: Unique store number.
                  name:
                    type: string
                    description: Store display name.
                  phoneNumber:
                    type:
                      - string
                      - 'null'
                    description: Store phone number.
                  open:
                    type: boolean
                    description: Whether the store is currently open.
                  isOpen24Hours:
                    type: boolean
                    description: Whether the store operates 24 hours.
                  openStatus:
                    type: string
                    description: Human-readable open status.
                  hours:
                    type: string
                    description: Today's hours.
                  address:
                    type: object
                    required:
                      - singleLine
                    description: Store address.
                    properties:
                      streetAddress:
                        type: string
                        description: Street address line.
                      city:
                        type: string
                        description: City name.
                      state:
                        type: string
                        description: State or province code.
                      postalCode:
                        type: string
                        description: Postal/ZIP code.
                      country:
                        type: string
                        description: Country code (e.g. "US").
                      singleLine:
                        type: string
                        description: Full address as a single line.
                  coordinates:
                    type: object
                    required:
                      - latitude
                      - longitude
                    description: Store geographic coordinates.
                    properties:
                      latitude:
                        type: number
                        description: Store latitude.
                      longitude:
                        type: number
                        description: Store longitude.
                  schedule:
                    type: array
                    description: Weekly operating schedule.
                    items:
                      type: object
                      required:
                        - day
                        - open
                      properties:
                        day:
                          type: string
                          description: Day of the week (e.g. "Monday").
                        hours:
                          type: string
                          description: Hours for that day (e.g. "4:30 AM-8:00 PM").
                        open:
                          type: boolean
                          description: Whether the store is open on that day.
                  amenities:
                    type: array
                    description: Store amenities and features.
                    items:
                      type: object
                      required:
                        - code
                        - name
                      properties:
                        code:
                          type: string
                          description: Amenity code identifier.
                        name:
                          type: string
                          description: Human-readable amenity name.
                  mobileOrdering:
                    type: object
                    required:
                      - available
                    description: Mobile ordering status.
                    properties:
                      available:
                        type: boolean
                        description: Whether mobile ordering is available.
                      guestOrdering:
                        type: boolean
                        description: Whether guest (non-account) ordering is supported.
                  ownershipType:
                    type: string
                    description: Ownership type code (CO = company-owned, LS = licensed).
                  slug:
                    type: string
                    description: URL slug for the store page.

  /apiproxy/v1/ordering/menu:
    get:
      operationId: getMenu
      summary: Get Starbucks menu — raw BFF menu response with categories, subcategories, products with sizes, availability, and images
      x-openweb:
        permission: read
        adapter: false
        build:
          stable_id: sbux0003
          tool_version: 3
          verified: true
          signals:
            - adapter-verified
      parameters: []
      responses:
        '200':
          description: Full menu (raw BFF response).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  menus:
                    type: array
                    description: Top-level menu categories.
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        name:
                          type: string
                          description: Category name (e.g. "Drinks", "Food").
                        children:
                          type: array
                          description: Subcategories.
                          items:
                            type: object
                            additionalProperties: true
                            properties:
                              name:
                                type: string
                              categoryImageURL:
                                type:
                                  - string
                                  - 'null'
                              products:
                                type: array
                                items:
                                  type: object
                                  additionalProperties: true
