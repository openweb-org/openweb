                          type: string
                        discounted:
                          type: boolean
                        discount_percent:
                          type: integer
                        original_price:
                          oneOf:
                            - type: integer
                            - type: 'null'
                        final_price:
                          oneOf:
                            - type: integer
                            - type: 'null'
                        currency:
                          type: string
                        windows_available:
                          type: boolean
                        mac_available:
                          type: boolean
                        linux_available:
                          type: boolean
                        streamingvideo_available:
                          type: boolean
                        header_image:
                          type: string
                  featured_linux:
                    type: array
                    items:
                      type: object
                      required: [id, name]
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        discounted:
                          type: boolean
                        discount_percent:
                          type: integer
                        original_price:
                          oneOf:
                            - type: integer
                            - type: 'null'
                        final_price:
                          oneOf:
                            - type: integer
