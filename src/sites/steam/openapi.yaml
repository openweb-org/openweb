openapi: '3.1.0'
info:
  title: Steam Store
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    compiled_at: '2026-03-24T00:00:00Z'
    requires_auth: false
servers:
  - url: https://store.steampowered.com
    x-openweb:
      transport: node
  - url: https://api.steampowered.com
paths:
  /api/appdetails:
    get:
      operationId: getAppDetails
      summary: Get full game details — name, price, short description, genres, platforms, developers, metacritic score, release date
      x-openweb:
        transport: node
        permission: read
        adapter:
          name: steam
          operation: getAppDetails
        build:
          verified: true
          stable_id: stm0001
          signature_id: stm0001s
          tool_version: 1
      parameters:
        - name: appids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated Steam app IDs (e.g. "730" or "730,1245620").
        - name: cc
          in: query
          required: false
          schema:
            type: string
            default: US
          description: Country code for pricing (e.g. "US", "GB", "DE").
        - name: l
          in: query
          required: false
          schema:
            type: string
            default: english
          description: Language for descriptions (e.g. "english", "spanish").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  required: [success]
                  properties:
                    success:
                      type: boolean
                    data:
                      type: object
                      required: [name, steam_appid]
                      properties:
                        type:
                          type: string
                        name:
                          type: string
                        steam_appid:
                          type: integer
                        is_free:
                          type: boolean
                        short_description:
                          type: string
                        header_image:
                          type: string
                        developers:
                          type: array
                          items:
                            type: string
                        publishers:
                          type: array
                          items:
                            type: string
                        price_overview:
                          oneOf:
                            - type: object
                              required: [currency, final]
                              properties:
                                currency:
                                  type: string
                                initial:
                                  type: integer
                                final:
                                  type: integer
                                discount_percent:
                                  type: integer
                                final_formatted:
                                  type: string
                            - type: 'null'
                        platforms:
                          type: object
                          required: [windows, mac, linux]
                          properties:
                            windows:
                              type: boolean
                            mac:
                              type: boolean
                            linux:
                              type: boolean
                        categories:
                          type: array
                          items:
                            type: object
                            required: [id, description]
                            properties:
                              id:
                                type: integer
                              description:
                                type: string
                        genres:
                          type: array
                          items:
                            type: object
                            required: [id, description]
                            properties:
                              id:
                                type: string
                              description:
                                type: string
                        release_date:
                          type: object
                          required: [coming_soon, date]
                          properties:
                            coming_soon:
                              type: boolean
                            date:
                              type: string
                        metacritic:
                          oneOf:
                            - type: object
                              required: [score, url]
                              properties:
                                score:
                                  type: integer
                                url:
                                  type: string
                            - type: 'null'
                        recommendations:
                          oneOf:
                            - type: object
                              required: [total]
                              properties:
                                total:
                                  type: integer
                            - type: 'null'

  /api/storesearch/:
    get:
      operationId: searchGames
      summary: Search Steam store by keyword — returns matching apps with id, name, price, metascore, platforms
      x-openweb:
        transport: node
        permission: read
        adapter:
          name: steam
          operation: searchGames
        build:
          verified: true
          stable_id: stm0002
          signature_id: stm0002s
          tool_version: 1
      parameters:
        - name: term
          in: query
          required: true
          schema:
            type: string
          description: Search query (e.g. "elden ring").
        - name: l
          in: query
          required: false
          schema:
            type: string
            default: english
          description: Language.
        - name: cc
          in: query
          required: false
          schema:
            type: string
            default: US
          description: Country code for pricing.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [total, items]
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, name]
                      properties:
                        type:
                          type: string
                        name:
                          type: string
                        id:
                          type: integer
                        price:
                          type: object
                          required: [currency, final]
                          properties:
                            currency:
                              type: string
                            initial:
                              type: integer
                            final:
                              type: integer
                        tiny_image:
                          type: string
                        metascore:
                          type: string
                        platforms:
                          type: object
                          required: [windows, mac, linux]
                          properties:
                            windows:
                              type: boolean
                            mac:
                              type: boolean
                            linux:
                              type: boolean

  /appreviews/{appid}:
    get:
      operationId: getAppReviews
      summary: Get user reviews for a game — review text, voted_up, votes_up, author playtime, review score summary
      x-openweb:
        transport: node
        permission: read
        adapter:
          name: steam
          operation: getAppReviews
        build:
          verified: true
          stable_id: stm0003
          signature_id: stm0003s
          tool_version: 1
      parameters:
        - name: appid
          in: path
          required: true
          schema:
            type: integer
          description: Steam app ID (e.g. 730).
        - name: json
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Set to 1 for JSON response (auto-injected by adapter).
        - name: num_per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of reviews per page.
        - name: filter
          in: query
          required: false
          schema:
            type: string
            default: recent
          description: Filter type (recent, updated, all).
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: english
          description: Language filter.
        - name: review_type
          in: query
          required: false
          schema:
            type: string
            default: all
          description: Review type (positive, negative, all).
        - name: purchase_type
          in: query
          required: false
          schema:
            type: string
            default: all
          description: Purchase type (steam, non_steam_purchase, all).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [query_summary, reviews]
                properties:
                  success:
                    type: integer
                  query_summary:
                    type: object
                    required: [num_reviews]
                    properties:
                      num_reviews:
                        type: integer
                      review_score:
                        type: integer
                      review_score_desc:
                        type: string
                      total_positive:
                        type: integer
                      total_negative:
                        type: integer
                      total_reviews:
                        type: integer
                  reviews:
                    type: array
                    items:
                      type: object
                      required: [recommendationid, review, voted_up]
                      properties:
                        recommendationid:
                          type: string
                        author:
                          type: object
                          required: [steamid]
                          properties:
                            steamid:
                              type: string
                            num_games_owned:
                              type: integer
                            num_reviews:
                              type: integer
                            playtime_forever:
                              type: integer
                        language:
                          type: string
                        review:
                          type: string
                        voted_up:
                          type: boolean
                        votes_up:
                          type: integer
                        votes_funny:
                          type: integer
                        timestamp_created:
                          type: integer
                        timestamp_updated:
                          type: integer

