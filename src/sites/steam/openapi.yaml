      parameters:
        - name: appid
          in: query
          required: true
          schema:
            type: integer
          description: Steam app ID (e.g. 730).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [response]
                properties:
                  response:
                    type: object
                    required: [player_count, result]
                    properties:
                      player_count:
                        type: integer
                      result:
                        type: integer

  /ISteamUserStats/GetGlobalAchievementPercentagesForApp/v2/:
