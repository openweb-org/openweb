                        currency:
                          type: string
                        windows_available:
                          type: boolean
                        mac_available:
                          type: boolean
                        linux_available:
                          type: boolean
                        streamingvideo_available:
                          type: boolean
                        header_image:
                          type: string
                  layout:
                    type: string
                  status:
                    type: integer

