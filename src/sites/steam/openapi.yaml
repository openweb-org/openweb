                        mac_available:
                          type: boolean
                        linux_available:
                          type: boolean
                        streamingvideo_available:
                          type: boolean
                        discount_expiration:
                          type: integer
                        header_image:
                          type: string
                        large_capsule_image:
                          type: string
                        small_capsule_image:
                          type: string
                  featured_win:
                    type: array
                    items:
                      type: object
                      required: [id, name]
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        discounted:
