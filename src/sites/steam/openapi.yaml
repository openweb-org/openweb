  /api/packagedetails:
    get:
      operationId: getPackageDetails
      summary: Get package/bundle details — name, included apps, price, discount, platform support
      x-openweb:
        transport: node
        permission: read
        adapter:
          name: steam
          operation: getPackageDetails
        build:
          verified: true
          stable_id: stm0006
          signature_id: stm0006s
          tool_version: 1
      parameters:
        - name: packageids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated package IDs (e.g. "354231").
        - name: cc
          in: query
          required: false
          schema:
            type: string
            default: US
          description: Country code for pricing.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  required: [success]
                  properties:
                    success:
                      type: boolean
                    data:
                      type: object
                      required: [name, apps]
                      properties:
                        name:
                          type: string
                        page_image:
                          type: string
                        apps:
                          type: array
                          items:
                            type: object
                            required: [id, name]
                            properties:
