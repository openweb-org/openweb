  /ISteamNews/GetNewsForApp/v2/:
    get:
      operationId: getAppNews
      summary: "Get news articles for a game — title, author, contents, date, url, feedname, tags"
      servers:
        - url: https://api.steampowered.com
      x-openweb:
        transport: node
        permission: read
        adapter:
          name: steam
          operation: getAppNews
        build:
          verified: true
          stable_id: stm0007
          signature_id: stm0007s
          tool_version: 1
      parameters:
        - name: appid
          in: query
          required: true
          schema:
            type: integer
          description: Steam app ID (e.g. 730).
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of news items to return.
        - name: maxlength
          in: query
          required: false
          schema:
            type: integer
            default: 300
          description: Max length of each news item body (0 for full).
        - name: feeds
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated feed names to filter (e.g. "steam_community_announcements").
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [appnews]
                properties:
                  appnews:
                    type: object
                    required: [appid, newsitems]
                    properties:
                      appid:
                        type: integer
                      newsitems:
                        type: array
                        items:
                          type: object
                          required: [gid, title, url]
                          properties:
                            gid:
                              type: string
                            title:
                              type: string
                            url:
                              type: string
                            author:
                              type: string
                            contents:
                              type: string
                            date:
                              type: integer
                            feedname:
                              type: string
                            tags:
                              type: array
                              items:
                                type: string

  /ISteamUserStats/GetNumberOfCurrentPlayers/v1/:
    get:
      operationId: getCurrentPlayers
      summary: Get current online player count for a game — player_count, result status
      servers:
