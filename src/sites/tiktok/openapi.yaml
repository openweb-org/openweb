openapi: 3.1.0
info:
  title: tiktok
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-04-06T02:00:08.706Z
    requires_auth: true
servers:
  - url: https://www.tiktok.com
    x-openweb:
      transport: page
      auth:
        type: cookie_session
paths:
  /api/search/general/full/:
    get:
      operationId: searchVideos
      summary: "Search videos by keyword — title, description, author, play count, likes, shares, video URLs, music info"
      x-openweb:
        permission: read
        build:
          stable_id: f04932b312a0b4fe
          tool_version: 2
      parameters:
        - name: keyword
          in: query
          required: true
          description: Search query string
          schema:
            type: string
          example: cooking
        - name: count
          in: query
          required: false
          description: "Number of results per page (default: 12)"
          schema:
            type: integer
            default: 12
          example: 12
        - name: offset
          in: query
          required: false
          description: "Result offset for pagination (default: 0)"
          schema:
            type: integer
            default: 0
          example: 0
        - name: search_source
          in: query
          required: false
          description: "Search source context"
          schema:
            type: string
            default: normal_search
          example: normal_search
        - name: from_page
          in: query
          required: false
          description: "Page context for the search"
          schema:
            type: string
            default: search
          example: search
      responses:
        "200":
          description: Success.
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  status_code:
                    type: integer
                    description: "0 = success"
                  data:
                    type: array
                    description: Search result items
                    items:
                      type: object
                      required:
                        - type
                        - item
                      properties:
                        type:
                          type: integer
                          description: "Result type (1 = video)"
                        item:
                          type: object
                          required:
                            - id
                            - desc
                            - video
                            - author
                            - stats
                          properties:
                            id:
                              type: string
                              description: Video ID
                            desc:
                              type: string
                              description: Video description/caption
                            createTime:
                              type: integer
                              description: Unix timestamp of creation
                            video:
                              type: object
                              required:
                                - id
                                - cover
                              properties:
                                id:
                                  type: string
                                  description: Video asset ID
                                height:
                                  type: integer
                                  description: Video height in pixels
                                width:
                                  type: integer
                                  description: Video width in pixels
                                duration:
                                  type: integer
                                  description: Duration in seconds
                                ratio:
                                  type: string
                                  description: Aspect ratio label
                                cover:
                                  type: string
                                  format: uri
                                  description: Thumbnail URL
                                originCover:
                                  type: string
                                  format: uri
                                  description: Original cover image URL
                                playAddr:
                                  type: string
                                  format: uri
                                  description: Video playback URL
                                downloadAddr:
                                  type: string
                                  format: uri
                                  description: Video download URL
                                format:
                                  type: string
                                  description: Video format (e.g. mp4)
                                size:
                                  type: integer
                                  description: File size in bytes
                            author:
                              type: object
                              required:
                                - id
                                - uniqueId
                                - nickname
                              properties:
                                id:
                                  type: string
                                  description: Author user ID
                                uniqueId:
                                  type: string
                                  description: "@username handle"
                                nickname:
                                  type: string
                                  description: Display name
                                avatarThumb:
                                  type: string
                                  format: uri
                                  description: Avatar thumbnail URL
                                signature:
                                  type: string
                                  description: Author bio
                                verified:
                                  type: boolean
                                  description: Whether the author is verified
                                secUid:
                                  type: string
                                  description: Secure user ID
                            music:
                              type: object
                              required:
                                - id
                                - title
                              properties:
                                id:
                                  type: string
                                  description: Music track ID
                                title:
                                  type: string
                                  description: Track title
                                playUrl:
                                  type: string
                                  format: uri
                                  description: Music playback URL
                                authorName:
                                  type: string
                                  description: Music artist name
                                original:
                                  type: boolean
                                  description: Whether this is an original sound
                                duration:
                                  type: integer
                                  description: Track duration in seconds
                                album:
                                  type: string
                                  description: Album name
                            challenges:
                              type: array
                              description: Hashtags/challenges used
                              items:
                                type: object
                                required:
                                  - id
                                  - title
                                properties:
                                  id:
                                    type: string
                                    description: Challenge/hashtag ID
                                  title:
                                    type: string
                                    description: Challenge/hashtag name
                                  desc:
                                    type: string
                                    description: Challenge description
                            stats:
                              type: object
                              required:
                                - diggCount
                                - shareCount
                                - commentCount
                                - playCount
                                - collectCount
                              properties:
                                diggCount:
                                  type: integer
                                  description: Number of likes
                                shareCount:
                                  type: integer
                                  description: Number of shares
                                commentCount:
                                  type: integer
                                  description: Number of comments
                                playCount:
                                  type: integer
                                  description: Number of plays
                                collectCount:
                                  type: integer
                                  description: Number of bookmarks
                  cursor:
                    type: integer
                    description: Cursor for next page (use as offset)
                  has_more:
                    type: integer
                    description: "1 = more results available, 0 = end"
                required:
                  - status_code
                  - data
                  - cursor
                  - has_more

  /@{username}/video/{videoId}:
    get:
      operationId: getVideoDetail
      summary: "Get video detail — description, likes, comments, shares, play count, music, author info"
      x-openweb:
        permission: read
        build:
          stable_id: tk_getVideoDetail_v1
          tool_version: 2
          signals:
            - adapter-verified
        adapter:
          name: tiktok-web
          operation: getVideoDetail
      parameters:
        - name: username
          in: path
          required: true
          description: "TikTok username (without @ prefix, e.g. 'charlidamelio')"
          schema:
            type: string
          example: tiktok
        - name: videoId
          in: path
          required: true
          description: "Video ID (numeric, e.g. '7345678901234567890')"
          schema:
            type: string
          example: "7345678901234567890"
      responses:
        "200":
          description: Video detail.
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - description
                  - video
                  - author
                  - stats
                properties:
                  id:
                    type: string
                    description: Video ID
                  description:
                    type: string
                    description: Video caption/description
                  createTime:
                    type:
                      - integer
                      - "null"
                    description: Unix timestamp of creation
                  video:
                    type: object
                    required:
                      - id
                      - cover
                    properties:
                      id:
                        type: string
                        description: Video asset ID
                      height:
                        type: integer
                        description: Video height in pixels
                      width:
                        type: integer
                        description: Video width in pixels
                      duration:
                        type: integer
                        description: Duration in seconds
                      cover:
                        type: string
                        format: uri
                        description: Thumbnail URL
                      playAddr:
                        type: string
                        format: uri
                        description: Video playback URL
                      downloadAddr:
                        type: string
                        format: uri
                        description: Video download URL
                  author:
                    type: object
                    required:
                      - id
                      - uniqueId
                      - nickname
                    properties:
                      id:
                        type: string
                        description: Author user ID
                      uniqueId:
                        type: string
                        description: "@username handle"
                      nickname:
                        type: string
                        description: Display name
                      avatarThumb:
                        type: string
                        format: uri
                        description: Avatar thumbnail URL
                      signature:
                        type: string
                        description: Author bio
                      verified:
                        type: boolean
                        description: Whether the author is verified
                  music:
                    type: object
                    required:
                      - id
                      - title
                    properties:
                      id:
                        type: string
                        description: Music track ID
                      title:
                        type: string
                        description: Track title
                      authorName:
                        type: string
                        description: Music artist name
                      playUrl:
                        type: string
                        format: uri
                        description: Music playback URL
                      duration:
                        type: integer
                        description: Track duration in seconds
                      original:
                        type: boolean
                        description: Whether this is an original sound
                      album:
                        type: string
                        description: Album name
                  stats:
                    type: object
                    required:
                      - diggCount
                      - shareCount
                      - commentCount
                      - playCount
                      - collectCount
                    properties:
                      diggCount:
                        type: integer
                        description: Number of likes
                      shareCount:
                        type: integer
                        description: Number of shares
                      commentCount:
                        type: integer
                        description: Number of comments
                      playCount:
                        type: integer
                        description: Number of plays
                      collectCount:
                        type: integer
                        description: Number of bookmarks
                  challenges:
                    type: array
                    description: Hashtags/challenges used
                    items:
                      type: object
                      required:
                        - id
                        - title
                      properties:
                        id:
                          type: string
                          description: Challenge/hashtag ID
                        title:
                          type: string
                          description: Challenge/hashtag name
                        desc:
                          type: string
                          description: Challenge description

  /@{username}:
    get:
      operationId: getUserProfile
