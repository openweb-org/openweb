                              type: string
                              description: Commenter display name
                            avatarThumb:
                              type: string
                              format: uri
                              description: Commenter avatar URL
                  total:
                    type: integer
                    description: Total number of comments
                  cursor:
                    type: integer
                    description: Cursor for next page
                  hasMore:
                    type: boolean
                    description: Whether more comments are available

