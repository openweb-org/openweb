          schema:
            type: string
          example: tiktok
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - uniqueId
                  - nickname
                  - stats
                properties:
                  id:
                    type: string
                    description: User ID
                  uniqueId:
                    type: string
                    description: "@username handle"
                  nickname:
                    type: string
                    description: Display name
                  avatarThumb:
                    type: string
                    format: uri
                    description: Avatar thumbnail URL
                  avatarMedium:
                    type: string
                    format: uri
                    description: Medium-size avatar URL
                  signature:
                    type: string
                    description: User bio
                  verified:
                    type: boolean
                    description: Whether the user is verified
                  privateAccount:
                    type: boolean
                    description: Whether the account is private
                  region:
                    type: string
