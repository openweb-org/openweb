                  stats:
                    type: object
                    required:
                      - followerCount
                      - followingCount
                      - heartCount
                      - videoCount
                    properties:
                      followerCount:
                        type: integer
                        description: Number of followers
                      followingCount:
                        type: integer
                        description: Number of accounts followed
                      heartCount:
                        type: integer
