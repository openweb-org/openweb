  /internal/likeVideo:
    post:
      operationId: likeVideo
      summary: "Like a video — requires authenticated session"
      x-openweb:
        permission: write
        safety: caution
        adapter:
          name: tiktok-web
          operation: likeVideo
        build:
          stable_id: tk_likeVideo_v1
          tool_version: 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - videoId
              properties:
                videoId:
                  type: string
                  description: "Video ID to like"
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                properties:
                  success:
                    type: boolean
                  is_digg:
                    type: integer
                    description: "1 = liked"

