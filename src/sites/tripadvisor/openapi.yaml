                          description: 'Opening time in HH:MM format.'
                        closes:
                          type: [string, 'null']
                          description: 'Closing time in HH:MM format.'

  /internal/searchRestaurants:
    get:
      operationId: searchRestaurants
      summary: Search restaurants by location — names, ratings, cuisine, price range from LD+JSON and DOM fallback
      x-openweb:
        permission: read
        build:
          verified: true
          stable_id: ta0007
          tool_version: 1
          signals:
            - dom
        extraction:
          type: page_global_data
          page_url: https://www.tripadvisor.com/Restaurants-g{geoId}-{location}.html
          expression: |
            (() => {
              const parseAddr = (a) => {
                if (!a) return null;
                const c = a.addressCountry;
                return {
                  street: a.streetAddress ?? null, city: a.addressLocality ?? null,
                  region: a.addressRegion ?? null,
                  country: typeof c === 'object' && c ? (c.name ?? null) : (c ?? null),
                  postalCode: a.postalCode ?? null,
                };
              };
              const restFrom = (item) => {
                const agg = item.aggregateRating || null;
                const cuisineRaw = item.servesCuisine;
                const imgRaw = item.image;
                const image = typeof imgRaw === 'string' ? imgRaw
                  : Array.isArray(imgRaw) ? (imgRaw[0] ?? null)
                  : imgRaw && typeof imgRaw === 'object' ? (imgRaw.url ?? null)
                  : null;
                return {
                  name: item.name ?? null,
                  url: item.url ?? null,
                  rating: agg?.ratingValue != null ? Number(agg.ratingValue) : null,
                  reviewCount: agg?.reviewCount != null ? Number(agg.reviewCount) : null,
                  priceRange: item.priceRange ?? null,
                  cuisine: Array.isArray(cuisineRaw) ? cuisineRaw : cuisineRaw ? [cuisineRaw] : [],
                  address: parseAddr(item.address || null),
                  telephone: item.telephone ?? null,
                  image,
                };
              };
              const scripts = document.querySelectorAll('script[type="application/ld+json"]');
              for (const s of scripts) {
                try {
                  const d = JSON.parse(s.textContent ?? '');
                  if (d['@type'] !== 'ItemList') continue;
                  const restaurants = (d.itemListElement ?? []).map(li => restFrom(li.item ?? li));
                  return { count: restaurants.length, restaurants };
                } catch {}
              }
              const restTypes = new Set(['Restaurant','FoodEstablishment','BarOrPub','CafeOrCoffeeShop','FastFoodRestaurant','LocalBusiness']);
              const restaurants = [];
              for (const s of scripts) {
                try {
                  const d = JSON.parse(s.textContent ?? '');
                  const t = d['@type'];
                  const types = Array.isArray(t) ? t : [t];
                  if (types.some(x => restTypes.has(x))) restaurants.push(restFrom(d));
                } catch {}
              }
              if (restaurants.length) return { count: restaurants.length, restaurants };
              const domRestaurants = [];
              for (const link of document.querySelectorAll('a[href*="Restaurant_Review"]')) {
                const name = link.textContent?.trim() || '';
                if (name && name.length > 1 && name.length < 120) {
                  domRestaurants.push({ name, url: link.href || null });
                }
              }
              const seen = new Set();
              const unique = domRestaurants.filter(r => {
                if (seen.has(r.name)) return false;
                seen.add(r.name);
                return true;
              });
              if (unique.length) return { count: unique.length, restaurants: unique };
              return { count: 0, restaurants: [] };
            })()
      parameters:
        - name: geoId
          in: query
          required: true
          schema:
            type: string
          description: 'TripAdvisor geo ID for the location (e.g. "60763" for New York City, "187147" for Paris).'
          example: '60763'
        - name: location
          in: query
          required: true
          schema:
            type: string
          description: 'Location name as URL slug (e.g. "New_York_City_New_York", "Paris_Ile_de_France").'
          example: New_York_City_New_York
      responses:
        '200':
          description: List of restaurants from LD+JSON ItemList.
          content:
            application/json:
              schema:
                type: object
                required: [count, restaurants]
                properties:
                  count:
                    type: integer
                    description: Number of restaurants found.
                  restaurants:
                    type: array
                    description: Restaurants matching the location search.
                    items:
                      type: object
                      required: [name, url]
                      description: A restaurant listing from LD+JSON ItemList.
                      properties:
                        name:
                          type: string
                          description: Restaurant name.
                        url:
                          type: string
                          description: TripAdvisor URL for the restaurant page.
                        rating:
                          type: [number, 'null']
                          description: Aggregate rating out of 5.
                        reviewCount:
                          type: [integer, 'null']
                          description: Total number of reviews.
                        priceRange:
                          type: [string, 'null']
                          description: 'Price range indicator (e.g. "$", "$$-$$$").'
                        cuisine:
                          type: array
                          items:
                            type: string
                          description: List of cuisine types served.
                        address:
                          type: [object, 'null']
                          description: Restaurant street address.
                          properties:
                            street:
                              type: [string, 'null']
                              description: Street address line.
                            city:
                              type: [string, 'null']
                              description: City name.
                            region:
                              type: [string, 'null']
                              description: State or region.
                            country:
                              type: [string, 'null']
                              description: Country name.
                            postalCode:
                              type: [string, 'null']
                              description: Postal or ZIP code.
                        telephone:
                          type: [string, 'null']
                          description: Restaurant phone number.
                        image:
                          type: [string, 'null']
                          description: URL of the restaurant thumbnail image.
