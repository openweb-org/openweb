                            verified_reason:
                              type: string
                            description:
                              type: string
                              description: User bio.
                            location:
                              type: string
                            gender:
                              type: string
                              description: Gender (m/f).
                            followers_count:
                              type: integer
                            followers_count_str:
                              type: string
                            friends_count:
                              type: integer
                              description: Following count.
                            statuses_count:
                              type: integer
                              description: Total posts count.
                            avatar_large:
                              type: string
                            avatar_hd:
                              type: string
                            mbrank:
                              type: integer
                              description: VIP rank.
                        reposts_count:
                          type: integer
                        comments_count:
                          type: integer
                        attitudes_count:
                          type: integer
                          description: Likes count.
                        isLongText:
                          type: boolean
                        pic_ids:
                          type: array
                          items:
                            type: string
                        pic_num:
                          type: integer
                        pic_infos:
                          type: object
                          additionalProperties:
                            type: object
                            properties:
                              thumbnail:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              bmiddle:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              large:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              original:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              pic_id:
                                type: string
                              photo_tag:
                                type: integer
                              type:
                                type: string
                                description: Image type (pic/gif/livephoto).
                        retweeted_status:
                          type: object
                          description: "Reposted/quoted post (cycle-broken: does not nest further)."
                          properties:
                            id:
                              type: integer
                            idstr:
                              type: string
                            mid:
                              type: string
                            mblogid:
                              type: string
                            created_at:
                              type: string
                            text:
                              type: string
                              description: Post content (HTML).
                            text_raw:
                              type: string
                              description: Post content (plain text).
                            source:
                              type: string
