  /ajax/statuses/cancelLike:
    post:
      operationId: unlikePost
      summary: Unlike a post — reverses likePost (setLike)
      x-openweb:
        permission: write
        safety: caution
        build:
          stable_id: weibo0015
          tool_version: 1
        adapter:
          name: weibo-web
          operation: unlikePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              properties:
                id:
                  type: string
                  description: Post ID (mid) to unlike.
      responses:
        "200":
          description: Unlike result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: integer
