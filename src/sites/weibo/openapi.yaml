                          - idstr
                          - mid
                          - text
                          properties:
                            id:
                              type: integer
                            idstr:
                              type: string
                            mid:
                              type: string
                              description: Post ID (used for detail/comment queries).
                            mblogid:
                              type: string
                            created_at:
                              type: string
                              description: Creation timestamp (e.g. 'Fri Mar 20 00:59:20 +0800 2026').
                            text:
                              type: string
                              description: Post content (HTML).
                            text_raw:
                              type: string
                              description: Post content (plain text).
                            source:
                              type: string
                              description: Client source (e.g. '微博网页版').
                            user:
                              type: object
                              required:
                              - id
                              - idstr
                              - screen_name
                              properties:
                                id:
                                  type: integer
                                idstr:
                                  type: string
                                screen_name:
                                  type: string
                                  description: Display name.
                                profile_image_url:
                                  type: string
                                profile_url:
                                  type: string
                                verified:
                                  type: boolean
                                verified_type:
                                  type: integer
                                  description: Verification type (0=personal, 1=enterprise, etc.).
                                verified_reason:
                                  type: string
                                description:
                                  type: string
                                  description: User bio.
                                location:
                                  type: string
                                gender:
                                  type: string
                                  description: Gender (m/f).
                                followers_count:
                                  type: integer
                                followers_count_str:
                                  type: string
                                friends_count:
                                  type: integer
                                  description: Following count.
                                statuses_count:
                                  type: integer
                                  description: Total posts count.
                                avatar_large:
                                  type: string
                                avatar_hd:
                                  type: string
                                mbrank:
                                  type: integer
                                  description: VIP rank.
                            reposts_count:
                              type: integer
                            comments_count:
                              type: integer
                            attitudes_count:
                              type: integer
                              description: Likes count.
                            isLongText:
                              type: boolean
                            pic_ids:
                              type: array
                              items:
                                type: string
                            pic_num:
                              type: integer
                            pic_infos:
                              type: object
                              additionalProperties:
                                type: object
                                required:
                                - pic_id
                                properties:
                                  thumbnail:
                                    type: object
                                    required:
                                    - url
                                    properties:
                                      url:
                                        type: string
                                      width:
                                        type: integer
                                      height:
                                        type: integer
                                  bmiddle:
                                    type: object
