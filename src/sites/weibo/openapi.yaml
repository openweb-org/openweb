  /ajax/side/hotSearch:
    get:
      operationId: getHotSearch
      summary: Get hot search / trending topics — top 50 with rank, heat, category labels
      x-openweb:
        permission: read
        build:
          stable_id: c2d3e4f5a6b78901
          tool_version: 2
      parameters: []
      responses:
        "200":
          description: Hot search ranking.
          content:
            application/json:
              schema:
                type: object
                required:
                - ok
                - data
                properties:
                  ok:
                    type: integer
                  data:
                    type: object
                    properties:
                      hotgov:
                        type: object
                        description: Government-promoted top topic.
                        properties:
                          name:
                            type: string
                          word:
                            type: string
                          mid:
                            type: string
                          url:
                            type: string
                      realtime:
                        type: array
                        description: Top 50 trending topics.
                        items:
                          type: object
                          properties:
                            word:
                              type: string
                              description: Topic keyword.
                            note:
                              type: string
                              description: Display text.
                            num:
                              type: integer
                              description: Heat score.
                            rank:
                              type: integer
                            icon_desc:
                              type: string
                              description: Label (新/热/沸/爆).
                            word_scheme:
                              type: string
                              description: Hashtag format.
  /ajax/profile/info:
    get:
      operationId: getUserProfile
      summary: Get user profile — screen name, avatar, bio, followers/following counts, verification
      x-openweb:
        permission: read
        build:
          stable_id: 254bd0dfa3f12586
          tool_version: 2
      parameters:
      - name: uid
        in: query
        required: true
        schema:
          type: integer
        example: 1918530507
        description: User ID (numeric)
      - name: scene
        in: query
        required: false
        schema:
          type: string
        example: profile
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                type: object
                required:
                - ok
                - data
                properties:
                  ok:
                    type: integer
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          idstr:
                            type: string
                          screen_name:
                            type: string
                            description: Display name.
                          profile_image_url:
                            type: string
                          profile_url:
                            type: string
                          verified:
                            type: boolean
                          verified_type:
                            type: integer
                            description: Verification type (0=personal, 1=enterprise, etc.).
                          verified_reason:
                            type: string
                          description:
                            type: string
                            description: User bio.
                          location:
                            type: string
                          gender:
                            type: string
                            description: Gender (m/f).
                          followers_count:
                            type: integer
                          followers_count_str:
                            type: string
                          friends_count:
                            type: integer
                            description: Following count.
                          statuses_count:
                            type: integer
                            description: Total posts count.
                          avatar_large:
                            type: string
                          avatar_hd:
                            type: string
                          mbrank:
                            type: integer
                            description: VIP rank.
                      tabList:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            tabKey:
                              type: string
                              description: Tab identifier (e.g. 'weibo', 'album', 'fav').
                            title:
                              type: string
                              description: Tab display name.
  /ajax/profile/detail:
    get:
      operationId: getUserDetail
      summary: Get user detail — birthday, gender, location, creation date, sunshine credit
      x-openweb:
        permission: read
        build:
          stable_id: f5a6b7c8d9e01234
          tool_version: 2
      parameters:
      - name: uid
        in: query
        required: true
        schema:
          type: integer
        example: 1918530507
        description: User ID (numeric)
      responses:
        "200":
          description: User detail.
          content:
            application/json:
              schema:
                type: object
                required:
                - ok
                - data
                properties:
                  ok:
                    type: integer
                  data:
                    type: object
                    properties:
                      ip_location:
                        type: string
                      created_at:
                        type: string
                      birthday:
                        type: string
                      sunshine_credit:
                        type: object
                        properties:
                          level:
                            type: string
                            description: Credit level label (e.g. '信用极好').
                      education:
                        type: object
                        properties:
                          school:
                            type: string
                            description: School name.
                      company:
                        type: string
  /ajax/statuses/mymblog:
    get:
      operationId: getUserStatuses
      summary: Get user's posts — paginated list with text, images, engagement counts
      x-openweb:
        permission: read
        build:
          stable_id: 5cbe6a8939f65367
          tool_version: 2
      parameters:
      - name: uid
        in: query
        required: true
        schema:
          type: integer
        example: 1918530507
        description: User ID (numeric)
      - name: page
        in: query
        required: false
        schema:
          type: integer
        example: 1
        description: Page number (starts at 1)
      - name: feature
        in: query
        required: false
        schema:
          type: integer
        example: 0
        description: Filter type (0=all, 1=original, 2=pictures, 3=video, 4=music)
      - name: since_id
        in: query
        required: false
        schema:
          type: string
        description: Pagination cursor.
      responses:
        "200":
          description: User timeline.
          content:
            application/json:
              schema:
                type: object
                required:
                - ok
                - data
                properties:
                  ok:
                    type: integer
                  data:
                    type: object
                    required:
                    - list
                    properties:
                      since_id:
                        oneOf:
                        - type: string
                        - type: integer
                      list:
                        type: array
                        items:
                          type: object
                          required:
