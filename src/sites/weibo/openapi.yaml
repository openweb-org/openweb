                                    - url
                                    properties:
                                      url:
                                        type: string
                                      width:
                                        type: integer
                                      height:
                                        type: integer
                                  large:
                                    type: object
                                    required:
                                    - url
                                    properties:
                                      url:
                                        type: string
                                      width:
