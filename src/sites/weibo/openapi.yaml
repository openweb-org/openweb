  /ajax/statuses/show:
    get:
      operationId: getPost
      summary: Get post detail — full text, images, video, engagement counts, author info
      x-openweb:
        permission: read
        build:
          stable_id: 2defa3b7e0a39a48
          tool_version: 2
      parameters:
      - name: id
        in: query
        required: true
        schema:
          type: string
        example: Qyj0ifs0m
        description: Post ID (alphanumeric, e.g. 'Qyj0ifs0m')
      - name: isGetLongText
        in: query
        required: false
        schema:
          type: boolean
          default: true
        description: Include full long text content.
      - name: locale
        in: query
        required: false
        schema:
          type: string
        example: zh-CN
      responses:
        "200":
          description: Post detail (WeiboPost with optional longText).
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  idstr:
                    type: string
                  mid:
                    type: string
                    description: Post ID (used for detail/comment queries).
                  mblogid:
                    type: string
                  created_at:
                    type: string
                    description: Creation timestamp (e.g. 'Fri Mar 20 00:59:20 +0800 2026').
                  text:
                    type: string
                    description: Post content (HTML).
                  text_raw:
                    type: string
                    description: Post content (plain text).
                  source:
                    type: string
                    description: Client source (e.g. '微博网页版').
                  user:
                    type: object
                    required:
                    - id
                    - idstr
                    - screen_name
