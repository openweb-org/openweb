                                        type: integer
                                      height:
                                        type: integer
                                  pic_id:
                                    type: string
                                  photo_tag:
                                    type: integer
                                  type:
                                    type: string
                                    description: Image type (pic/gif/livephoto).
                            retweeted_status:
                              type: object
                              description: "Reposted/quoted post (cycle-broken: does not nest further)."
                              required:
                              - id
                              - idstr
                              - mid
                              properties:
                                id:
                                  type: integer
                                idstr:
                                  type: string
                                mid:
                                  type: string
                                mblogid:
                                  type: string
                                created_at:
                                  type: string
                                text:
                                  type: string
