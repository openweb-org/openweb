                          description: Post content (HTML).
                        text_raw:
                          type: string
                          description: Post content (plain text).
                        source:
                          type: string
                          description: Client source (e.g. '微博网页版').
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                            idstr:
                              type: string
                            screen_name:
                              type: string
                              description: Display name.
                            profile_image_url:
                              type: string
                            profile_url:
                              type: string
                            verified:
                              type: boolean
                            verified_type:
                              type: integer
