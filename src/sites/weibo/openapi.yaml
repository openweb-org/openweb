openapi: 3.1.0
info:
  title: Weibo API
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-03-29T06:26:04.728000Z
    requires_auth: true
servers:
- url: https://weibo.com
  x-openweb:
    transport: page
    auth:
      type: cookie_session
    csrf:
      type: cookie_to_header
      cookie: XSRF-TOKEN
      header: x-xsrf-token
paths:
  /ajax/feed/friendstimeline:
    get:
      operationId: getFriendsFeed
      summary: Get home feed (friends timeline) — post text, images, reposts, likes, comments count, author info
      x-openweb:
        permission: read
        build:
          stable_id: a3645dc7d9c37028
          tool_version: 2
      parameters:
      - name: list_id
        in: query
        required: true
        schema:
          type: string
        example: my_follow_all
        description: Feed group ID (my_follow_all for all followed users)
      - name: refresh
        in: query
        required: false
        schema:
          type: integer
        example: 4
      - name: since_id
        in: query
        required: false
        schema:
          type: integer
        example: 0
        description: Cursor for pagination (use 0 for first page)
      - name: count
        in: query
        required: false
        schema:
          type: integer
        example: 25
        description: Number of posts to return (max 25)
      responses:
        "200":
          description: Home feed posts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statuses:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        idstr:
                          type: string
                        mid:
                          type: string
                          description: Post ID (used for detail/comment queries).
                        mblogid:
                          type: string
                        created_at:
                          type: string
                          description: Creation timestamp (e.g. 'Fri Mar 20 00:59:20 +0800 2026').
                        text:
                          type: string
                          description: Post content (HTML).
                        text_raw:
                          type: string
                          description: Post content (plain text).
                        source:
                          type: string
                          description: Client source (e.g. '微博网页版').
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                            idstr:
                              type: string
                            screen_name:
                              type: string
                              description: Display name.
                            profile_image_url:
                              type: string
                            profile_url:
                              type: string
                            verified:
                              type: boolean
                            verified_type:
                              type: integer
                              description: Verification type (0=personal, 1=enterprise, etc.).
                            verified_reason:
                              type: string
                            description:
                              type: string
                              description: User bio.
                            location:
                              type: string
                            gender:
                              type: string
                              description: Gender (m/f).
                            followers_count:
                              type: integer
                            followers_count_str:
                              type: string
                            friends_count:
                              type: integer
                              description: Following count.
                            statuses_count:
                              type: integer
                              description: Total posts count.
                            avatar_large:
                              type: string
                            avatar_hd:
                              type: string
                            mbrank:
                              type: integer
                              description: VIP rank.
                        reposts_count:
                          type: integer
                        comments_count:
                          type: integer
                        attitudes_count:
                          type: integer
                          description: Likes count.
                        isLongText:
                          type: boolean
                        pic_ids:
                          type: array
                          items:
                            type: string
                        pic_num:
                          type: integer
                        pic_infos:
                          type: object
                          additionalProperties:
                            type: object
                            properties:
                              thumbnail:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              bmiddle:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              large:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              original:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                              pic_id:
                                type: string
                              photo_tag:
                                type: integer
                              type:
                                type: string
                                description: Image type (pic/gif/livephoto).
                        retweeted_status:
                          type: object
                          description: "Reposted/quoted post (cycle-broken: does not nest further)."
                          properties:
                            id:
                              type: integer
                            idstr:
                              type: string
                            mid:
                              type: string
                            mblogid:
                              type: string
                            created_at:
                              type: string
                            text:
                              type: string
                              description: Post content (HTML).
                            text_raw:
                              type: string
                              description: Post content (plain text).
                            source:
                              type: string
                            user:
                              type: object
                              properties:
                                id:
                                  type: integer
                                idstr:
                                  type: string
                                screen_name:
                                  type: string
                                  description: Display name.
                                profile_image_url:
                                  type: string
                                verified:
                                  type: boolean
                                avatar_hd:
                                  type: string
                            reposts_count:
                              type: integer
                            comments_count:
                              type: integer
                            attitudes_count:
                              type: integer
                              description: Likes count.
                            pic_ids:
                              type: array
                              items:
                                type: string
                            pic_num:
                              type: integer
                  since_id:
                    oneOf:
                    - type: string
                    - type: integer
                  max_id:
                    oneOf:
                    - type: string
                    - type: integer
                required:
                - statuses
  /ajax/feed/hottimeline:
    get:
      operationId: getHotFeed
      summary: Get hot/trending feed — popular posts with text, images, engagement counts, author info
      x-openweb:
        permission: read
        build:
          stable_id: 7d7bf2fbf50c4d9f
          tool_version: 2
      parameters:
      - name: group_id
        in: query
        required: true
        schema:
          type: integer
        example: 102803
        description: Group ID for hot feed (102803 = default hot)
      - name: containerid
        in: query
        required: true
        schema:
          type: integer
        example: 102803
        description: Container ID (same as group_id)
      - name: since_id
        in: query
        required: false
        schema:
          type: integer
        example: 0
      - name: max_id
        in: query
        required: false
        schema:
          type: integer
        example: 0
      - name: count
        in: query
        required: false
        schema:
          type: integer
        example: 10
      - name: refresh
        in: query
        required: false
        schema:
          type: integer
        example: 0
      - name: extparam
        in: query
        required: true
        schema:
          type: string
        example: discover|new_feed
        description: Feed type parameter (discover|new_feed = discovery feed)
      responses:
        "200":
          description: Hot timeline posts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: integer
                  statuses:
                    type: array
                    description: List of hot posts.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        idstr:
                          type: string
                        mid:
                          type: string
                          description: Post ID (used for detail/comment queries).
                        mblogid:
                          type: string
                        created_at:
                          type: string
                          description: Creation timestamp (e.g. 'Fri Mar 20 00:59:20 +0800 2026').
                        text:
