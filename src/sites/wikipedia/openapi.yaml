      - name: formatversion
        in: query
        required: true
        schema:
          type: integer
          const: 2
        description: Response format version.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [query]
                properties:
                  batchcomplete:
                    type: boolean
                  continue:
                    type: object
                    properties:
                      clcontinue:
                        type: string
                      continue:
                        type: string
                  query:
                    type: object
                    required: [pages]
                    properties:
                      pages:
                        type: array
                        items:
                          type: object
                          required: [pageid, ns, title]
                          properties:
                            pageid:
                              type: integer
                            ns:
                              type: integer
                            title:
                              type: string
                            categories:
                              type: array
                              items:
                                type: object
                                properties:
