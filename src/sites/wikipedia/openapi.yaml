                  tid:
                    type: string
                  timestamp:
                    type: string
                  description:
                    type: string
                  description_source:
                    type: string
                  content_urls:
                    type: object
                    properties:
                      desktop:
                        type: object
                        properties:
                          page:
                            type: string
                      mobile:
                        type: object
                        properties:
                          page:
                            type: string
                  extract:
                    type: string
                  extract_html:
                    type: string
