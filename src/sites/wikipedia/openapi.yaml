openapi: '3.1.0'
info:
  title: Wikipedia
  version: '1.0.0'
  x-openweb:
    spec_version: '2.0'
    requires_auth: false
servers:
- url: https://en.wikipedia.org
  x-openweb:
    transport: node
    auth:
      type: cookie_session
paths:
  /w/api.php:
    get:
      operationId: searchArticles
      summary: Search articles by keyword — returns title, pageid, snippet, wordcount, timestamp
      x-openweb:
        permission: read
        build:
          stable_id: wp0001
          tool_version: 1
          verified: true
          signals:
          - status-match
      parameters:
      - name: action
        in: query
        required: true
        schema:
          type: string
          const: query
        description: API action.
      - name: list
        in: query
        required: true
        schema:
          type: string
          const: search
        description: Query list type.
      - name: srsearch
        in: query
        required: true
        schema:
          type: string
        description: Search query.
      - name: srlimit
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: Maximum number of results (max 500).
      - name: sroffset
        in: query
        required: false
        schema:
          type: integer
          default: 0
        description: Offset for pagination.
      - name: format
        in: query
        required: true
        schema:
          type: string
          const: json
        description: Response format.
      - name: formatversion
        in: query
        required: true
        schema:
          type: integer
          const: 2
        description: Response format version.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [batchcomplete, query]
                properties:
                  batchcomplete:
                    type: boolean
                  continue:
                    type: object
                    properties:
                      sroffset:
                        type: integer
                      continue:
                        type: string
                  query:
                    type: object
                    required: [searchinfo, search]
                    properties:
                      searchinfo:
                        type: object
                        required: [totalhits]
                        properties:
                          totalhits:
                            type: integer
                      search:
                        type: array
                        items:
                          type: object
                          required: [ns, title, pageid, size, wordcount, snippet, timestamp]
                          properties:
                            ns:
                              type: integer
                            title:
                              type: string
                            pageid:
                              type: integer
                            size:
                              type: integer
                            wordcount:
                              type: integer
                            snippet:
                              type: string
                            timestamp:
                              type: string
