  /api/rest_v1/feed/onthisday/{type}/{MM}/{DD}:
    get:
      operationId: getOnThisDay
      summary: Get historical events for a date — event text, year, related page titles and summaries
      x-openweb:
        permission: read
        build:
          stable_id: wp0013
          tool_version: 1
          verified: false
          signals: []
      parameters:
      - name: type
        in: path
        required: true
        schema:
          type: string
          enum: [all, selected, births, deaths, events, holidays]
        description: Type of events (all, selected, births, deaths, events, holidays).
      - name: MM
        in: path
        required: true
        schema:
          type: string
        description: Month as two digits (01-12).
      - name: DD
        in: path
        required: true
        schema:
          type: string
        description: Day as two digits (01-31).
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  selected:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        year:
                          type: integer
                        pages:
                          type: array
                          items:
                            type: object
                            properties:
                              title:
                                type: string
                              pageid:
                                type: integer
                              extract:
                                type: string
                              thumbnail:
                                type: object
                                properties:
