                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        year:
                          type: integer
                        pages:
                          type: array
                          items:
                            type: object
                            required: [title, pageid]
                            properties:
                              title:
                                type: string
                              pageid:
                                type: integer
                              extract:
                                type: string
                              thumbnail:
                                type: object
                                properties:
                                  source:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                  births:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        year:
                          type: integer
                        pages:
                          type: array
                          items:
                            type: object
                            required: [title, pageid]
                            properties:
                              title:
                                type: string
                              pageid:
                                type: integer
                              extract:
                                type: string
                              thumbnail:
