        required: true
        schema:
          type: string
        description: Page title (underscores for spaces).
      - name: prop
        in: query
        required: true
        schema:
          type: string
          const: categories
        description: Query property.
      - name: cllimit
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: Maximum number of categories (max 500).
      - name: format
        in: query
