          required: true
          schema:
            type: string
          description: GraphQL persisted query hash for TweetDetail
        - name: variables
          in: query
          required: true
          schema:
            type: string
          description: "JSON-encoded variables: focalTweetId (string, required), referrer (string), rankingMode (string), includePromotedContent (bool)"
          example: '{"focalTweetId":"1234567890","with_rux_injections":false,"rankingMode":"Relevance","includePromotedContent":true,"withCommunity":true,"withQuickPromoteEligibilityTweetFields":true,"withBirdwatchNotes":true,"withVoice":true}'
        - name: features
          in: query
          required: true
          schema:
            type: string
          description: JSON-encoded feature flags
        - name: fieldToggles
          in: query
          required: false
          schema:
            type: string
          description: JSON-encoded field toggles for article content
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      threaded_conversation_with_injections_v2:
                        type: object
                        properties:
                          instructions:
                            type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                entries:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      entryId:
                                        type: string
                                      sortIndex:
                                        type: string
                                      content:
                                        type: object
                                        properties:
                                          entryType:
                                            type: string
                                          itemContent:
                                            type: object
                                            properties:
                                              tweet_results:
                                                type: object
                                              tweetDisplayType:
                                                type: string
