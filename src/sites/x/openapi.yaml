paths:
  /i/api/graphql/{id}/HomeTimeline:
    get:
      operationId: getHomeTimeline
      summary: "Get home timeline — tweets, retweets, promoted content with author info, engagement counts, cursor pagination"
      x-openweb:
        permission: read
        build:
          stable_id: 094ad7404e54e3b4
          tool_version: 2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: GraphQL persisted query hash for HomeTimeline
        - name: variables
          in: query
          required: true
          schema:
            type: string
          description: "JSON-encoded variables: count (int), includePromotedContent (bool), requestContext (string)"
          example: '{"count":20,"includePromotedContent":true,"requestContext":"launch","withCommunity":true}'
        - name: features
          in: query
          required: true
          schema:
            type: string
          description: JSON-encoded feature flags (browser sends these automatically)
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      home:
                        type: object
                        properties:
                          home_timeline_urt:
                            type: object
                            properties:
                              instructions:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    type:
                                      type: string
                                    entries:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          entryId:
                                            type: string
                                          sortIndex:
                                            type: string
                                          content:
                                            type: object
                                            properties:
                                              entryType:
                                                type: string
                                              itemContent:
                                                type: object
                                                properties:
                                                  tweet_results:
                                                    type: object
                                                  tweetDisplayType:
                                                    type: string
                                              cursorType:
                                                type: string
                                              value:
                                                type: string
                              metadata:
                                type: object

  /i/api/graphql/{id}/TweetDetail:
    get:
      operationId: getTweetDetail
      summary: "Get tweet detail — full tweet content, replies thread, author info, engagement counts, media, quoted tweets"
      x-openweb:
        permission: read
        build:
          stable_id: 40f50380aa7c842d
          tool_version: 2
      parameters:
