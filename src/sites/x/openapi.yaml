            const: Bearer AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA
          description: Static X web app bearer token (fixed).
        - &a2
          name: x-twitter-auth-type
          in: header
          required: false
          schema:
            type: string
            default: OAuth2Session
        - &a3
          name: x-twitter-active-user
          in: header
          required: false
          schema:
            type: string
            default: yes
        - name: variables
          in: query
          required: true
          schema:
            type: string
            description: JSON-encoded variables object
          x-openweb-json-schema:
            type: object
            properties:
              count:
                type: integer
                default: 20
                description: Number of tweets
              includePromotedContent:
                type: boolean
                default: true
