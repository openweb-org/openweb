          description: "Numeric user ID (from getUserByScreenName → rest_id)"
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of following to return
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      result:
                        type: object
                        properties:
                          __typename:
                            type: string
                          timeline:
                            type: object
                            properties:
                              timeline:
                                type: object
                                properties:
                                  instructions:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        type:
                                          type: string
                                        entries:
                                          type: array
                                          items:
                                            type: object
                                            properties:
                                              entryId:
                                                type: string
                                              sortIndex:
                                                type: string
                                              content:
                                                type: object

  /internal/getUserTweets:
    get:
      operationId: getUserTweets
      summary: "Get user's tweets — timeline of tweets by a specific user with engagement counts, media, cursor pagination"
      x-openweb:
        permission: read
        build:
          stable_id: c847d0a51b3bd2e1
          tool_version: 2
          signals: [adapter-verified]
        adapter:
          name: x-graphql
          operation: getUserTweets
      parameters:
        - name: userId
