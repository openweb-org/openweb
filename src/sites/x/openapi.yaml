          schema:
            type: string
          description: "Numeric user ID (from getUserByScreenName → rest_id)"
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of tweets to return
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      result:
                        type: object
                        properties:
                          __typename:
                            type: string
                          timeline:
                            type: object
                            properties:
                              timeline:
                                type: object
                                properties:
                                  instructions:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        type:
                                          type: string
                                        entries:
                                          type: array
                                          items:
                                            type: object
                                            properties:
                                              entryId:
                                                type: string
                                              sortIndex:
                                                type: string
                                              content:
                                                type: object

  /internal/getExplorePage:
    get:
      operationId: getExplorePage
      summary: "Get explore/trending page — trending topics, recommended content, news"
      x-openweb:
        permission: read
        build:
          stable_id: 6d8f4c2e1a3b5970
          tool_version: 2
          signals: [adapter-verified]
        adapter:
          name: x-graphql
          operation: getExplorePage
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  explore_page:
                    type: object
                    properties:
                      id:
                        type: string
                      body:
                        type: object
                        properties:
                          __typename:
                            type: string
                          timelines:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                labelText:
                                  type: string
                                timeline:
                                  type: object

  /internal/likeTweet:
    post:
      operationId: likeTweet
      summary: "Like a tweet"
      x-openweb:
        permission: write
        build:
          stable_id: 8e1f27c7f48a6bf5
          tool_version: 2
          signals: [adapter-verified]
        adapter:
          name: x-graphql
          operation: likeTweet
      parameters:
        - name: tweet_id
          in: query
          required: true
          schema:
            type: string
          description: Tweet ID to like
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object

  /internal/unlikeTweet:
