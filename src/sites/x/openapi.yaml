openapi: 3.1.0
info:
  title: x
  version: 1.0.0
  x-openweb:
    spec_version: "2.0"
    compiled_at: 2026-04-01T17:02:13.234000Z
    requires_auth: true
servers:
- url: https://x.com
  x-openweb:
    transport: page
    page_plan:
      entry_url: https://x.com/home
      wait_until: domcontentloaded
      warm: true
paths:
  /internal/getHomeTimeline:
    get:
      operationId: getHomeTimeline
      summary: "Get home timeline — tweets, retweets, promoted content with author info, engagement counts, cursor pagination"
      x-openweb:
        permission: read
        build:
          stable_id: 094ad7404e54e3b4
          tool_version: 2
          signals: [adapter-verified]
        adapter:
          name: x-graphql
          operation: getHomeTimeline
      parameters:
      - name: count
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: Number of tweets to return
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  home:
                    type: object
                    properties:
                      home_timeline_urt:
                        type: object
                        properties:
                          instructions:
                            type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                entries:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      entryId:
                                        type: string
                                      sortIndex:
                                        type: string
                                      content:
                                        type: object
                          metadata:
                            type: object

                required:
                - home
  /internal/getTweetDetail:
    get:
      operationId: getTweetDetail
      summary: "Get tweet detail — full tweet content, replies thread, author info, engagement counts, media, quoted tweets"
      x-openweb:
        permission: read
        build:
          stable_id: 40f50380aa7c842d
          tool_version: 2
          signals: [adapter-verified]
        adapter:
          name: x-graphql
          operation: getTweetDetail
      parameters:
      - name: focalTweetId
        in: query
        required: true
        schema:
          type: string
        description: Tweet ID to get detail for
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  threaded_conversation_with_injections_v2:
                    type: object
                    properties:
                      instructions:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                            entries:
                              type: array
                              items:
                                type: object
                                properties:
                                  entryId:
                                    type: string
                                  sortIndex:
                                    type: string
                                  content:
                                    type: object
                      metadata:
                        type: object

                required:
                - threaded_conversation_with_injections_v2
  /internal/getUserByScreenName:
    get:
      operationId: getUserByScreenName
      summary: "Get user profile by screen name — name, bio, followers/following count, verified status, profile image, join date"
      x-openweb:
        permission: read
        build:
          stable_id: b690ce172d53e653
          tool_version: 2
          signals: [adapter-verified]
        adapter:
          name: x-graphql
          operation: getUserByScreenName
      parameters:
      - name: screen_name
        in: query
        required: true
        schema:
          type: string
        description: Twitter screen name (without @)
        example: openai
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      result:
                        type: object
                        properties:
                          __typename:
                            type: string
                          rest_id:
                            type: string
                          is_blue_verified:
                            type: boolean
                          core:
                            type: object
                            properties:
                              name:
                                type: string
                              screen_name:
                                type: string
                              created_at:
                                type: string
                          legacy:
                            type: object
                            properties:
                              description:
                                type: string
                              followers_count:
                                type: integer
                              friends_count:
                                type: integer
                              statuses_count:
                                type: integer
                              media_count:
                                type: integer
                              profile_banner_url:
                                type: string
                          verification:
                            type: object
                            properties:
                              verified:
                                type: boolean
                              verified_type:
                                type: string

                required:
                - user
  /internal/searchTweets:
    get:
      operationId: searchTweets
      summary: "Search tweets by keyword — tweet results with author info, engagement counts, media, cursor pagination"
      x-openweb:
        permission: read
        build:
          stable_id: 5c9b3e64cc81d1a8
          tool_version: 2
          signals: [adapter-verified]
        adapter:
          name: x-graphql
          operation: searchTweets
      parameters:
      - name: rawQuery
        in: query
        required: true
        schema:
          type: string
        description: Search query
        example: openai
      - name: count
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: Number of results
      - name: product
        in: query
        required: false
        schema:
          type: string
          enum: [Top, Latest, People, Photos, Videos]
          default: Top
        description: Search result type
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  search_by_raw_query:
                    type: object
                    properties:
                      search_timeline:
                        type: object
                        properties:
                          timeline:
                            type: object
                            properties:
                              instructions:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    type:
                                      type: string
                                    entries:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          entryId:
                                            type: string
                                          sortIndex:
                                            type: string
                                          content:
                                            type: object
                              responseObjects:
                                type: object

                required:
                - search_by_raw_query
