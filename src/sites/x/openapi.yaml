  /i/api/1.1/search/typeahead.json:
    get:
      operationId: searchTypeahead
      summary: "Search typeahead/autocomplete — users, topics, events matching query prefix"
      x-openweb:
        permission: read
        build:
          stable_id: 17bbfb7a90bfabc7
          tool_version: 2
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query prefix
          example: openai
        - name: result_type
          in: query
          required: false
          schema:
            type: string
          description: "Comma-separated result types: events, users, topics, lists"
          example: "events,users,topics,lists"
        - name: src
          in: query
          required: false
          schema:
            type: string
          description: Search source context
          example: search_box
      responses:
        "200":
          description: Success.
          content:
            application/json;charset=utf-8:
              schema:
                type: object
                properties:
                  num_results:
                    type: integer
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        id_str:
                          type: string
                        name:
                          type: string
                        screen_name:
                          type: string
                        verified:
                          type: boolean
                        is_blue_verified:
                          type: boolean
                        profile_image_url_https:
                          type: string
                          format: uri
                  topics:
                    type: array
                    items:
                      type: object
                      properties:
                        topic:
                          type: string
                        inline:
                          type: boolean
      servers:
        - url: https://api.x.com
