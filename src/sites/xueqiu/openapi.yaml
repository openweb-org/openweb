                  - count
                  - list
  /v5/stock/portfolio/stock/list.json:
    get:
      operationId: getWatchlist
      summary: "Get user's stock watchlist — symbols, names, current prices, change percent, market cap"
      x-openweb:
        permission: read
        transport: page
        build:
          stable_id: d6f4b8e2a5c79103
          tool_version: 2
          verified: true
          signals:
            - page-verified
      parameters:
        - name: pid
          in: query
          required: true
          schema:
            type: integer
          description: "Portfolio ID (-1 for default/all watchlist)"
          example: -1
        - name: category
          in: query
          required: false
          schema:
            type: integer
          description: "Category filter (1 for all stocks, default 1)"
          example: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
          description: "Number of stocks to return (default 100)"
          example: 100
      responses:
        "200":
          description: Success.
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Watchlist portfolio data
                    properties:
                      pid:
                        type: integer
                        description: Portfolio identifier
                      category:
                        type: integer
                        description: Portfolio category
                      stocks:
                        type: array
                        description: Array of watched stocks
                        items:
                          type: object
                          description: Stock in user's watchlist
                          properties:
                            symbol:
                              type: string
                              description: Stock symbol
                            name:
                              type: string
                              description: Stock name
                            current:
                              type: number
                              description: Current trading price
                            percent:
                              type: number
                              description: Price change percentage
                            chg:
                              type: number
                              description: Absolute price change
                            market_capital:
                              type: integer
                              description: Total market capitalization
                          required:
                            - symbol
                            - name
                            - current
                            - percent
                  error_code:
                    type: integer
                    description: "API error code (0 = success)"
                  error_description:
                    type: string
                    description: Error description
                required:
                  - data
                  - error_code
      servers:
        - url: https://stock.xueqiu.com
  /stock/industry/stockList.json:
    get:
      operationId: getIndustryStocks
      summary: "Get stocks in same industry — symbol, name, price, change%, volume, PE ratio, market cap"
      x-openweb:
        permission: read
        build:
          stable_id: 532260faa3e5268e
          tool_version: 2
          verified: false
          signals:
            - requires-login
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: "Stock symbol to find industry peers for (e.g. SH600519)"
          example: SH600519
        - name: type
          in: query
