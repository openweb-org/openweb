      x-openweb:
        permission: read
        build:
          stable_id: c5e3a7d1f4b68092
          tool_version: 2
          verified: true
          signals:
            - node-verified
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
          description: "Stock symbol (e.g. SH600519)"
          example: SH600519
        - name: count
          in: query
          required: false
          schema:
            type: integer
          description: "Number of posts to return (default 10)"
          example: 10
        - name: source
          in: query
          required: false
