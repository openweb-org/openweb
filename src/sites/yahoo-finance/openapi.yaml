      x-openweb:
        transport: node
        permission: read
        build:
          verified: true
          stable_id: yf0006
          signature_id: yf0006s
          tool_version: 1
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
        description: Ticker symbol (e.g. "AAPL").
      - name: lang
        in: query
        required: false
        schema:
          type: string
          default: en-US
        description: Language code.
      - name: region
        in: query
        required: false
        schema:
          type: string
          default: US
        description: Region code.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dir:
                    type: object
                    properties:
                      analyst:
                        type: string
                      ticker:
                        type: string
                      dir:
                        type: object
                        properties:
                          raw:
                            type: number
                          fmt:
                            type: integer
                      mm:
                        type: object
                        properties:
                          raw:
                            type: number
                          fmt:
                            type: integer
                      pt:
                        type: object
                        properties:
                          raw:
                            type: number
                          fmt:
                            type: integer
                      fin_score:
                        type: object
                        properties:
                          raw:
                            type: number
                          fmt:
                            type: integer
                      datapoints:
                        type: integer
                      rating_current:
                        type: [string, 'null']
                      rating_sentiment:
                        type: [integer, 'null']
                      pt_current:
                        type: [integer, 'null']
                      adjusted_pt_current:
                        type: [integer, 'null']
                      announcement_date:
                        type: [string, 'null']
                  mm:
                    type: object
                    properties:
                      analyst:
                        type: string
                      ticker:
                        type: string
                      mm:
                        type: object
                        properties:
                          raw:
                            type: number
                          fmt:
                            type: integer
                      rating_current:
                        type: [string, 'null']
                      pt_current:
                        type: [integer, 'null']
                  pt:
                    type: object
                    properties:
                      analyst:
                        type: string
                      ticker:
                        type: string
                      pt:
                        type: object
                        properties:
                          raw:
                            type: number
                          fmt:
                            type: integer
                      rating_current:
                        type: [string, 'null']
                      pt_current:
                        type: [integer, 'null']
                  fin_score:
                    type: object
                    properties:
                      analyst:
                        type: string
                      ticker:
                        type: string
                      fin_score:
                        type: object
                        properties:
                          raw:
                            type: number
                          fmt:
                            type: integer
                      rating_current:
                        type: [string, 'null']
                      pt_current:
                        type: [integer, 'null']
                required:
                - dir
  /ws/insights/v3/finance/insights:
    get:
      operationId: getInsights
      summary: Get company insights — technicals, valuation, recommendations, SEC filings
      x-openweb:
        transport: node
        permission: read
        build:
          verified: true
          stable_id: yf0007
          signature_id: yf0007s
          tool_version: 1
      parameters:
      - name: symbols
        in: query
        required: true
        schema:
          type: string
        description: Ticker symbol (e.g. "AAPL").
      - name: reportsCount
        in: query
        required: false
        schema:
          type: integer
          default: 4
        description: Number of research reports to return.
      - name: lang
        in: query
        required: false
        schema:
          type: string
          default: en-US
        description: Language code.
      - name: region
        in: query
        required: false
        schema:
          type: string
          default: US
        description: Region code.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [finance]
                properties:
                  finance:
                    type: object
                    required: [result, error]
                    properties:
                      result:
                        type: array
                        items:
                          type: object
                          required: [symbol, instrumentInfo, companySnapshot, recommendation]
                          properties:
                            symbol:
                              type: string
                            instrumentInfo:
                              type: object
                              properties:
                                technicalEvents:
                                  type: object
                                  properties:
                                    shortTermOutlook:
                                      type: object
                                      properties:
                                        direction:
                                          type: string
                                        score:
                                          type: integer
                                        scoreDescription:
                                          type: string
                                    intermediateTermOutlook:
                                      type: object
                                      properties:
                                        direction:
                                          type: string
                                        score:
                                          type: integer
                                        scoreDescription:
                                          type: string
                                    longTermOutlook:
                                      type: object
                                      properties:
                                        direction:
                                          type: string
                                        score:
                                          type: integer
                                        scoreDescription:
                                          type: string
                                keyTechnicals:
                                  type: object
                                  properties:
                                    support:
                                      type: number
                                    resistance:
                                      type: number
                                    stopLoss:
                                      type: number
                                valuation:
                                  type: object
                                  properties:
                                    description:
                                      type: string
                                    discount:
                                      type: string
                                    relativeValue:
                                      type: string
                            companySnapshot:
                              type: object
                              properties:
                                sectorInfo:
                                  type: string
                                company:
                                  type: object
                                  properties:
                                    innovativeness:
                                      type: number
                                    hiring:
                                      type: number
                                    sustainability:
                                      type: number
                                    insiderSentiments:
                                      type: number
                                    earningsReports:
                                      type: number
                                    dividends:
                                      type: number
                            recommendation:
                              type: object
                              properties:
                                targetPrice:
                                  type: integer
                                provider:
                                  type: string
                                rating:
                                  type: string
                            sigDevs:
                              type: array
                              items:
                                type: object
                                properties:
                                  headline:
                                    type: string
                                  date:
                                    type: string
                            secReports:
                              type: array
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                  title:
                                    type: string
                                  formType:
                                    type: string
                                  filingDate:
                                    type: integer
                      error:
                        type: ['null', string]
      servers:
      - url: https://query2.finance.yahoo.com
  /ws/fundamentals-timeseries/v1/finance/timeseries/{symbol}:
    get:
      operationId: getTimeSeries
      summary: Get financial fundamentals time series — reportedValue.raw per metric type (annualTotalRevenue, annualNetIncome, etc.) with timestamps
      x-openweb:
        transport: node
        permission: read
        build:
          verified: true
          stable_id: yf0008
          signature_id: yf0008s
          tool_version: 1
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
        description: Ticker symbol (e.g. "AAPL").
      - name: type
        in: query
        required: true
        schema:
          type: string
        description: Comma-separated metric types (e.g. "annualTotalRevenue,annualNetIncome,annualBasicEPS").
      - name: period1
        in: query
        required: true
        schema:
          type: integer
        description: Start date as Unix timestamp.
      - name: period2
        in: query
        required: true
        schema:
          type: integer
        description: End date as Unix timestamp.
      - name: padTimeSeries
        in: query
        required: false
        schema:
          type: string
          default: 'true'
        description: Pad missing time series data.
      - name: lang
        in: query
        required: false
        schema:
          type: string
          default: en-US
        description: Language code.
      - name: region
        in: query
        required: false
        schema:
          type: string
          default: US
        description: Region code.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                required: [timeseries]
                properties:
                  timeseries:
                    type: object
                    required: [result, error]
                    properties:
                      result:
                        type: array
                        items:
                          type: object
                          required: [meta]
                          properties:
                            meta:
                              type: object
                              required: [symbol, type]
                              properties:
                                symbol:
                                  type: array
                                  items:
                                    type: string
                                type:
                                  type: array
                                  items:
                                    type: string
                            timestamp:
                              type: array
                              items:
                                type: integer
                          additionalProperties:
                            type: array
                            description: Dynamic key matching the requested metric type (e.g. annualTotalRevenue).
                            items:
                              type: object
                              properties:
                                dataId:
                                  type: integer
                                asOfDate:
                                  type: string
                                periodType:
                                  type: string
                                currencyCode:
                                  type: string
                                reportedValue:
                                  type: object
                                  properties:
                                    raw:
                                      type: number
                                    fmt:
                                      type: string
                      error:
                        type: ['null', string]
      servers:
      - url: https://query2.finance.yahoo.com
