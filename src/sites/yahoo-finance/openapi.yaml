                                      companyShortName:
                                        type: string
                                      exchangeShortName:
                                        type: string
                                      startDateTime:
                                        type: integer
                                      dealType:
                                        type: string
                          earnings:
                            type: array
                            items:
                              type: object
                              properties:
                                timestamp:
                                  type: integer
                                timestampString:
                                  type: string
                                count:
                                  type: integer
                                records:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      ticker:
                                        type: string
                                      companyShortName:
                                        type: string
                          splits:
                            type: array
                            items:
                              type: object
                              properties:
                                timestamp:
                                  type: integer
                                timestampString:
                                  type: string
                                count:
                                  type: integer
                                records:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      ticker:
                                        type: string
                                      companyShortName:
                                        type: string
                                      splitFrom:
                                        type: string
                                      splitTo:
                                        type: string
                                      optionableDate:
                                        type: string
                required:
                - finance
      servers:
      - url: https://query2.finance.yahoo.com
  /v1/finance/quoteType/:
    get:
      operationId: getQuoteType
      summary: Get quote type metadata (equity, ETF, index, crypto, etc.)
      x-openweb:
        transport: node
        permission: read
        build:
          verified: true
          stable_id: yf0010
          signature_id: yf0010s
          tool_version: 1
      parameters:
      - name: symbol
        in: query
        required: true
        schema:
          type: string
        description: Ticker symbol (e.g. "AAPL").
      - name: lang
        in: query
        required: false
        schema:
          type: string
          default: en-US
        description: Language code.
      - name: region
        in: query
        required: false
        schema:
          type: string
          default: US
        description: Region code.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
