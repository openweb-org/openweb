                                  data-pid="l56_FKGu">这俩的功能有一部分是交叉的，比如写个简单的代码什么的；但是有一点儿不一样，就是Gemini
                                  CLI这类型AI
                                  Agent工具，它在试图安装第三方库的时候比较保守，比如md文件转Word文件，pandoc这个库的安装Trae这种IDE就激进的多，这两者更多的作用是互补。</p><p
                                  data-pid="63fdZExT">其次AI
                                  Agent运行在命令行，你要是没个IDE，几乎完全是黑盒，你不知道它背后运行了什么，改动了什么，单看日志完全是一团浆糊。</p><h3>IDE软件安装</h3><p
                                  data-pid="yWeSKMzt">Trae的安装很简单，就是官网下载并注册登陆即可，我这里用的是海外版，并且开了个会员，所以模型选择很多，连最新的GPT5都上了。</p><figure
