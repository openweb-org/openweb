                                  data-pid="PNs5RVrW">比如我用仿造一个低配版的知乎热榜，内容改成每日AI新闻，后面附有安装方法和其他可选搭配。</p><p
                                  data-pid="vvoFDKOl">1 找到参照物。</p><p
                                  data-pid="xXzIEI_z">你大概不可能创造一个原本没有存在过的项目，肯定有东西可以借鉴，那么最好的方式就是给链接或者详细的描述，或者直接扔张截图。</p><p
                                  data-pid="SIYE0aNh">我选择直接把知乎热榜这部分的链接直接拿走，你就直接这么问。</p><div
                                  class="highlight"><pre><code
                                  class="language-text">仿照这个网站做一个,https://www.zhihu.com/hot,我要展示每天最火的AI新闻     </code></pre></div><figure
