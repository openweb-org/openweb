                                  text:
                                    type: string
                                    enum:
                                      - 1. 解决bug绝对有帮助，因为解决bug往往需要先确定root
                                        cause，这本质上是一个搜索问题。AI在搜索关键代码方面可谓非常有帮助。而且解决bug是不会怎么产生屎山的，确定问题，人工fix可能也只是几行代码的事。
                                      - 2. 不好好用git commit / branch
                                      - 4. 不要在等待代码生成途中刷短视频
                                      - 5.
                                        不要认为编程会被AI取代，就懈怠学习编程技术。恰恰相反，现阶段，只有非常优秀的程序员，才能驾驭这些AI
                                      - 另一种困难来自于AI
                                        coding的等待时间，通常1-2分钟的等待时间不长不短，无论我是去看课还是刷短视频，都会导致我的思维失去连贯性。我很难相信长此以往，我有能力review
                                        AI生成的代码并掌控一个复杂项目。
                                      - 我吃一堑长一智之后，决定每一次ai的提交我都用眼睛去看，这么做之后屎山的问题不严重了，但我在这里意识到了一个矛盾性。就是我开始丢失了编程的感觉，我开始把自己的角色当成了技术经理或者产品经理。而现阶段的AI编程就像一个实习生，不逐行review是不行的，这就要求我非常懂编程！实际上你review别人的代码比自己构思有时候还要难，所以网上也有vibe
                                        coding更累了的说法。最终我将这个矛盾性戏谑地总结为：如果我不古法编程，就没办法给出好的prompt，AI
                                        coding就会失败；如果我古法编程了，那我为什么还需要AI呢？
                                      - 我的建议是找一张草纸，像上中学的时候演算一样。在上面设计一些核心的数据结构和方法，或者整理一下数据调用的链条。等AI生成好了之后和它讨论，或者检查它是不是按照你草纸上的设计做的。
                                      - 这个想法也没有变，而且我觉得人需要更多地学习。我们对于 AI
                                        的认知很多时候受到网红的影响，比如 Andrej Kapathy 发推说他在去年
                                        11 月，从 80% 手写代码突然变成了
                                        20%；胡渊鸣在新春时节发微信文章，我给 10 个 claude code
                                        打工。最简单的道理，如果学习计算机知识价值在降低，那我和胡渊鸣还有 Andrej
                                        能做出贡献的差距会随着 AI 的发展而缩小，但是事实上这个差距是随着 AI
                                        的发展而拉大的。人必须坚持塑造自己的底层认知，去学半衰期长一些的知识。
                                      - 问题接踵而至，到了下周当我再开发下一个功能的时候就不灵了，我发现ai写的逻辑并不是最优的，有很多逻辑奇怪且冗余。这个时候下一个功能几乎无法开发，我必须对上一次的代码进行重构。由于AI生成了大量我看不懂的代码，所以我必须努力去理解，这对我的要求很高。我花了不少时间重构完成，项目得以继续。
