                                    - 校招必胜客
                                ring_desc:
                                  type: string
                                  enum:
                                    - " 非技术向 AI 讨论空间，记录 AI 浪潮中的真实人生，一起讨论如何让 AI
                                      成为延伸能力的工具，而非定义价值的标准。    👏我们期待你分享：  1.你与
                                      AI 互动的日常：工作与生活中用 AI
                                      提升效率的真实案例、使用AI工具时有趣小插曲，例如用 AI
                                      写工作总结翻车的尴尬等。  2. 应用 AI 的暖心时刻：用 AI
                                      帮助奶奶爷爷修复模糊的老照片，或是利用 AI 为家人制作的礼物等。  3.
                                      你的一些脑洞尝试： AI 画梦，或用 AI 想象的虚拟世界； 4.
                                      AI带给你的真实困惑：工作价值，以及AI下主体性思考。    ❌这里不欢迎：  1.
                                      过于技术化的讨论，如AI算法或编程细节，我们更关注实际的故事；
