  /api/v4/members/{url_token}/answers:
    get:
      operationId: getUserAnswers
      summary: Get a user's answer list — question titles, answer excerpts, vote counts, timestamps
      x-openweb:
        permission: read
        build:
          stable_id: zhihu0003
          tool_version: 1
          verified: true
          signals:
            - status-match
        adapter:
          name: zhihu-web
          operation: getUserAnswers
      parameters:
        - name: url_token
          in: path
          required: true
          schema:
            type: string
          description: User URL token.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Pagination offset.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Results per page.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: created
          description: "Sort order: created, voteups."
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  paging:
                    type: object
                    properties:
                      is_end:
                        type: boolean
                      totals:
                        type: integer
                      previous:
                        type: string
                      is_start:
                        type: boolean
                      next:
                        type: string
                    required:
                      - is_end
                      - totals
                      - previous
                      - is_start
                      - next
                  data:
                    type: array
                    items:
                      type: object
                  need_force_login:
                    type: boolean
                required:
                  - paging
                  - data
                  - need_force_login
  /api/v4/answers/{answer_id}/voters:
    post:
      operationId: upvoteAnswer
      summary: Upvote an answer — toggleable, sends "up" or "neutral" to vote/unvote
      x-openweb:
        permission: write
        safety: caution
        build:
          stable_id: zhihu0011
          tool_version: 1
          verified: true
          signals:
            - status-match
        adapter:
          name: zhihu-web
          operation: upvoteAnswer
      parameters:
        - name: answer_id
          in: path
          required: true
          schema:
            type: string
          description: Answer ID to upvote (numeric string).
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - up
              - neutral
            default: up
          description: "Vote type: 'up' to upvote, 'neutral' to cancel vote."
      responses:
        "200":
          description: Vote registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  voting:
                    type: integer
                    description: "Current vote state: 1=upvoted, 0=neutral, -1=downvoted."
                  voteup_count:
                    type: integer
                    description: Total upvote count after this action.
                required:
                  - success
                  - voting
                  - voteup_count
