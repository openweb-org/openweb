                        query:
                          type: string
                        real_query:
                          type: string
                        hot_source:
                          type: integer
                        label:
                          type: string
                          enum:
                            - ""
                            - hot
                            - new
                        icon_url:
                          type: string
                          enum:
                            - ""
                            - https://pic1.zhimg.com/v2-a78ac32001394c73b39a60546b4e5f42.png
                            - https://picx.zhimg.com/v2-31e3b0a5b920d516c5813145d88397b1.png
                        hot:
                          type: integer
                        hot_show:
                          type: string
                        search_source:
                          type: string
                          enum:
                            - Trending
                        index:
                          type: integer
                        redirect_link:
                          type: string
                          enum:
                            - ""
                        image_item:
                          type: object
                          properties:
                            icon_url:
                              type: string
                              enum:
                                - ""
                                - https://pic1.zhimg.com/v2-a78ac32001394c73b39a60546b4e5f42.png
                                - https://picx.zhimg.com/v2-31e3b0a5b920d516c5813145d88397b1.png
