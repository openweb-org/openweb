  /api/v4/answers/{answer_id}/voters:
    post:
      operationId: upvoteAnswer
      summary: Upvote an answer — toggleable, sends "up" or "neutral" to vote/unvote
      x-openweb:
        permission: write
        safety: caution
        build:
          stable_id: zhihu0011
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: answer_id
          in: path
          required: true
          schema:
            type: string
          description: Answer ID to upvote (numeric string).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - up
                    - neutral
                  default: up
                  description: "Vote type: 'up' to upvote, 'neutral' to cancel vote."
              required:
                - type
      responses:
        "200":
          description: Vote registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  voting:
                    type: integer
                    description: "Current vote state: 1=upvoted, 0=neutral, -1=downvoted."
                  voteup_count:
                    type: integer
                    description: Total upvote count after this action.
                required:
                  - success
                  - voting
                  - voteup_count
  /api/v4/answers/{answer_id}/voters~cancelUpvote:
    post:
      operationId: cancelUpvote
      summary: Cancel an upvote on an answer — POSTs type=neutral to voters endpoint
      x-openweb:
        permission: write
        safety: caution
        actual_path: /api/v4/answers/{answer_id}/voters
        build:
          stable_id: zhihu0014
          tool_version: 1
      parameters:
        - name: answer_id
          in: path
          required: true
          schema:
            type: string
          description: Answer ID to cancel upvote on (numeric string).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  const: neutral
                  description: "Always 'neutral' — cancels the vote."
              required:
                - type
      responses:
        "200":
          description: Vote cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  voting:
                    type: integer
                    description: "Current vote state after cancel: 0=neutral."
                  voteup_count:
                    type: integer
                    description: Total upvote count after this action.
                required:
                  - success
                  - voting
                  - voteup_count
