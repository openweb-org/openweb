                                            introduction:
                                              type: string
                                              enum:
                                                - Linux是一套免费使用和自由传播的类Unix操作系统，是一个基于POSIX和UNIX的多用户、多任务、支持多线程和多CPU的操作系统。它能运行主要的UNIX工具软件、应用程序和网络协议。它支持32位和64位硬件。Linux继承了Unix以网络为核心的设计思想，是一个性能稳定的多用户网络操作系统。Linux操作系统诞生于1991
                                                  年10 月5
                                                  日（这是第一次正式向外公布时间）。Linux存在着许多不同的Linux版本，但它们都使用了Linux内核。Linux可安装在各种计算机硬件设备中，比如手机、平板电脑、路由器、视频游戏控制台、台式计算机、大型机和超级计算机。严格来讲，Linux这个词本身只表示Linux内核，但实际上人们已经习惯了用Linux来形容整个基于Linux内核，并且使用GNU
                                                  工程各种工具和数据库的操作系统。
                                                - 一种基于Linux内核的综合操作，即包括各类底层驱动的开发，也包括使用java语言编写，但运行在Dalvik
                                                  VM（非 Java 虚拟机，Android 4.4
                                                  以后运行在ART上）中编译和执行的应用程序设计。
                                                - 科学知识的普及。
                                                - 科幻片是类型片的一种，该类作品采用科幻元素作为题材，以建立在科学上的幻想性情景为背景，在此基础上展开叙事的影视作品。科幻片所采用的科学理论并不一定被主流科学界接受，例如外星生命、外星球、超能力或时间旅行等等。科幻电影常常使用可能的未来世界作为故事背景，用宇宙飞船、机器人或其他超越时代的科技等元素彰显与现实之间的差异。许多科幻电影会表现出对于政治或社会议题的关注，以及哲学方面如人类处境的探讨。一些科幻电影是从科幻文学作品改编而成，但科幻电影会注重撷取其中的文学或人文方面的元素，而无视科幻文学比较注重的科学严谨性和逻辑性。
                                                - 科幻，是幻想文学中最贴近现实的类型，其在已被证实的科学现象的基础上，进行天马行空的创造。
                                                - 移动电话，或称为无线电话，通常称为手机，原本只是一种通讯工具，早期又有大哥大的俗称，是可以在较广范围内使用的便携式电话终端，最早是由美国贝尔实验室在1940年制造的战地移动电话机发展而来。1958年，苏联工程师列昂尼德.库普里扬诺维奇发明了ЛК-1型移动电话，1973年，美国摩托罗拉工程师马丁·库帕发明了世界上第一部商业化手机。迄今为止已发展至4G时代了。
                                                - 笔记本电脑是一种用于现代数字化办公以及电子游戏娱乐的消费电子产品，是互联网信息时代的重要生产力工具，也是目前主流的个人便携式办公,学习,娱乐设备。<br/><br/>笔记本电脑的字面含义指的是形似笔记本开合并且方便携带的小型个人电脑。<br/><br/>绝大多数笔记本电脑都装有桌面操作系统，重量适中具有一定的便携性，内置电池可以脱离电源使用。<br/><br/>笔记本的形态包括但不限于以下类型：【迷你掌机】【轻薄本】【厚重本】【二合一平板电脑】【折叠屏电脑】。<br/><br/>在智能手机普及的今天，笔记本电脑更强调【工具性】【生产力】【高性能】属性，同时在接受着
                                                  “手机桌面系统”，“平板桌面系统” ，“云电脑”
                                                  新模式的挑战。
                                                - 编程是编写程序的中文简称，就是让计算机代为解决某个问题，对某个计算体系规定一定的运算方式，是计算体系按照该计算方式运行，并最终得到相应结果的过程。为了使计算机能够理解人的意图，人类就必须将需解决的问题的思路、方法和手段通过计算机能够理解的形式告诉计算机，使得计算机能够根据人的指令一步一步去工作，完成某种特定的任务。这种人和计算体系之间交流的过程就是编程。编程：设计具备逻辑流动作用的一种“可控体系”【注：编程不一定是针对计算机程序而言的，针对具备逻辑计算力的体系，都可以算编程。】
