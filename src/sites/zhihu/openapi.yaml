                                - <p>历史上每次科技革命都带来了生产效率的飞升，AI至今除了吸引眼球和赚到了吆喝到底给人类带来了什么收益？</p><p>为什么我观察下来，赚钱的企业是卖卡的，获益的个人是卖课的？</p>
                                - <p>报道：<a href="https://link.zhihu.com/?target=https%3A//futurism.com/the-byte/google-deepmind-tech-general-ai" class=" wrap external" target="_blank" rel="nofollow noreferrer">Google&amp;#8217;s DeepMind Says It Has All the Tech It Needs for General AI</a></p><p>原始论文：<a href="https://link.zhihu.com/?target=https%3A//www.sciencedirect.com/science/article/pii/S0004370221000862" class=" wrap external" target="_blank" rel="nofollow noreferrer">Reward is enough</a></p>
                                - <p>虽然目前我还看不到，但是我感觉这个事情不会那么简单，我们也无法预测，就像当年工业革命一样。大家说说自己的看法。</p>
                                - AI 发展这么快，和脑科学有关吗？
                                - 很明显的，以深度学习为主力的这一波人工智能浪潮，从我高三吹到了我大四毕业，很明显深度学习不可能处理复杂的任务，虽然号称模拟大脑，但是几乎与认知科学的研究隔绝。各大互联网公司都争先投入大量资源，连英伟达都加入战团。<br/><br/>我感觉深度学习致命一点是不能应用在太多普通用户的产品上面，只适合搜索引擎和学术方面，现在主要的产品基本都是为搜索引擎服务的，普通的创业者根本没机会玩，数据不如大公司多，普通用户也没有那个需求。<br/><br/>深度学习既不会像图形操作界面或者互联网那样改变大部分人的生活，也不会像3D打印那样有改变生产方式的趋势，20年之内几乎不会减少白领的工作量。<br/><br/>看来深度学习很精巧，结果很漂亮，实际华而不实。
                                - 技术的进步依赖于材料的进步，基础物理的进步也要靠大型粒子对撞机的一次次实验。经常看到什么真正人工智能出现能够一星期或一个月灭亡人类。但科技的进步真能靠虚拟环境中智能生命的脑洞强行跨越吗？
