                            content:
                              type: string
                              enum:
                                - '<p
                                  data-pid="-7z9Y3g7">我算是从vscode用到cursor再到Claude
                                  Code一路跟过来的用户，对AI编程的看法几经反转。尤其是Claude
                                  Code推出之后，我在第一周就开git
                                  worktree同时做了4个新feature，完全vibe
                                  coding，居然调试都很顺利。我大喜过望，我觉得我可以做产品经理了，技术的事全部交给Claude
                                  Code就行了。</p><p
                                  data-pid="FAhVR_d2">问题接踵而至，到了下周当我再开发下一个功能的时候就不灵了，我发现ai写的逻辑并不是最优的，有很多逻辑奇怪且冗余。这个时候下一个功能几乎无法开发，我必须对上一次的代码进行重构。由于AI生成了大量我看不懂的代码，所以我必须努力去理解，这对我的要求很高。我花了不少时间重构完成，项目得以继续。</p><p
                                  data-pid="srPsU69Z">我吃一堑长一智之后，决定每一次ai的提交我都用眼睛去看，这么做之后屎山的问题不严重了，但我在这里意识到了一个矛盾性。就是我开始丢失了编程的感觉，我开始把自己的角色当成了技术经理或者产品经理。而现阶段的AI编程就像一个实习生，不逐行review是不行的，这就要求我非常懂编程！实际上你review别人的代码比自己构思有时候还要难，所以网上也有vibe
                                  coding更累了的说法。最终我将这个矛盾性戏谑地总结为：如果我不古法编程，就没办法给出好的prompt，AI
                                  coding就会失败；如果我古法编程了，那我为什么还需要AI呢？</p><p
                                  data-pid="L4KcetaK">另一种困难来自于AI
                                  coding的等待时间，通常1-2分钟的等待时间不长不短，无论我是去看课还是刷短视频，都会导致我的思维失去连贯性。我很难相信长此以往，我有能力review
                                  AI生成的代码并掌控一个复杂项目。</p><p
                                  data-pid="9TqS8HOY">说到这，通过对vibe
                                  coding的爱恨纠缠，逐渐摸索出了和它相处的一点门道。我总结出了其中绝对可以做的事和绝对不能做的事。</p><p
                                  data-pid="o8ZnoUym">vibe coding中可以做的事：</p><p
                                  data-pid="B5PMuhiN">1.
                                  解决bug绝对有帮助，因为解决bug往往需要先确定root
                                  cause，这本质上是一个搜索问题。AI在搜索关键代码方面可谓非常有帮助。而且解决bug是不会怎么产生屎山的，确定问题，人工fix可能也只是几行代码的事。</p><p
                                  data-pid="2m4vx_lR">2.
                                  讨论新feature的原型。因为我是全栈，有些功能只是有点灵感，但怎么落地还没头绪。这时候直接开一个新的branch，让AI一路生成一个UI原型，你点一点玩一玩就会有新思路。</p><p
                                  data-pid="uazjTPO6">3. 确定架构。这个部分在没有AI
                                  coding的时候我是不太想的，有点凭感觉。有了AI之后我往往会和AI先讨论架构，规定几个关键函数的签名，确定核心数据结构。</p><p
                                  data-pid="MpmAleyV">4.
                                  修改视觉UI，各种flex设计，CSS规范记不住，发现AI对解决视觉问题非常好用。</p><p
                                  data-pid="tXxKSEW0">5.
                                  重构，但仅限小型任务。比如我要把这个模块里的某几个方法抽象成一个新的模块，这种迁移AI往往完成得不错。</p><p
                                  data-pid="5MiztKlF">6. 当我完成代码之后，AI对我提意见，Code
                                  Review，让AI
                                  review我的效果很好，因为我的代码已经写出来了，已经构成一个基础，让它在这个上面提意见，有时真的会发现一些问题。</p><p
                                  data-pid="45Fpx_nd">vibe coding中不能做的事：</p><p
                                  data-pid="7234x40G">1.
                                  不要完全依赖AI，失去自己对程序的理解。</p><p
                                  data-pid="hIhKnzAZ">2. 不好好用git commit /
                                  branch</p><p data-pid="O2VXU64Z">3. 编程新手不要vibe
                                  coding，你把握不住</p><p data-pid="Ug6gVMvO">4.
                                  不要在等待代码生成途中刷短视频</p><p data-pid="1ZAkYd3f">5.
                                  不要认为编程会被AI取代，就懈怠学习编程技术。恰恰相反，现阶段，只有非常优秀的程序员，才能驾驭这些AI</p><p
                                  data-pid="5qED-kAW">二更（2025.9.19)：</p><p
                                  data-pid="zE3fleif">感谢大家的喜欢，通过这段时间继续使用的情况，我发现了一些古法编程中不易察觉的优点，在此补充：</p><p
                                  data-pid="GEUL3_67"><b>1.
                                  古法编程使我的大脑更专注</b></p><p
                                  data-pid="L51Hk48S">古法编程更容易进入做产品的状态，而AI编程则让我的大脑变得异常浮躁，跳脱。大脑和身体一样，不是用的越多越累，其实是用的越多越强大，越有精神。我不相信一个思想上懒惰浮躁的程序员能做出什么好项目（呼应之前谈到的短视频）</p><p
                                  data-pid="884snA65"><b>2.
                                  古法编程带来更好的prompt</b></p><p
                                  data-pid="moXNNmVd">如果AI编程的结果和prompt的质量呈正相关，那么给出更优秀的prompt的前置条件就是我能够充分地理解代码。因为做一个功能，实现是和AI的讨论一点点生成的，如果我不看代码，那我的prompt就一直模模糊糊，最后的结果也不会好。</p><p
                                  data-pid="BSG4OvBw"><b>3.
                                  理解下一个抽象层永远有益</b></p><p
                                  data-pid="05bEe8cF">著名的课程csapp开篇就说到，抽象是很好的，但是可惜，抽象并不永远work，我们必须深入理解高级语言之下，cpu，内存是如何运行的。对比到项目上，我们必须理解AI生成的代码，我仍然认为文档或者spec是辅助，代码+注释才是source
                                  of truth。</p><p data-pid="F374PwJL"><b>4.
                                  理解实现有助于新的idea产生</b></p><p
                                  data-pid="DrJwVZRe">因为了解了实现之后，我就非常清楚我的数据库里面表的结构，有什么样子的数据，什么样子的api。那么这些数据和api就像乐高积木，当你灵光一现，把它们重新排列组合一下，可能就有新的功能诞生。</p><p
                                  data-pid="Oqe3odYH"><b>5.
                                  （番外）很多人问不刷短视频干什么</b></p><p
                                  data-pid="vlNXHs1M"><b>我的建议是找一张草纸，像上中学的时候演算一样。在上面设计一些核心的数据结构和方法，或者整理一下数据调用的链条。等AI生成好了之后和它讨论，或者检查它是不是按照你草纸上的设计做的。</b></p><p
                                  data-pid="fSZYaamL">这些点也是我在不断尝试古法编程和AI编程的不同配比中得出的一点体会，未来我也会继续做这样的尝试。现在我的古法编程比例比写这篇答案时增高，cursor重新成为我的主力ide，tab成为使用最多的AI编程功能。</p><p
                                  data-pid="i2xGlmLb">三更（2026.3.11)</p><p
                                  data-pid="3s5Xgii1">现在是 claude code 2.1.72 +
                                  claude opus 4.6 的年代，很多朋友在评论区说 AI
                                  相关的答案都要看一下回答日期，太久之前的回答似乎就像沙丁鱼罐头，时间久了就过期掉。我在把这个半年前写的答案通读了一遍之后，发现里面的大部分内容并未过期，但需要不少修订和补充，特此更新。</p><p
                                  data-pid="zQALbT7F">首先我想说的是一个反直觉的事，就是 AI
                                  在这半年的进步主要不在“写代码”的速度，重点是它正在关注整个软件工程的生态。在半年前，我用
                                  claude code 主要就是写代码，但是现在 claude code 就像一个可控的
                                  openclaw，只要赋予合适的权限，所有我能做的事情它都可以做（token足够的前提下）。接下来，我就分几个关键词展开说一说。</p><p
                                  data-pid="t92DumNB">（1）Skills （技能）</p><p
                                  data-pid="nm5cMxPh"><b>Skills
                                  是这半年最重要的更新之一</b>，它可以理解为一个按需插入的
                                  prompt，同时结合脚本完成一项具体的任务。这个功能使我减少了很多毛刺工作，比如发布
                                  staging 版本，同时发布 5 个平台的客户端，由于 skill 只有一小段
                                  prompt，几乎不会出现幻觉问题，非常可靠。在毛刺工作减少时，我的视野变得更加宽阔，我开始着手做整体的
                                  AI 工作流，也就是输入: idea, 输出: 发布新版本，这其中的所有环节，都有 AI
                                  的参与，这也引出了下一个功能，agent team。</p><p
                                  data-pid="4lkNseg2">(2) Agent team （Agent
                                  团队)</p><p data-pid="ssuiD244">我平常有6个项目要维护,
                                  2个服务端，2个客户端，1个小程序，还有1个管理后台。那么心智模型就是1个新的 idea
                                  可能同时需要这6个项目共同参与，协同变更。所以<b>编排整体的 AI
                                  工作流就变得重要了</b>，在这个背景下，我新建了一个
                                  ai-manager项目，每有一个新的idea, 通常我会用 brainstorming
                                  skill 开始入手，从 idea 的产生到最终写成
                                  prd.md，是我和claude讨论出来的。有了 prd，通常我会带着 prd 去
                                  lovart 上面设计 UI，这些都完成后，就交各个 teammate
                                  去设计技术实现路径，我会采用官方的 feature dev 命令去完成这个过程。</p><p
                                  data-pid="Kcs4gG0F">(3) Harness Engineering
                                  （驾驭工程）</p><p data-pid="LMl1Q7ij">从 Copolit 到
                                  Harness 的这个有趣的比喻也能看出心智模型的变化，之前是我来开，AI 是副驾驶，现在是
                                  AI 来开，人对它约束和管控。人从维护代码的角色变成了维护AI，像 claude code
                                  最新更新的 insights
                                  命令也是基于这个心智模型提出的。<b>这个点着重于强调个性化</b>，也就是让 AI
                                  理解当下的环境，你是如何工作的，怎么命名你舒服，怎么写参数你舒服，怎么做架构你舒服。是测试很多corner
                                  case你舒服，还是基础测一下你舒服。这些都没有对错之分，就是像喜欢红色和绿色一样，但是
                                  Harness 就是让 AI 理解人的脾性，进而实现人和 AI 的丝滑合作。</p><p
                                  data-pid="duC2WugB">(4) Test （测试）</p><p
                                  data-pid="W42ybSNU">测试的重要性来到了它的历史最高点。既然大量的代码都是
                                  AI 通过我的一个简单的 idea
                                  加工生成的，我在把它发布到生产环境的时候，怎么能够确保它是正确的？我觉得答案就是测试。测试分为黑盒和白盒，黑盒测试主要涉及功能测试和线上日志监控，白盒测试则主要是
                                  code
                                  review，在我的实践中，测试工程的搭建已经占据我近一半的工作量。很多人提到通过维护
                                  skill 和 <a
                                  href="https://link.zhihu.com/?target=http%3A//claude.md/"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">claude.md</a> 的方式去让
                                  AI
                                  生成优质的代码，<b>但我认为在严格的测试工程下，劣质的代码一般是无法通过的，即使是黑盒测试</b>。目前测试工程的生态还不是很完善，这个领域很可能是下半年
                                  Anthropic 发力的点。</p><p data-pid="punSEhER">(5)
                                  真不用看代码了吗 （How dare you!)</p><p
                                  data-pid="5XcD_r__">这部分我的思考是，<b>和半年前有提升，但没有本质区别</b>。在
                                  AI 写好代码后，我仍然需要确认架构图，api 接口的命名，参数类型，dto
                                  的格式等等。以及在关键技术问题的归因上面，我都仍然遇见过 AI
                                  的误判，我险些因为这个误判改变整个功能的技术路线。所以关于这个部分，我仍然坚持之前的看法，我必须是一个优秀的软件工程师，我才能用
                                  AI 写出好的代码。</p><p data-pid="dcqXlK6n">(6)
                                  还需要学习计算机吗 （AI 助教来了）</p><p
                                  data-pid="kBGFd8Uv">这个想法也没有变，而且我觉得人需要更多地学习。我们对于
                                  AI 的认知很多时候受到网红的影响，比如 Andrej Kapathy 发推说他在去年 11
                                  月，从 80% 手写代码突然变成了 20%；胡渊鸣在新春时节发微信文章，我给 10 个
                                  claude code 打工。最简单的道理，如果学习计算机知识价值在降低，那我和胡渊鸣还有
                                  Andrej 能做出贡献的差距会随着 AI 的发展而缩小，但是事实上这个差距是随着 AI
                                  的发展而拉大的。人必须坚持塑造自己的底层认知，去学半衰期长一些的知识。</p><p
                                  data-pid="qmQpvkuj">不过一大利好是在这个时代，学习的毛刺也减少了，<b>我们可以直接吃西瓜的尖尖了！</b>我前些日子想把
                                  CSAPP 捡起来继续学，我直接就和 AI 说，我要学这个了，把网上的资料找一找，做一个
                                  AI 助教出来，结果 AI 直接给我搭出一个保姆级的学习方案，做 labs
                                  的时候简直就像有一个计算机大神在不厌其烦地教我。（可能是因为网上关于这个项目的大神资料太多了）很难想象未来人类的学习速度，不过这个就涉及
                                  AI 教育的领域，不再深入展开了。</p><p
                                  data-pid="TDXaf-s9">(7) 还看短视频吗 （真忍不住）</p><p
                                  data-pid="lMKz6igB">我在半年前提出短视频理论之后，大家非常共情。包括我自己，我现在每天和短视频斗智斗勇，有时深刻地觉得现在产出的瓶颈是我自己，我太想摸鱼了，太想看小姐姐了。现在的思路是尽可能把手机放远一点，然后登录电脑微信，和真实的小姐姐聊天（希望对方不是龙虾吧）（手动狗头）。</p><p
                                  data-pid="PpMakbCW">开玩笑啦，其实这个问题的核心是注意力切断，我提出的理念是在
                                  AI 等待时间继续思考这个问题。网文中经常说 openai
                                  的员工开10个agents做事情，我觉得那个应该是 team
                                  agents，但是即使开10个，它的思路也是在思考一个问题。<b>人脑是不太适合多线程思考的，我就是这么认为的！</b>注意力不能被切断，切断之后我就会变成一个不能深度思考的人，时间长了就没能力驾驭
                                  AI 了，这也是之前提到的内容，我坚持并且不改。</p><p
                                  data-pid="KcK8TNG4">(8) 最后聊聊</p><p
                                  data-pid="pYiIAzef">AI
                                  在这半年的发展提升了写代码这事的速度，但希望大家从 AI
                                  增益了整个软件工程甚至整个人类脑力生产这个角度去看问题，而不仅仅局限于代码。AI
                                  在做毛刺任务时很有帮助，那么人就要去思考真正重要的事情！<b>很多人失业了吗，我不这么看，我觉得人们本来就不应该做这种xx工作啊。</b>每一个人都有自己独特的经验和有趣的灵魂，尝试走出来，让
                                  AI
                                  帮你实现一个小梦想，从做中学，技术一定会让这个世界更美好！（如果你不知道怎么开始，可以私信我哈，纯社区交流，不是卖课哈哈哈）</p><p
                                  data-pid="2NqiQNSN">最后的最后，不要盲目学习网红们的打法，保持克制和理性。我学习打篮球一般也不会看乔丹的录像，大神们的工作流也不一定适合我们，还请理性分析。</p><p
                                  data-pid="0_N5y6Wf">参考文献：</p><ul><li
                                  data-pid="E7XPKAQF">什么都有期限，罐头会过期，沙丁鱼会过期。连保鲜纸都会过期。
                                  —— 《重庆森林》</li><li data-pid="zro1YhHS"><a
                                  href="https://link.zhihu.com/?target=https%3A//code.claude.com/docs/zh-CN/skills"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">Claude code
                                  skills</a></li><li data-pid="26uxNqRj"><a
                                  href="https://link.zhihu.com/?target=https%3A//code.claude.com/docs/zh-CN/agent-teams"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">Claude code agent
                                  team</a></li><li data-pid="oqkBjT6O"><a
                                  href="https://link.zhihu.com/?target=https%3A//claude.com/plugins/feature-dev"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">Feature
                                  dev</a></li><li data-pid="BQm6XCd1"><a
                                  href="https://link.zhihu.com/?target=https%3A//csdiy.wiki/%25E8%25AE%25A1%25E7%25AE%2597%25E6%259C%25BA%25E7%25B3%25BB%25E7%25BB%259F%25E5%259F%25BA%25E7%25A1%2580/CSAPP/"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">CMU 15-213: CSAPP -
                                  CS自学指南</a></li><li data-pid="_5YO3FZZ"><a
                                  href="https://zhuanlan.zhihu.com/p/2007147036185744607"
                                  data-draft-title="如何有效地给 10 个 Claude Code 打工"
                                  class="internal">如何有效地给 10 个 Claude Code
                                  打工</a> —— <a class="member_mention"
                                  href="https://www.zhihu.com/people/19787805e0d1f80fe5501ec60be84d6a"
                                  data-hash="19787805e0d1f80fe5501ec60be84d6a"
                                  data-hovercard="p$b$19787805e0d1f80fe5501ec60be84d6a">@胡渊鸣</a>
                                  </li></ul><p></p>'
                                - <p
                                  data-pid="2X6kFf1R">快高考了，我现在是一名211大学人工智能大一新生，我想说的只有一点，如果你想度过悠闲的大学四年就绝对不要选这个专业，目前我们学校没有毕业生所以不知道就业前景，但是课程量和课程难度都很高，绝对不存在你可以躺平度过大学生活的想法。</p>
                                - <p
                                  data-pid="687MyzXS">大家一定要对人工智能这个专业去魅，99%的学生，人工智能专业说实话跟你就没有什么关系。我说这句话，肯定很多家长要喷，觉得读了人工智能专业就能干人工智能相关的事，但其实都是人家本硕双985的毕业生在干。别觉得听着热门，觉得厉害就去报。</p><p
                                  class="ztext-empty-paragraph"><br/></p><p
                                  data-pid="3SGnvviq">这是一个成都的一所双非院校的学生给我的留言，普通的一本、二本甚至大专都在开人工智能专业，你们直接去看看他们的培养方案，是不是基本上就是计算机自动化那一套。</p><p
                                  class="ztext-empty-paragraph"><br/></p><p
                                  data-pid="AZQrOnrk">2018、2019年我们才刚刚开了人工智能的本科专业，而且人工智能这个专业又是放到了电子信息大类下面去招生。所以很多学校其实就是以前的信息工程学院转变过来的，比如说中山大学深圳校区的人工智能，就是以前自动化的专业。到了普通院校的人工智能专业，那就更是大杂烩了。如果你实在要读，那就去国家队“101计划”当中的15所院校，要不就不要去读。</p><p
                                  class="ztext-empty-paragraph"><br/></p><p
                                  data-pid="dAVEywJW">哪15所院校呢？</p><p
                                  data-pid="GDB_NM_y">清北、复旦、交大、浙大、南京大学、同济、中国科学技术大学、哈工大、西安交大、北航、北理、北邮，还有北师大。还有一所学校名气没有那么大，就是湖南大学，它同样在“101计划”当中，这些都是档次比较高的学校。这15所一定要优先考虑。</p><p
                                  class="ztext-empty-paragraph"><br/></p><p
                                  data-pid="ro9LRk1-">那如果说咱家孩子分数不够，够不着“101计划”这几所，如果你的分数在600分左右，可以上一个强211，或者说中低分段，我就550上下的，本科期间你就去学计科，学软工也可以。那如果说咱家孩子数学比较好，你也可以去考虑考虑统计、数学这种专业，考研我们再去往人工智能这个方向去转是完全来得及的。因为人工智能的本科教育，学校与学校之间真的是天壤之别。</p><p
                                  class="ztext-empty-paragraph"><br/></p><p
                                  data-pid="DfpdSL2B">从找工作的角度上来说的话，你双非本科几乎是没有可能从事人工智能这个方向。人工智能这个行业的就业门槛也还没有下沉到普通人，就算你是双非硕士，也很难找到对应的工作。其实，狂欢盛宴只属于少数人，大多数人都是碌碌无为的。</p>
                                - <p data-pid="73alLBuG">一代码农有一代码农的匠人精神。</p><p
                                  data-pid="fDzdS1sY">我们那一代，都是呼吁用txt写代码，这个流派声称，让ide帮你搞定环境和配置，会让你失去中间的很多知识，ide的补全功能会降低你的编码能力，真男人就用txt。</p>
                                - '<p data-pid="WBb--V2I">这个不用争论，看疗效就可以。</p><p
                                  data-pid="56Fubx_t">我现在暂时觉得性价比最高的编程套件是「Trae海外版会员开Claude-4-sonnet
                                  + Google Gemini Pro下的Gemini
                                  CLI」，最低费用是3刀（Trae首月折扣，Gemini
                                  Pro学生认证免费18个月）。</p><p
                                  data-pid="XSX9aaLq">大概使用状态是这样的，下面是替换了命令行的Gemini
                                  CLI，右边是加持Claude的Trae对话框，整体还是VS
                                  code的布局。</p><figure
