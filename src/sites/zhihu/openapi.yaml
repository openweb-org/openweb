                                                - 现在的人工智能其实已经发展到了完全智能体的阶段。
                                                  现在大部人接触到的人工智能主要是智能推荐、智能搜索和问答、人脸和语音识别、自动驾驶、扫地机器人、工业自动化机器人、各专业的人工智能、用于军事的无...
