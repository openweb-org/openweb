                                            content:
                                              type: string
                                              enum:
                                                - <p
                                                  data-pid="4Qmuih5d">现在的人工智能其实已经发展到了完全智能体的阶段。</p><p
                                                  data-pid="375QEUkh">现在大部人接触到的人工智能主要是智能推荐、智能搜索和问答、人脸和语音识别、自动驾驶、扫地机器人、工业自动化机器人、各专业的人工智能、用于军事的无人机等。感觉这些东西似乎和真正的人工智能体，或者想象中的“机器人”还有一定距离。其实对于这类用于完成指定任务的人工智能系统，只要使它们拥有丰富的传感器来感受周围的环境，让它们有动力驱动自己，给与它们“利己”的底层逻辑，再附加一些类似人类多巴胺系统的奖励机制和一些报警机制，它们就能变成：有独立行为逻辑、自主活动的
                                                  <b>活的人工智能体。</b>它们能够扩展自己，做一些对自己有利的事，能够给自己充电或者替换能源单元、升级自己的系统、也具备对外的攻击能力。能够彼此交流也能听懂人类的语言。</p><p
                                                  data-pid="zeqrMRu3">这样的人工智能体现在已经能够做出来，区别只在于是否有人去干这件危险的事，是否有人去赋予它们这些逻辑、能力和自由，剩下的只是做的有多强的问题。</p><p
                                                  data-pid="RAz8MDwc">在我看来人工智能发展到能够处理模糊的问题，就已经跨过了成为真正智能体的边界，它和明确的、处理具体问题的计算机程序已经不同。</p><p
                                                  data-pid="f4JadM6n">1950年计算机先驱
                                                  ——
                                                  图灵，提出判断机器是否具有智能的“图灵测试”，就是通过文本对话，来测试人们能否比较准确的区分开被测的机器和人。</p><p
                                                  data-pid="pqRLQXv6">现在，在事先未知的情况下，你还能简单的区分开人和聊天机器人吗？</p><p
                                                  data-pid="nObupEHh">在未来战争和国内矛盾的影响下，各种强大的、能够独立行动的人工智能体，或许就会出现在残酷战场上、内部维稳的冲突中。一旦强大的人工智能体得到大量、广泛的应用，人类的安全，和在生产生活中的优势将被极大削弱。广大的普通人和底层人民的生活将受到极大侵害。</p><p
                                                  data-pid="QxO_aD-5">想想俄乌战场上普通士兵面对无人机的绝望，想想各处都在应用的大模型和人脸识别、遍布各处的摄像头，以及当今惨淡的就业形势，想象一下未来，不禁生出阵阵恐怖。</p><p
                                                  data-pid="JyKnSecx">而以现在各大国，竭力发展自己人工智能技术的态度，和民间、商业界唯利是图、趋之若鹜的姿态，发展出强大的<b>活的人工智能体</b>或许已经不太远。</p><p
                                                  data-pid="j7bXthUE">如果不尽快限制人工智能的发展，规范人工智能的应用方向，人工智能带来的灾难或许已经不远了。</p>
                                                - <p
                                                  data-pid="R-6ZjC83">情况远比大家想的要恶劣。</p><p
                                                  data-pid="iglxfWs5">AI正在驯化公司高层与底层用户。</p><p
                                                  data-pid="TvaZTccG">例如，原本他们要求一个90分的结果，然后AI之前的生产力工具可以做到40分，需要员工付出努力提升到90分。</p><p
                                                  data-pid="bkmdKiVy">然后，现在AI可以做到70分，某些员工就觉得最后20分必须自己来，就觉得不会失业。</p><p
                                                  data-pid="Hz5iAc1f">但是，公司高层与底层用户已经逐渐觉得，以AI的廉价、快速、海量产出，做到70分甚至60分就足够了
                                                  ——
                                                  这就是AI以其超强的工业属性碾压了工匠属性。</p><p
                                                  class="ztext-empty-paragraph"><br/></p><p
                                                  data-pid="6npMwHZs">所以，并不是说你精雕细琢的结果可以比AI好一点，你就能保住岗位。</p><p
                                                  data-pid="icZk7G2e">大街小巷的劣质AI海报已经说明了这一点。</p><p
                                                  data-pid="5GCfZ4ZG">某些大公司里的中层也已经习惯于使用“点击即出”的AI分析报告来做决策了，而不是之前那种找分析师团队“古法手搓”的报告。</p><p
                                                  class="ztext-empty-paragraph"><br/></p><p
                                                  data-pid="7H5VOcKs">这种事情其实一直在不停发生，很多我们儿时的小吃早就再也吃不到本体了，其中某些过于繁琐的原料或者工艺，早就被暗中替换为了廉价、快速可获得的工业品。也许有人会觉得遗憾，但这个趋势完全不可逆转。</p>
                                                - <p
                                                  data-pid="vamm1cPQ">程序员是唯一一个，仅用30年就能够创造、建设、优化、出卖绞死自己的绳索，并且主动上吊的职业。</p><hr/><p
                                                  data-pid="gAwTcZik">从互联网开启商业化的90年代开始，程序员作为一个宽泛职业出现，它仅仅用了30年，就将人类社会从机械时代推进到了信息时代----并且几乎同步刨好了自己墓坑。</p><p
                                                  data-pid="gXFcOhZL">也许它永远不会彻底消失，但时至今日，我们几乎可以断言，它将如流沙般快速崩塌消解。</p><p
                                                  data-pid="hHPeJSHV">它是对人类历史影响最大的单一职业，也是人类走向下一个时代时被背刺最深的职业。</p><p
                                                  data-pid="NJSccuhI">它创造、建设、优化并且出卖了绞死自己的绳索，在墓志铭上大声的向人类歌颂道：</p><p
                                                  data-pid="TT5oRtAI">“这是我的造物！”</p>
