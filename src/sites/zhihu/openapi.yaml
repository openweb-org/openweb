                                - ""
                            excerpt:
                              type: string
                              enum:
                                - 一代码农有一代码农的匠人精神。
                                  我们那一代，都是呼吁用txt写代码，这个流派声称，让ide帮你搞定环境和配置，会让你失去中间的很多知识，ide的补全功能会降低你的编码能力，真男人就用txt。
                                - 先给个不绕弯子的结论：
                                  如果你本来就对用代码和数学把东西变出来有点兴奋感，愿意长期学习更新，AI
                                  专业的前景是值得押注的。
                                  如果你只是觉得听起来赚钱、父母说热门，但既不想学数学也不想写代码，那就要慎重点。因为接下来十年，AI
                                  大概率是越来越多行业的基础设施。 世界经济论坛的《未来就业报告》里，AI
                                  和机器学习专家已经排在全球增长最快职位的第一梯队(World Economic Forum
                                  )。 LinkedIn 一些统计也在说：2024 年带 AI…
                                - 大家一定要对人工智能这个专业去魅，99%的学生，人工智能专业说实话跟你就没有什么关系。我说这句话，肯定很多家长要喷，觉得读了人工智能专业就能干人工智能相关的事，但其实都是人家本硕双985的毕业生在干。别觉得听着热门，觉得厉害就去报。
                                  这是一个成都的一所双非院校的学生给我的留言，普通的一本、二本甚至大专都在开人工智能专业，你们直接去看看他们的培养方案，是不是基本上就是计算机自动化那一套。
                                  2018、2019年我们…
                                - 快高考了，我现在是一名211大学人工智能大一新生，我想说的只有一点，如果你想度过悠闲的大学四年就绝对不要选这个专业，目前我们学校没有毕业生所以不知道就业前景，但是课程量和课程难度都很高，绝对不存在你可以躺平度过大学生活的想法。
                                - 我算是从vscode用到cursor再到Claude
                                  Code一路跟过来的用户，对AI编程的看法几经反转。尤其是Claude
                                  Code推出之后，我在第一周就开git
                                  worktree同时做了4个新feature，完全vibe
                                  coding，居然调试都很顺利。我大喜过望，我觉得我可以做产品经理了，技术的事全部交给Claude
                                  Code就行了。
                                  问题接踵而至，到了下周当我再开发下一个功能的时候就不灵了，我发现ai写的逻辑并不是最优的，有很多逻辑奇怪且冗余。这个时候下一个功能几乎…
                                - 这个不用争论，看疗效就可以。
                                  我现在暂时觉得性价比最高的编程套件是「Trae海外版会员开Claude-4-sonnet +
                                  Google Gemini Pro下的Gemini
                                  CLI」，最低费用是3刀（Trae首月折扣，Gemini Pro学生认证免费18个月）。
                                  大概使用状态是这样的，下面是替换了命令行的Gemini
                                  CLI，右边是加持Claude的Trae对话框，整体还是VS code的布局。 [图片]
                                  使用案例比如我用仿造一个低配版的知乎热榜，内容改成每日AI新闻，后面附有安装方法和其他可选搭配…
