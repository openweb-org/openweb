  /api/v4/search/hot_search:
    get:
      operationId: getHotSearch
      summary: Get trending hot search terms — query text, display text, search count
      x-openweb:
        permission: read
        build:
          stable_id: 11773b7de3ae021f
          tool_version: 2
      parameters:
        - name: content_token
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: content_type
          in: query
          required: false
          schema:
            type: string
          example: question
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hot_search_queries:
                    type: array
                    items:
                      type: object
                      properties:
                        query_id:
                          type: string
                          enum:
                            - 61b2b743d7fd0e4c77f047e125e3a90a
