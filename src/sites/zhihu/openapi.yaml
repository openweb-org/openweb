                                        type: string
                                        enum:
                                          - '《水浒》，林冲初见高衙内那场，高衙内走后，鲁智深提铁禅杖引二三十个破落户大踏步抢入庙来。林冲叫道：“师兄那里去？”——五字问句，描出鲁智深气势汹汹莽莽撞撞扑来想帮忙，甚至都没看见林冲。<br>《永别了武器》最后一段，主角绝望地走进亡妻病房。护士重复两遍说他不能进，主角只说“你出去，还有另一个。”一句话，主角的情绪，房间里有俩人，都出来了。<br>觉得这两处有异曲同工之妙。<br><a class="hash_tag" href="https://www.zhihu.com/topic/19563361" data-pin-topic="zhihu://topic/19563361/pin20">#水浒传（书籍）</a>  <a class="hash_tag" href="https://www.zhihu.com/topic/20131437" data-pin-topic="zhihu://topic/20131437/pin20">#永别了，武器（书籍）</a> '
                                          - 最常见的平淡悲剧是：一个了解游戏规则知道如何在游戏中趋吉避凶的人最后倒在游戏中 <br>任何方面都最好“别太努力，差不多得了”，比如各种不健康的生活习惯，也包括各种过于健康到强迫自我的生活习惯
                                          - '鲁智深两番酒醉，于是离了五台山；林冲风雪复仇，抢酒喝醉了被抓到柴进东庄；杨志在梁中书处的仕途终于黄泥岗两桶酒；武松血溅鸳鸯楼，喝高了被孔家兄弟捉住；宋江在江州醉酒浔阳楼，于是上了山：施耐庵给每个好汉的故事结尾，都安排了一次醉酒误事，《水浒》可当戒酒书看，譬如《金瓶梅》可当戒色书看。<br><a class="hash_tag" href="https://www.zhihu.com/topic/20722776" data-pin-topic="zhihu://topic/20722776/pin20">#水浒全传（书籍）</a> '
