                                  height=&#39;294&#39;&gt;&lt;/svg&gt;"
                                  data-caption="" data-size="normal"
                                  data-rawwidth="652" data-rawheight="294"
                                  data-original-token="v2-63b146ea3c254fb38c7bba82a8eb84fc"
                                  data-default-watermark-src="https://pica.zhimg.com/50/v2-e238f40ce075d5552841104489a3cb8f_720w.jpg?source=1def8aca"
                                  class="origin_image zh-lightbox-thumb lazy"
                                  width="652"
                                  data-original="https://picx.zhimg.com/v2-71c999644b07ee0aa75095f2a12615c8_r.jpg?source=1def8aca"
                                  data-actualsrc="https://picx.zhimg.com/50/v2-71c999644b07ee0aa75095f2a12615c8_720w.jpg?source=1def8aca"/></figure><p
                                  data-pid="YNMlk4zO">然后你跟着它的要求登陆Google账号即可。</p><p
                                  data-pid="SNXUgmfz">2 永久使用，也就是安装在你的电脑上。</p><p
                                  data-pid="HIK2zz17">如果你有npm</p><div
                                  class="highlight"><pre><code
                                  class="language-text">npm install -g
                                  @google/gemini-cli</code></pre></div><p
                                  data-pid="WxnuqEnc">如果是homebrew</p><div
                                  class="highlight"><pre><code
                                  class="language-text">brew install
                                  gemini-cli</code></pre></div><p
                                  data-pid="fpRCoJW5">安装好之后，你之后只需要打开命令行，并输入gemini就可以激活。</p><figure
                                  data-size="normal"><noscript><img
                                  src="https://picx.zhimg.com/50/v2-acecf2210b06e3790cb79dde285749e4_720w.jpg?source=1def8aca"
                                  data-caption="" data-size="normal"
                                  data-rawwidth="608" data-rawheight="254"
                                  data-original-token="v2-acb2af6fe752e2bf508e164f2eb73faa"
                                  data-default-watermark-src="https://picx.zhimg.com/50/v2-e8f447566169b0e4736df46ebb9f38e7_720w.jpg?source=1def8aca"
                                  class="origin_image zh-lightbox-thumb"
                                  width="608"
                                  data-original="https://picx.zhimg.com/v2-acecf2210b06e3790cb79dde285749e4_r.jpg?source=1def8aca"/></noscript><img
                                  src="data:image/svg+xml;utf8,&lt;svg
                                  xmlns=&#39;http://www.w3.org/2000/svg&#39;
                                  width=&#39;608&#39;
                                  height=&#39;254&#39;&gt;&lt;/svg&gt;"
                                  data-caption="" data-size="normal"
                                  data-rawwidth="608" data-rawheight="254"
                                  data-original-token="v2-acb2af6fe752e2bf508e164f2eb73faa"
                                  data-default-watermark-src="https://picx.zhimg.com/50/v2-e8f447566169b0e4736df46ebb9f38e7_720w.jpg?source=1def8aca"
                                  class="origin_image zh-lightbox-thumb lazy"
                                  width="608"
                                  data-original="https://picx.zhimg.com/v2-acecf2210b06e3790cb79dde285749e4_r.jpg?source=1def8aca"
                                  data-actualsrc="https://picx.zhimg.com/50/v2-acecf2210b06e3790cb79dde285749e4_720w.jpg?source=1def8aca"/></figure><p
                                  data-pid="Zu5iEZdm">其他的Agent软件都类似，比如你可以参考Qwen
                                  Code：<a
                                  href="https://link.zhihu.com/?target=https%3A//github.com/QwenLM/qwen-code"
                                  class=" external" target="_blank"
                                  rel="nofollow noreferrer"><span
                                  class="invisible">https://</span><span
                                  class="visible">github.com/QwenLM/qwen-</span><span
                                  class="invisible">code</span><span
                                  class="ellipsis"></span></a></p>'
                                - '<p data-pid="ZqpfdWxl">先给个不绕弯子的结论：</p><p
                                  data-pid="3jg2lKuY"><b>如果你本来就对用代码和数学把东西变出来有点兴奋感，愿意长期学习更新，AI
                                  专业的前景是值得押注的。</b><br/><b>如果你只是觉得听起来赚钱、父母说热门，但既不想学数学也不想写代码，那就要慎重点。</b></p><p
                                  data-pid="I_YTvg5S">因为接下来十年，AI
                                  大概率是越来越多行业的基础设施。<br/>世界经济论坛的《未来就业报告》里，AI
                                  和机器学习专家已经排在全球增长最快职位的第一梯队(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.weforum.org/publications/the-future-of-jobs-report-2023/digest/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">World Economic
                                  Forum</a>)。<br/>LinkedIn 一些统计也在说：2024 年带 AI
                                  技能的岗位招聘量同比涨了 60% 多，而整体招聘只涨了百分之一点几。(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.linkedin.com/pulse/demand-ai-talent-2024-2025-global-tech-job-market-analysis-rathi-s82jc%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">LinkedIn</a>)</p><p
                                  data-pid="Nk_O1R94">换句话说：<br/><b>方向是对的，但入口会越来越挤，混得好不好，跟你是不是对口的那种人、大学四年怎么玩，关系会非常大。</b></p><hr/><h3>先说现实：这个专业大方向不会错，但也没那么香到随便挑</h3><p
                                  data-pid="rnODok9o">几个硬事实简单说一下：</p><ul><li
                                  data-pid="MhEfqobP">全球范围内，现在确实是<b>AI
                                  人才短缺</b>，有机构估算是3.2 : 1 的缺口，有岗位挂着几个月招不到合适的人。(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.secondtalent.com/resources/global-ai-talent-shortage-statistics/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">Second
                                  Talent</a>)</li><li
                                  data-pid="7dpStI4G">中国这边，AI
                                  相关岗位工资整体高于普通开发岗，很多公司单独开出了AI 算法、AI 平台、AI
                                  教育等职位；也出现了 AI 培训师、AI
                                  教育讲师这种新工种，招聘数量一年内翻倍，薪资普遍在一万五以上起跳。(<a
                                  href="https://link.zhihu.com/?target=https%3A//english.news.cn/20250331/ed464505335446c4805cc145bb3762e9/c.html%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">新华网</a>)</li><li
                                  data-pid="SQArvm2h">大学里，AI 相关专业这几年疯狂扩招，有的学校 AI
                                  方向的就业率能做到 97%
                                  左右，很多学生继续读研读博，或者进国企、大厂做智能相关业务。(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.chinadailyhk.com/hk/article/613200%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow
                                  noreferrer">chinadailyhk</a>)</li></ul><p
                                  data-pid="uHen8w4G">但同时，世界经济论坛那份报告也说了：未来五年里，大概
                                  23% 的工作岗位会发生变化，AI 一边在创造新岗位，一边在加速淘汰老岗位(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.weforum.org/stories/2023/05/future-of-jobs-in-the-age-of-ai-sustainability-and-deglobalization/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">World Economic
                                  Forum</a>)。<br/>也就是说：<b>这是一个整体机会增加，但个人不一定安全的时代。</b></p><p
                                  data-pid="q6d0sZhE">所以你问这个专业前景如何，更准确的说法是：</p><blockquote
                                  data-pid="hPkh7TbP"><b>前景取决于你能不能把 AI
                                  这套东西，变成你自己的能力，而不是毕业证上的几个字。</b></blockquote><hr/><h3>什么样的人适合读
                                  AI？</h3><p
                                  data-pid="EikS4ykx">别被人工智能这四个字吓到，它底下其实有好几种完全不一样的路子。<br/>不同性格、不同兴趣的人，顺应方式不太一样。</p><ul><li
                                  data-pid="ORLXIbjv"><b>如果你是那种解题带点兴奋、对原理好奇的人</b></li></ul><p
                                  data-pid="8xnTOs9C">你看到一道难题会想这怎么做到的，喜欢搞清楚为什么可以这么算，而不止是能过就行，<br/>那你很适合往<b>算法
                                  / 研究 / 模型</b>这边靠。</p><p
                                  data-pid="7SdDnBb6">大学里可以多花时间打牢这几块：数学基础（高数、线代、概率），机器学习基础课、算法课。<br/>后面如果愿意读研读博，可以去啃更深的理论或做前沿模型。</p><p
                                  data-pid="kzBa4aWI">这条线会比较硬核，但如果你真喜欢拆机器看结构，会觉得挺爽。</p><ul><li
                                  data-pid="O-OwhyGT"><b>如果你更享受把东西做出来给人用，而不是证明它多优雅</b></li></ul><p
                                  data-pid="HG5MkJjM">你对函数怎么收敛没那么兴奋，但对，我做了个小系统，别人真在用，这件事很有成就感，<br/>那你更适合走<b>工程
                                  / 应用开发</b>这条路。</p><p data-pid="fe3CwY1b">AI
                                  专业一样能走这条：</p><ul><li
                                  data-pid="cq-DvpnJ">学好一门主语言（Python /
                                  C++）、数据结构、操作系统、计算机网络这些基础；</li><li
                                  data-pid="Poc4KWiI">把深度学习框架（PyTorch
                                  之类）玩熟，多做项目、多参加比赛、多写一点真的能跑的东西；</li><li
                                  data-pid="yZCpCfn2">多去实习，接触公司里的真实场景，把自己练成会把模型搬进业务的人。</li></ul><p
                                  data-pid="kqlPt9Np">这条路对数学要求没那么学术，但对动手能力、工程习惯、沟通能力要求更高。</p><ul><li
                                  data-pid="OisXjSr7"><b>如果你对“技术 +
                                  某个行业”更感兴趣，比如医疗、金融、教育、艺术</b></li></ul><p
                                  data-pid="Gm4RJp97">你可能对算法细节没多大兴趣，但特别喜欢某个领域，想搞AI+X：<br/>AI+医疗影像、AI+教育、AI+金融风控、AI+内容创作……</p><p
                                  data-pid="ypBpNmAT">那你可以把 AI
                                  专业当成一个底座：</p><ul><li
                                  data-pid="6I7HNEp0">数学和编程学到够用的程度，</li><li
                                  data-pid="DSqM4Tvs">同时尽早选定一个你真的感兴趣的行业，去修那边的课、找那边的实习。</li></ul><p
                                  data-pid="WreZyKue">现在很多报告都在说：<b>企业最缺的是懂业务又懂一点
                                  AI 的翻译型人才。</b>(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.linkedin.com/top-content/artificial-intelligence/skills-for-the-ai-workforce/top-emerging-careers-in-artificial-intelligence/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow
                                  noreferrer">LinkedIn</a>)<br/>这类人的工作不一定天天调模型，但在把
                                  AI 落地、改造流程、设计产品这块非常重要。</p><p
                                  data-pid="_dLJ4XU4">所以，什么样的人适合 AI
                                  专业，不是只有一个答案。<br/>更关键的是，你有没有哪怕一点点：</p><blockquote
                                  data-pid="_qRB6bOK">对用技术改变点什么，这个方向的兴趣，<br/>愿不愿意接受，几年就要学一批新东西的生活方式。</blockquote><p
                                  data-pid="dSWtS2rt">如果这两点你都非常抗拒，那 AI
                                  再热门，可能也不是你的菜。</p><hr/><h3>如果你决定选 AI
                                  专业，大学四年怎么顺势而为</h3><p
                                  data-pid="_hUZR3q6">不列清单，就说几个最实用的方向感。</p><ul><li
                                  data-pid="NqiSSo_A"><b>先把底座打牢：数学 + 编程 +
                                  英语</b></li></ul><p
                                  data-pid="Pjwg2vm_">不管你偏工程还是偏算法，这三样都躲不过去。<br/>AI
                                  岗位的招聘里，现在几乎都在强调数学基础和编程能力，不少还写明熟悉线代和概率。(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.weforum.org/publications/the-future-of-jobs-report-2023/digest/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">World Economic
                                  Forum</a>)</p><ul><li
                                  data-pid="CFm_CcCB">数学，不是要你去研究测度论，而是：看到损失函数、梯度、概率模型的时候不会一脸懵。</li><li
                                  data-pid="XJ00-u5e">编程，要熟到可以自己从零搭一个小项目，而不是照着博客拼凑跑通一次就完事。</li><li
                                  data-pid="fR-TxL5b">英语，至少要能读懂英文文档和论文的摘要，否则你永远慢半拍。</li></ul><p
                                  class="ztext-empty-paragraph"><br/></p><ul><li
                                  data-pid="lYxKIvp6"><b>越早做东西、越早接触真实需求越好</b></li></ul><p
                                  data-pid="YFVZ4Ueu">AI
                                  最大的坑之一，就是只会在课上推公式、不敢下手做项目。<br/>现在招聘看重的，越来越是你做过什么真的东西，而不是修过几门课。(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.linkedin.com/pulse/demand-ai-talent-2024-2025-global-tech-job-market-analysis-rathi-s82jc%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">LinkedIn</a>)</p><p
                                  data-pid="RaM1wWcc">可以从很小的东西开始：<br/>写个帮自己处理数据的小脚本、做个简单的推荐系统
                                  demo、做个小聊天机器人，<br/>甚至帮身边师兄师姐写一点数据清洗、可视化脚本，<br/>这些都比空想我要做有用得多。</p><ul><li
                                  data-pid="lXQX8QIZ"><b>别把找工作当成毕业前一年的事</b></li></ul><p
                                  data-pid="viL7GEYb">现在很多国家/地区的企业，都在提前为 AI
                                  转型做准备，<br/>2024 年之后，带AI skills的岗位发布量涨得很猛(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.linkedin.com/pulse/demand-ai-talent-2024-2025-global-tech-job-market-analysis-rathi-s82jc%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow
                                  noreferrer">LinkedIn</a>)，<br/>但雇主也同时抱怨：真正能用的人不够。</p><p
                                  data-pid="YLrOoYrG">你大学期间可以尽量早一点：</p><ul><li
                                  data-pid="JP39ree7">去实习，哪怕一开始只是做测试、打杂，也能感受到真实工程环境；</li><li
                                  data-pid="DhtcPiQ5">参加一些靠谱的比赛或开源项目，积累可展示的成果；</li><li
                                  data-pid="894_sIpz">跟老师或学长学姐混一点项目经验（不全是科研，工程类也可以）。</li></ul><p
                                  data-pid="s1K1NIqS">到大三大四的时候，你就不是空白简历拿 AI
                                  专业去硬撞，而是已经有了一些能放到简历上的具体东西。</p><hr/><h3>最后我想说一句，AI
                                  专业更像放大器，不是万能钥匙</h3><p
                                  data-pid="2iz5XXmQ">很多人担心：</p><p
                                  data-pid="HObVUCk0">会不会毕业的时候，这波 AI
                                  热度过去了？<br/></p><p
                                  data-pid="J7UI-D80">坦白说，热度肯定会有起伏，但大趋势不太会反转。<br/>企业已经在实打实地投入
                                  AI，招聘里面写需要 AI 技能的岗位增速远超整体职位(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.linkedin.com/pulse/demand-ai-talent-2024-2025-global-tech-job-market-analysis-rathi-s82jc%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow
                                  noreferrer">LinkedIn</a>)，<br/>中国这边 AI
                                  相关岗位的招聘量和薪资也都是真涨，不是 PPT 里的口号。(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.globalneighbours.org/chinas-ai-jobs-boom-while-top-graduates-take-fallback-roles/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">Global
                                  Neighbours</a>)</p><p
                                  data-pid="UhQwJHe8">真正决定你未来感受的是：</p><ul><li
                                  data-pid="EuYyYjXq">你愿不愿意接受这一行就是要一直学的设定；</li><li
                                  data-pid="lKIUd7Zq">你能不能把AI 专业，变成AI +
                                  某个你真的关心的方向；</li><li
                                  data-pid="6gF2kIOs">你是不是在大学四年里，真的动手走完了从“听课 →
                                  做小项目 → 做复杂项目 / 实习”的那条路。</li></ul><p
                                  data-pid="TCaa0O6F">如果你只是冲着热门和高薪预期去选，<br/>AI
                                  专业会非常诚实地把卷和不稳定，原样奉还给你。</p><p
                                  data-pid="7UJDLnRD">如果你本身就对这玩意儿有点兴趣，愿意把它当成工具箱，<br/>那它就很有可能变成你未来十几年里，帮你打开很多门的一把钥匙——<br/>不是万能钥匙，但比空手敲门，机会多很多。</p><p
                                  data-pid="UEr8KgSG"><b>我是小祥，祝你迷路喵~</b></p><hr/><p
                                  data-pid="BYrmY6OB">参考文献：</p><p
                                  data-pid="hcpgVqhd">[1] World Economic Forum,
                                  <i>The Future of Jobs Report 2023</i>, Apr 30,
                                  2023.（指出未来五年约 23% 的岗位将发生变化，AI
                                  和机器学习专家位列增长最快职位之首。）(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.weforum.org/publications/the-future-of-jobs-report-2023/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">World Economic
                                  Forum</a>)</p><p data-pid="D_6oak8c">[2]
                                  LinkedIn / Rathi S., “Demand for AI Talent
                                  2024–2025: Global Tech Job Market Analysis”,
                                  2024.（统计显示，自 2022 年以来全球 AI 职位发布量增长约 68%，2024
                                  年要求 AI 技能的岗位同比增长 61%，远高于整体职位约 1.4% 的增速。）(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.linkedin.com/pulse/demand-ai-talent-2024-2025-global-tech-job-market-analysis-rathi-s82jc%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">LinkedIn</a>)</p><p
                                  data-pid="l2BjfZVv">[3] SecondTalent, “Global
                                  AI Talent Shortage Statistics 2025”, Sep 16,
                                  2025.（估计全球 AI 人才需求与供给比约为 3.2:1，AI
                                  岗位薪资较传统软件岗位高出约 67%。）(<a
                                  href="https://link.zhihu.com/?target=https%3A//www.secondtalent.com/resources/global-ai-talent-shortage-statistics/%3Futm_source%3Dchatgpt.com"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">Second
                                  Talent</a>)</p><p data-pid="xG_3wsJw">[4]
                                  China Daily, “Chinese universities rush to
                                  offer AI majors”, Jun 3, 2025.（报道中国某工科大学 AI
