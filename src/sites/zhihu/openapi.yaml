                                    type: string
                                    enum:
                                      - 「不能，乔哥。不能凭借相的圆满观见如来。」
                                      - 「应透过相那非相的本质来照见真理。」
                                      - 作为特色文学作品，我其实很欣赏这种改刀，毕竟有梵本兜底，对勘起来别有一番趣味。但各位可以想见：这给古今大量普通修行者带来了可怕的脑力负担，而且往往带着一种「用一辈子去体悟译师习惯甚至疏漏」的滑稽。
                                      - 可惜，缺少连词的古汉语在语境消失后，多义性会爆炸增长。而那个语境距离我们已有1600多年。
                                      - 和部分人对印度源流佛经的理解不同，三哥文学就算有时候没有逻辑，也一定会想办法给你尽力扯清楚，带着某种知不可为而为之的悲壮。相比之下，鸠摩罗什时期的中土文学远比三哥喜欢「言语道断」。
                                      - 在《金刚经》鸠摩罗什译本里，如果看到逼格很高但读不懂的内容，那一般是罗什改刀了；而如果看到经文逻辑有奇怪的断层，那一般是梵本写崩了，罗什试图修复但还是露了马脚。两种情况都不少见。
                                      - 这是个穷举。
