                                  data-pid="ubRu02cc">这套逻辑的核心其实就是Gemini
                                  CLI/Claude Code/Qwen Code 这类的AI
                                  Agent工具负责搞整体工作，然后Trae/Cursor这类的工具负责审核整体工作，以及做出局部性的修改。</p><p
                                  data-pid="yX7QiQZe">整体的逻辑并不复杂，只不过很依赖你的指令明确性以及本身的编程经验，不过对于不是特别负责的程序来说，能描述清楚需求的普通人也能用的不错。</p><p
                                  data-pid="NM6joWbk">以下组合可以根据自己的财力按需选择。</p><h2>国外可访问选手+氪金</h2><p
                                  data-pid="KSiMsYHY">Cursor Claude-4-sonnet +
                                  Claude
                                  Code：这是最优选择，当然也是最贵的，这俩都得付费，前者20美元，后者我记得最初级的也得20美元，次数上去了的话，估计一个月得小100刀，土豪玩家随意。</p><p
                                  data-pid="hHnok1tm">Cursor Claude-4-sonnet +
                                  Google
                                  CLI:次优，前者20美元一个月，后者我相信你可以在某鱼啥的搞到一个学生账号，验证后有一年的Pro，算是免费的。</p><p
                                  data-pid="RJ7acOaq">上面这两个的前提是你能够正常的使用ChatGPT，否则你有钱也花不出去。</p><h2>国内无障碍访问
                                  + 免费</h2><p
                                  data-pid="OmiNKpbH">但是鉴于大部分只能用国内的软件，我建议用这套纯免费的，一般的小项目也差不多了，就是Trae+Qwen
                                  Code的打法。</p><p
                                  data-pid="Ihnd4Fgy">Trae的话，你就用免费的Doubao模型，或者DeepSeek也是不错的，对于短的代码片段能力没问题的，做个代码解释什么的也可以。</p><p
                                  data-pid="8Dq7scLJ">Trae的国内版本链接：<a
                                  href="https://link.zhihu.com/?target=https%3A//www.trae.cn/"
                                  class=" wrap external" target="_blank"
                                  rel="nofollow noreferrer">The Real AI
                                  Engineer</a></p><p data-pid="dR5BCE8e">Qwen
                                  Code，它其实是用的Gemini的壳，大多数的功能是一样的，它的好处是免费额度足够，</p><p
                                  data-pid="jAo9p6FP">Qwen Code链接：<a
                                  href="https://link.zhihu.com/?target=https%3A//github.com/QwenLM/qwen-code"
                                  class=" external" target="_blank"
                                  rel="nofollow noreferrer"><span
                                  class="invisible">https://</span><span
                                  class="visible">github.com/QwenLM/qwen-</span><span
                                  class="invisible">code</span><span
                                  class="ellipsis"></span></a></p><p
                                  data-pid="p5r1_OIk">国内用户每天2000次的API调用次数，非常足够你用了。</p><figure
                                  data-size="normal"><noscript><img
                                  src="https://pica.zhimg.com/50/v2-4ff58eb9a15499a66092ccdb88d733b1_720w.jpg?source=1def8aca"
