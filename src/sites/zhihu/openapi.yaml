                                                - "2019930790151102944"
                                            type:
                                              type: string
                                              enum:
                                                - answer
                                            excerpt:
                                              type: string
                                              enum:
                                                - 声明：该回答不适合计算机、自动化、人工智能相关专业人群阅读，请你划走。 1.低学历或者没有学历的抗AI的工作如下：汽修工、水电工、燃气排水管道维修工、消防救援员、船舶轮机维修技师、电梯维保技师、...
                                                - 情况远比大家想的要恶劣。 AI正在驯化公司高层与底层用户。 例如，原本他们要求一个90分的结果，然后AI之前的生产力工具可以做到40分，需要员工付出努力提升到90分。 然后，现在AI可以做到70...
                                                - 现在的人工智能其实已经发展到了完全智能体的阶段。 现在大部人接触到的人工智能主要是智能推荐、智能搜索和问答、人脸和语音识别、自动驾驶、扫地机器人、工业自动化机器人、各专业的人工智能、用于军事的无...
                                            url:
                                              type: string
                                              format: uri
                                            voteup_count:
