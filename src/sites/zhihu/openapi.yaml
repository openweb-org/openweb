                                            comment_count:
                                              type: integer
                                            favorites_count:
                                              type: integer
                                            created_time:
                                              type: integer
                                            updated_time:
                                              type: integer
                                            content:
                                              type: string
                                              enum:
                                                - <p data-pid="4Qmuih5d">现在的人工智能其实已经发展到了完全智能体的阶段。</p><p data-pid="375QEUkh">现在大部人接触到的人工智能主要是智能推荐、智能搜索和问答、人脸和语音识别、自动驾驶、扫地机器人、工业自动化机器人、各专业的人工智能、用于军事的无人机等。感觉这些东西似乎和真正的人工智能体，或者想象中的“机器人”还有一定距离。其实对于这类用于完成指定任务的人工智能系统，只要使它们拥有丰富的传感器来感受周围的环境，让它们有动力驱动自己，给与它们“利己”的底层逻辑，再附加一些类似人类多巴胺系统的奖励机制和一些报警机制，它们就能变成：有独立行为逻辑、自主活动的 <b>活的人工智能体。</b>它们能够扩展自己，做一些对自己有利的事，能够给自己充电或者替换能源单元、升级自己的系统、也具备对外的攻击能力。能够彼此交流也能听懂人类的语言。</p><p data-pid="zeqrMRu3">这样的人工智能体现在已经能够做出来，区别只在于是否有人去干这件危险的事，是否有人去赋予它们这些逻辑、能力和自由，剩下的只是做的有多强的问题。</p><p data-pid="RAz8MDwc">在我看来人工智能发展到能够处理模糊的问题，就已经跨过了成为真正智能体的边界，它和明确的、处理具体问题的计算机程序已经不同。</p><p data-pid="f4JadM6n">1950年计算机先驱 —— 图灵，提出判断机器是否具有智能的“图灵测试”，就是通过文本对话，来测试人们能否比较准确的区分开被测的机器和人。</p><p data-pid="pqRLQXv6">现在，在事先未知的情况下，你还能简单的区分开人和聊天机器人吗？</p><p data-pid="nObupEHh">在未来战争和国内矛盾的影响下，各种强大的、能够独立行动的人工智能体，或许就会出现在残酷战场上、内部维稳的冲突中。一旦强大的人工智能体得到大量、广泛的应用，人类的安全，和在生产生活中的优势将被极大削弱。广大的普通人和底层人民的生活将受到极大侵害。</p><p data-pid="QxO_aD-5">想想俄乌战场上普通士兵面对无人机的绝望，想想各处都在应用的大模型和人脸识别、遍布各处的摄像头，以及当今惨淡的就业形势，想象一下未来，不禁生出阵阵恐怖。</p><p data-pid="JyKnSecx">而以现在各大国，竭力发展自己人工智能技术的态度，和民间、商业界唯利是图、趋之若鹜的姿态，发展出强大的<b>活的人工智能体</b>或许已经不太远。</p><p data-pid="j7bXthUE">如果不尽快限制人工智能的发展，规范人工智能的应用方向，人工智能带来的灾难或许已经不远了。</p>
                                                - <p data-pid="R-6ZjC83">情况远比大家想的要恶劣。</p><p data-pid="iglxfWs5">AI正在驯化公司高层与底层用户。</p><p data-pid="TvaZTccG">例如，原本他们要求一个90分的结果，然后AI之前的生产力工具可以做到40分，需要员工付出努力提升到90分。</p><p data-pid="bkmdKiVy">然后，现在AI可以做到70分，某些员工就觉得最后20分必须自己来，就觉得不会失业。</p><p data-pid="Hz5iAc1f">但是，公司高层与底层用户已经逐渐觉得，以AI的廉价、快速、海量产出，做到70分甚至60分就足够了 —— 这就是AI以其超强的工业属性碾压了工匠属性。</p><p class="ztext-empty-paragraph"><br/></p><p data-pid="6npMwHZs">所以，并不是说你精雕细琢的结果可以比AI好一点，你就能保住岗位。</p><p data-pid="icZk7G2e">大街小巷的劣质AI海报已经说明了这一点。</p><p data-pid="5GCfZ4ZG">某些大公司里的中层也已经习惯于使用“点击即出”的AI分析报告来做决策了，而不是之前那种找分析师团队“古法手搓”的报告。</p><p class="ztext-empty-paragraph"><br/></p><p data-pid="7H5VOcKs">这种事情其实一直在不停发生，很多我们儿时的小吃早就再也吃不到本体了，其中某些过于繁琐的原料或者工艺，早就被暗中替换为了廉价、快速可获得的工业品。也许有人会觉得遗憾，但这个趋势完全不可逆转。</p>
                                                - <p data-pid="xOGXGrHD"><b>声明：该回答不适合计算机、自动化、人工智能相关专业人群阅读，请你划走</b>。</p><p data-pid="Pm05aThG"><b>1.低学历或者没有学历的抗AI的工作如下</b>：</p><p data-pid="YYLafFYc">汽修工、水电工、燃气排水管道维修工、消防救援员、船舶轮机维修技师、电梯维保技师、机械机器设备装配工、精密模具钳工、铁路检修工、远洋水产捕捞工、家庭厂房保洁、游泳教练、健身教练、职业运动员、打金技工、瓦工、木工、救生员</p><p data-pid="Gaj__eN-">家政保姆：这个有意思了，大家最希望想要这种类型的机器人，但有意思的在哪呢？就拿吃这方面来说，为什么你会认为有钱人天天吃【炒】的饭菜呢？焖、炖、焗、蒸、水煮的都不吃了？让你煎条金丝鱼酥脆酥脆的口感都做不出来？让你把肉焯水煲个汤也不行？你就只会一锅熟是吧？你也好意思说替代？有钱人缺那两个工钱吗？家大业大，一个厨房都占地不小了，会缺那两个工钱？没钱的人，你家里放得下机器人吗？够地方让它移动不？你硬说替代的话，那就放在中产家庭可能会有一定需求，还不如叫个钟点工叫过来打扫一下卫生，你控制机器人打扫卫生收拾房子。</p><p data-pid="JlvENyWY">保镖型保安（非巡逻监控型保安，抱歉，我不认为上面会允许那种全自动<b>强战斗型</b>AI机器人在我们这里市场出现和售卖，你说那种表演娱乐机器人就算了，我一凳子砸过去它能扛得住吗？站得稳吗？你说的那种强战斗型机器人刀枪不入，钢铁身躯，子弹打不进，它一拳挥过来你不倒在地上抽搐？这比持枪的人类歹徒还厉害数倍，你认为上面会允许它在我们这里市场上出现和售卖，你也是厉害）</p><p data-pid="rRT1jwEZ">有独家秘方的厨师（快餐店那类厨师就算了，你没看到满大街的快餐店过段时间就换一批么，那种自己一个小门店特色老字号开了几十年的还在那，问老板愿意卖配方吗？【不卖】。网上公开的厨艺谁不能学，无非就是多尝试几遍就做出来了，没秘方的、不公开的你做不出来，这种菜尝尝味道就知道怎么做你也是个人才了，【食神】头衔是你的了），我认为没有秘方的厨师跟在工厂流水线上普工没有什么区别。</p><p data-pid="eiM_6Dh9">理发师：现在也有AI理发机器了，你可以选择任何发型，至于AI理发机剪得好不好看就是另一回事了。你解释一下【不要剪太短】这个不要剪太短是什么意思？【右边稍微修一下就行】【我发际线有点高】【我想做锡纸烫】【大波浪】所以要怎么剪。你剪得好看就很多回头客，你剪得不好看，客户下次再也不来了，这个工作特殊在抽象审美能力，师傅自嗨觉得好看不算，客户自己评价好看才是真的好看。有人反驳说先生成效果图，3D效果图，你都会说图片了，不好意思，【图片仅供参考】，看的效果和剪出来实际结果不一样的时候你别哭着出理发店就行，看你下次还敢去剪不。国外的那个AI理发机是怎么样的呢？你把头伸进去，选择发型，固定发型，没有额外的修剪的，你硬是要犟嘴说超级无敌AI跟人一样给你剪个头发的话，这种程度AI，除了身体材料零件和人类不一样外，跟人有什么区别？它都已经智能到和人类无异了甚至超人类了，你还有什么存在的价值么？你以为发型就寸头和光头这两个发型吗？女生也剪这两个发型得了呗。</p><p data-pid="XOyMpEdf"><b>2.一般（非绝对）要求本科学历或本科以上的抗AI的工作</b>：</p><p data-pid="yJVQ4vw6">法官、律师：难的是证据博弈、庭审策略、风险承担、谈判心理战，大律能将曲的给你掰直，黑的也能给你说白，AI就做不到，按你说能取代的话AI先打的过必胜客再说吧。律师这个职业的赚钱模式受到AI重创，律师的咨询、拟订合同、法律检索、文书、查案等知识类性质盈利板块被AI创翻，国内用户行为习惯是喜欢白嫖，直接问AI，除非是【没把握、没招了、不懂打官司、省时间】的情况下用户才会找律师。还有就是容易被人忽略的一点，律师的战略决策与信任：高风险决策、责任承担、客户信赖（AI不能执业）。</p><p data-pid="c_qagR1t"><b>现在几乎所有【强依赖计算机电脑工作的职业】对新手、初级、助理助手这类岗位非常不友好，【不强依赖计算机电脑工作，但在现实物理世界中高度重复、有标准动作、标准流程进行的工作】也不例外，比如工厂流水线很多用自动化了、快餐店炒个蛋炒饭什么的。</b></p><p data-pid="mUwq4Q6v">医生：很多病不是“静态图像”和病人描述能确定的，需要体征、触诊、实验室指标、动态观察和影响综合判断的，常见普通疾病你吃点药可能就好了，那我问你骨折或断骨了怎么办？AI机器人帮你做手术接骨？中医正骨怎么说？蛛网膜下腔出血这种情况怎么办？脑部有寄生虫蠕动蚕食或者细菌病毒感染肝脏这种情况呢？有人反驳说用机械手可以取代医生，血管爆裂大出血的时候你就说不出这种大话了，那个什么中科院用AI技术做的眼球手术还是得有专业医生在旁边看着，你说的眼球手术并不涉及我上述说的情况，请睁大眼睛看清楚那个手术的全过程，ok？什么时候不用人看着了再说吧，如果真的智能到你说的这种外科医生急诊医生可以下岗的程度，ok的，这种智能程度绝对超越寻常人类了，那个时候的技术你认为会服务寻常人，或者说，还有我们寻常人类什么事呢？</p><p data-pid="i5VcSEOr">哥们，有空去医院急诊逛一下，见过撞车后被钢筋穿透身体的患者吗？不是插入，是穿透身体的那种。右手拿着左手的患者。什么时候你说的AI医生能解决这种情况了再说吧。</p><p data-pid="ZdAfi1GF">工业软件现场实施工程师</p><p data-pid="JDrCjFby">嵌入式软件工程师</p><p data-pid="ajFCCUdj">​自动驾驶车载测试工程师</p><p data-pid="efyPnq4t">MES系统实施工程师</p><p data-pid="f2suhYmN">新能源BMS软件工程师</p><p data-pid="Ftmf02iW">机械工程师（纯画图纸的设计不算）</p><p data-pid="vNoBHBYz">自动化工程师</p><p data-pid="q9sND4ml">电气工程师</p><p data-pid="QVTbfjS9">硬件工程师（消费电子、车载、射频、电源、PCB、信号、物联网、安防。。。）</p><p data-pid="VD2iPlVK">FPGA（AI有本事干掉这个试试）</p><p data-pid="SF8GlLZW">这种现场拿电笔焊笔电路板的工作非常扛AI，如果AI能取代这种工作的话（我说的是这类岗位直接消失，而不是仅仅提高工作效率），那就看下面的：</p><p data-pid="PQywxcYs">海外销售</p><p data-pid="9_ubO0dP">海外采购员</p><p data-pid="dBmgTwiR">医美顾问、整容医生、护士</p><p data-pid="xuRYyD5r">兽医、宠物医生</p><p data-pid="EjFDpSOT">康复治疗师</p><p data-pid="WvwqxJay">精密仪器研发</p><p data-pid="3RFP0Z5G">集成电路IC设计、半导体器件工程师</p><p data-pid="oxr-lHIF">现场技术支持（比如做车载电子的）</p><p data-pid="ngmadwBM">数据中心机房交付顾问</p><p data-pid="j8qHprk6">商务谈判</p><p data-pid="3NEJbO14">招商经理</p><p data-pid="bUmGpMZT">进口清关现场商务专员</p><p data-pid="yHPK4RoZ">线下渠道拓展</p><p data-pid="nbWH0Ual">生鲜供应链选品专员</p><p data-pid="5t0_I0jV">线下销售类（含上门访客）</p><p data-pid="8sZrMif-">AI研发</p><p data-pid="qN308Uwt">AI机器人运维（说白了就是修机器人的）</p><p data-pid="ZEjfJbEf">上面是我目前了解过的，因为我之前也在想题主问的这个问题，于是专门去了解过这些职业被AI替代的可能性，不要看网上营销号怎么说，你要实际去接触去看看，有些工作并不是你想或者网上说的那样（拿程序员来说吧，实际上程序员日常上班写代码的时间很少的，上午回去摸鱼、水群、开会讨论方案，中午吃饭休息，下午上github或者论坛看看有没有能抄的，然后调试、扯皮、问AI，然后写代码，动手敲键盘写代码的时间有两个小时都算多了，所以AI对入门、初级、中级程序员的影响确实是非常大的，90%的程序员写的代码也是在网上抄的，AI太擅长检索了，高级程序员的需求依旧持续稀缺），如果大家还有补充的话，欢迎在评论区留言哦。</p><p data-pid="NGg4mxKw"><b>你说AI机器人能替代我上面说的【全部】职业的话，我建议你去实际接触一下你说被替代的那个工作的人，去看看那个人日常上班是在干什么？会遇到哪些问题？比如FPGA、车载硬件工程师、照顾卧床不起老人的护士、急诊医生、游泳教练、救生员，而不是【你说的这些会被人形机器人替代】，是个人都知道肯定能替代，只是时间问题，可问题是题主问的问题的核心痛点是什么？就是想问有没有什么工作在几十年之内难以被AI直接取代，连FPGA、游泳教练、有秘方的厨师、急诊医生、照顾卧床不起老人的护士、水电工都能被替代的话，结局无非就是两种情况：</b></p><p data-pid="9Tbv57Jo"><b>要么全人类得到释放，物质充足，每天开心活着想干什么干什么→但地球空间有限，人口自然增长率飙升，又会带来什么问题？值得思考</b></p><p data-pid="PV7WO_aO"><b>要么清除，仅留下少数掌握AI机器人命脉的人。</b></p><p data-pid="YUoGEuvZ"><b>补三个岗位，很nice的：注册会计、土木工程项目经理、建筑结构工程师。</b></p>
