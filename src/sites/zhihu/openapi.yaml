    get:
      operationId: getUserAnswers
      summary: Get a user's answer list — question titles, answer excerpts, vote counts, timestamps
      x-openweb:
        permission: read
        build:
          stable_id: zhihu0003
          tool_version: 1
          verified: true
          signals:
            - status-match
      parameters:
        - name: url_token
          in: path
          required: true
          schema:
            type: string
          description: User URL token.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Pagination offset.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Results per page.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: created
          description: "Sort order: created, voteups."
        - name: include
          in: query
          required: false
          schema:
            type: string
            default: "data[*].is_normal,admin_closed_comment,reward_info,is_collapsed,annotation_action,annotation_detail,collapse_reason,collapsed_by,suggest_edit,comment_count,can_comment,content,voteup_count,reshipment_settings,comment_permission,mark_infos,created_time,updated_time,review_info,excerpt,is_labeled,label_info,relationship.is_authorized,voting,is_author,is_thanked,is_nothelp,is_recognized;data[*].author.badge[?(type=best_answerer)].topics;data[*].question.has_publishing_draft,relationship"
