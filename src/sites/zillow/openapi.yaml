  /homedetails/{slug}/{zpid}:
    get:
      operationId: getPropertyDetail
      summary: >-
        Get full property details — address, price, beds, baths, sqft, photos,
        description, Zestimate, tax history, days on Zillow
      x-openweb:
        permission: read
        build:
          stable_id: zw_detail_v1
          tool_version: 2
          verified: true
          signals:
            - page-verified
        extraction:
          type: page_global_data
          page_url: https://www.zillow.com/homedetails/{slug}/{zpid}_zpid/
          expression: |
            (() => {
              const el = document.querySelector('script#__NEXT_DATA__');
              if (!el || !el.textContent) return null;
              const nextData = JSON.parse(el.textContent);
              const cp = nextData?.props?.pageProps?.componentProps;
              if (!cp?.gdpClientCache) return null;
              const cache = JSON.parse(cp.gdpClientCache);
              let p = null;
              for (const v of Object.values(cache)) {
                if (v && v.property) { p = v.property; break; }
              }
              if (!p) return null;
              const addr = p.address || null;
              const resoFacts = p.resoFacts || {};
              const taxFirst = Array.isArray(p.taxHistory) ? p.taxHistory[0] : null;
              const photoSource =
                (Array.isArray(p.responsivePhotos) && p.responsivePhotos.length > 0 && p.responsivePhotos) ||
                (Array.isArray(p.compsCarouselPropertyPhotos) && p.compsCarouselPropertyPhotos.length > 0 && p.compsCarouselPropertyPhotos) ||
                (Array.isArray(p.thumb) && p.thumb) ||
                [];
              const photos = photoSource.slice(0, 10).map((ph) => {
                const ms = ph.mixedSources ?? {};
                const jpegs = ms.jpeg ?? ms.webp ?? [];
                if (Array.isArray(jpegs) && jpegs.length > 0) {
                  const best = jpegs.reduce((a, b) => ((b.width ?? 0) > (a.width ?? 0) ? b : a));
                  return best.url ?? null;
                }
                return typeof ph === 'string' ? ph : (ph.url ?? null);
              });
              return {
                zpid: p.zpid ?? null,
                address: addr ? {
                  streetAddress: addr.streetAddress ?? null,
                  city: addr.city ?? null,
                  state: addr.state ?? null,
                  zipcode: addr.zipcode ?? null,
                } : null,
                price: p.price ?? null,
                bedrooms: p.bedrooms ?? resoFacts.bedrooms ?? null,
                bathrooms: p.bathrooms ?? resoFacts.bathrooms ?? null,
                livingArea: p.livingAreaValue ?? resoFacts.livingArea ?? null,
                livingAreaUnits: p.livingAreaUnitsShort ?? p.livingAreaUnits ?? 'sqft',
                lotSize: p.lotAreaValue ?? resoFacts.lotSize ?? null,
                homeType: p.homeType ?? null,
                homeStatus: p.homeStatus ?? null,
                yearBuilt: resoFacts.yearBuilt ?? null,
                description: p.description ? p.description.slice(0, 500) : null,
                zestimate: p.zestimate ?? null,
                rentZestimate: p.rentZestimate ?? null,
                taxAssessedValue: (taxFirst && taxFirst.value) ?? null,
                daysOnZillow: p.daysOnZillow ?? null,
                pageViewCount: null,
                favoriteCount: null,
                photos,
                url: 'https://www.zillow.com' + (p.hdpUrl || ('/homedetails/_/' + p.zpid + '_zpid/')),
              };
            })()
      parameters:
        - name: zpid
          in: path
          required: true
          schema:
            type: string
          description: Zillow Property ID (numeric string, e.g. "2077416986")
          example: "15076238"
        - name: slug
          in: path
          required: true
          schema:
            type: string
            default: _
          description: URL slug (e.g. "123-Main-St-Seattle-WA-98101"). Use "_" if unknown.
          example: 1000-Fell-St-San-Francisco-CA-94117
      responses:
        "200":
          description: Property details extracted from __NEXT_DATA__.
          content:
            application/json:
              schema:
                type: [object, "null"]
                required: [zpid]
                properties:
                  zpid:
                    type: [integer, "null"]
                    description: Zillow property ID
                  address:
                    type: [object, "null"]
                    description: Structured property address.
                    properties:
                      streetAddress:
                        type: [string, "null"]
                        description: Street address line.
                      city:
                        type: [string, "null"]
                        description: City name.
                      state:
                        type: [string, "null"]
                        description: State abbreviation.
                      zipcode:
                        type: [string, "null"]
                        description: ZIP code.
                  price:
                    type: [integer, "null"]
                    description: Current listing or last sold price
                  bedrooms:
                    type: [integer, "null"]
                    description: Number of bedrooms.
                  bathrooms:
                    type: [number, "null"]
                    description: Number of bathrooms (may be fractional, e.g. 2.5).
                  livingArea:
                    type: [integer, "null"]
                    description: Living area in sqft
                  livingAreaUnits:
                    type: [string, "null"]
                    description: Unit of measurement for living area (typically "Square Feet").
                  lotSize:
                    type: [number, "null"]
                    description: Lot size in sqft.
                  homeType:
                    type: [string, "null"]
                    description: "SINGLE_FAMILY, CONDO, TOWNHOUSE, MULTI_FAMILY, etc."
                  homeStatus:
                    type: [string, "null"]
                    description: "FOR_SALE, RECENTLY_SOLD, etc."
                  yearBuilt:
                    type: [integer, "null"]
                    description: Year the property was built.
                  description:
                    type: [string, "null"]
                    description: Property listing description (truncated to 500 chars)
                  zestimate:
                    type: [integer, "null"]
                    description: Zillow estimated home value
                  rentZestimate:
                    type: [integer, "null"]
                    description: Zillow estimated rental value
                  taxAssessedValue:
                    type: [integer, "null"]
                    description: Tax-assessed property value.
                  daysOnZillow:
                    type: [integer, "null"]
                    description: Number of days the listing has been on Zillow.
                  pageViewCount:
                    type: [integer, "null"]
                    description: Number of page views for this listing.
                  favoriteCount:
                    type: [integer, "null"]
                    description: Number of times this listing was favorited.
                  photos:
                    type: [array, "null"]
                    description: Up to 10 photo URLs (highest resolution available).
                    items:
                      type: [string, "null"]
                      description: Photo URL string.
                  url:
                    type: [string, "null"]
                    description: Canonical Zillow property URL
  /zestimate/{slug}/{zpid}:
    get:
      operationId: getZestimate
      summary: >-
        Get Zillow's home value estimate (Zestimate) — current value, rent
        estimate, confidence range, tax assessment, recent history
      x-openweb:
        permission: read
        build:
          stable_id: zw_zestimate_v1
          tool_version: 2
          verified: true
          signals:
            - page-verified
        extraction:
          type: page_global_data
          page_url: https://www.zillow.com/homedetails/{slug}/{zpid}_zpid/
          expression: |
            (() => {
              const el = document.querySelector('script#__NEXT_DATA__');
              if (!el || !el.textContent) return null;
              const nextData = JSON.parse(el.textContent);
              const cp = nextData?.props?.pageProps?.componentProps;
              if (!cp?.gdpClientCache) return null;
              const cache = JSON.parse(cp.gdpClientCache);
              let p = null;
              for (const v of Object.values(cache)) {
                if (v && v.property) { p = v.property; break; }
              }
              if (!p) return null;
              const addr = p.address || null;
              const taxFirst = Array.isArray(p.taxHistory) ? p.taxHistory[0] : null;
              return {
                zpid: p.zpid ?? null,
                address: addr ? {
                  streetAddress: addr.streetAddress ?? null,
                  city: addr.city ?? null,
                  state: addr.state ?? null,
                  zipcode: addr.zipcode ?? null,
                } : null,
                zestimate: p.zestimate ?? null,
                rentZestimate: p.rentZestimate ?? null,
                zestimateLowPercent: p.zestimateLowPercent != null ? Number(p.zestimateLowPercent) : null,
                zestimateHighPercent: p.zestimateHighPercent != null ? Number(p.zestimateHighPercent) : null,
                taxAssessedValue: (taxFirst && taxFirst.value) ?? null,
                taxAssessedYear: (taxFirst && taxFirst.time) ? new Date(taxFirst.time).getFullYear() : null,
                price: p.price ?? null,
                homeType: p.homeType ?? null,
                livingArea: p.livingAreaValue ?? null,
                bedrooms: p.bedrooms ?? null,
                bathrooms: p.bathrooms ?? null,
                zestimateHistory: null,
              };
            })()
      parameters:
        - name: zpid
          in: path
          required: true
          schema:
            type: string
          description: Zillow Property ID (numeric string)
          example: "15076238"
        - name: slug
          in: path
          required: true
          schema:
            type: string
            default: _
          description: URL slug. Use "_" if unknown.
          example: 1000-Fell-St-San-Francisco-CA-94117
      responses:
        "200":
          description: Zestimate data with confidence range and history.
          content:
            application/json:
              schema:
                type: [object, "null"]
                required: [zpid]
                properties:
                  zpid:
                    type: [integer, "null"]
                    description: Zillow property ID.
                  address:
                    type: [object, "null"]
                    description: Structured property address.
                    properties:
                      streetAddress:
                        type: [string, "null"]
                        description: Street address line.
                      city:
                        type: [string, "null"]
                        description: City name.
                      state:
                        type: [string, "null"]
                        description: State abbreviation.
                      zipcode:
                        type: [string, "null"]
                        description: ZIP code.
                  zestimate:
                    type: [integer, "null"]
                    description: Current Zestimate value in dollars
                  rentZestimate:
                    type: [integer, "null"]
                    description: Estimated monthly rent
                  zestimateLowPercent:
                    type: [number, "null"]
                    description: Low-end confidence percentage
                  zestimateHighPercent:
                    type: [number, "null"]
                    description: High-end confidence percentage
                  taxAssessedValue:
                    type: [integer, "null"]
                    description: Tax-assessed property value.
                  taxAssessedYear:
                    type: [integer, "null"]
                    description: Year of the tax assessment.
                  price:
                    type: [integer, "null"]
                    description: Current listing price for comparison
                  homeType:
                    type: [string, "null"]
                    description: "SINGLE_FAMILY, CONDO, TOWNHOUSE, MULTI_FAMILY, etc."
                  livingArea:
                    type: [integer, "null"]
                    description: Living area in sqft.
                  bedrooms:
                    type: [integer, "null"]
                    description: Number of bedrooms.
                  bathrooms:
                    type: [number, "null"]
                    description: Number of bathrooms (may be fractional).
                  zestimateHistory:
                    type: [array, "null"]
                    description: Up to 12 recent Zestimate data points
                    items:
                      type: object
                      description: A historical Zestimate data point.
                      required: [date, value]
                      properties:
                        date:
                          type: [string, "null"]
                          description: Date of the Zestimate snapshot.
                        value:
                          type: [number, "null"]
                          description: Zestimate value at that date.
  /neighborhood/{slug}/{zpid}:
    get:
      operationId: getNeighborhood
      summary: >-
        Get neighborhood data — schools, walk/transit/bike scores, nearby homes
      x-openweb:
        permission: read
        build:
          stable_id: zw_neighborhood_v1
          tool_version: 2
          verified: true
          signals:
            - page-verified
        extraction:
          type: page_global_data
          page_url: https://www.zillow.com/homedetails/{slug}/{zpid}_zpid/
          expression: |
            (() => {
              const el = document.querySelector('script#__NEXT_DATA__');
              if (!el || !el.textContent) return null;
              const nextData = JSON.parse(el.textContent);
              const cp = nextData?.props?.pageProps?.componentProps;
              if (!cp?.gdpClientCache) return null;
              const cache = JSON.parse(cp.gdpClientCache);
              let p = null;
              for (const v of Object.values(cache)) {
                if (v && v.property) { p = v.property; break; }
              }
              if (!p) return null;
              const addr = p.address || null;
              const schools = Array.isArray(p.schools) ? p.schools.slice(0, 10).map((s) => ({
                name: s.name ?? null,
                rating: s.rating ?? null,
                level: s.level ?? s.grades ?? null,
                type: s.type ?? null,
                distance: s.distance ?? null,
                link: s.link ?? null,
              })) : null;
              const nearbyHomes = Array.isArray(p.nearbyHomes) ? p.nearbyHomes.slice(0, 10).map((h) => {
                const a = h.address || null;
                return {
                  zpid: h.zpid ?? null,
                  address: (a && a.streetAddress) ?? null,
                  price: h.price ?? null,
                  bedrooms: h.bedrooms ?? null,
                  bathrooms: h.bathrooms ?? null,
                  livingArea: h.livingAreaValue ?? h.livingArea ?? null,
                  homeType: h.homeType ?? null,
                };
              }) : null;
              return {
                zpid: p.zpid ?? null,
                address: addr ? {
                  streetAddress: addr.streetAddress ?? null,
                  city: addr.city ?? null,
                  state: addr.state ?? null,
                  zipcode: addr.zipcode ?? null,
                } : null,
                walkScore: null,
                transitScore: null,
                bikeScore: null,
                schools,
                nearbyHomes,
              };
            })()
      parameters:
        - name: zpid
          in: path
          required: true
          schema:
            type: string
          description: Zillow Property ID (numeric string)
          example: "15076238"
        - name: slug
          in: path
          required: true
          schema:
            type: string
            default: _
          description: URL slug. Use "_" if unknown.
          example: 1000-Fell-St-San-Francisco-CA-94117
      responses:
        "200":
          description: Neighborhood data with scores, schools, and nearby homes.
          content:
            application/json:
              schema:
                type: [object, "null"]
                required: [zpid]
                properties:
                  zpid:
                    type: [integer, "null"]
                    description: Zillow property ID.
